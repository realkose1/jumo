// ─── HELPER: Dynamic date generator ──────────────────────────
function getRelativeDate(hoursFromNow) {
  const date = new Date();
  date.setHours(date.getHours() + hoursFromNow);
  return date.toISOString();
}

function formatKRTime(date) {
  const d = new Date(date);
  const hours = d.getHours();
  const minutes = String(d.getMinutes()).padStart(2, '0');
  const period = hours < 12 ? '오전' : '오후';
  const displayHours = hours > 12 ? hours - 12 : (hours === 0 ? 12 : hours);

  const now = new Date();
  const isToday = d.getDate() === now.getDate() && d.getMonth() === now.getMonth();
  const dayLabel = isToday ? '오늘' : '내일';

  return `${dayLabel} ${period} ${displayHours}:${minutes} KST`;
}

function formatShortTime(date) {
  const d = new Date(date);
  const now = new Date();
  const hours = String(d.getHours()).padStart(2, '0');
  const minutes = String(d.getMinutes()).padStart(2, '0');

  const isToday = d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();

  if (isToday) {
    return `${hours}:${minutes}`;
  } else {
    return `내일 ${hours}:${minutes}`;
  }
}

// ─── COMPONENT: Today Match Card ─────────────────────────────
function TodayMatchCard({ m, onMatch, tweaks }) {
  const player = ALL_PLAYERS.find(p => p.name === m.koreanPlayer?.name);
  const isLive = m.live || m.time === 'LIVE';

  // Countdown calculation
  const [countdown, setCountdown] = React.useState('');

  React.useEffect(() => {
    if (!isLive && m.fullDate) {
      const updateCountdown = () => {
        const now = new Date();
        const matchDate = new Date(m.fullDate);
        const diff = matchDate - now;

        if (diff > 0) {
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          setCountdown(`${hours}시간 ${minutes}분 ${seconds}초 뒤 시작`);
        } else {
          setCountdown('곧 시작');
        }
      };

      updateCountdown();
      const interval = setInterval(updateCountdown, 1000);
      return () => clearInterval(interval);
    }
  }, [isLive, m.fullDate]);

  // Format time display
  let timeLabel = '';
  let timeValue = m.time || '예정';
  if (!isLive && m.fullDate) {
    const date = new Date(m.fullDate);
    const now = new Date();
    const hours = date.getHours();
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const isToday = date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();

    if (isToday) {
      timeLabel = hours < 12 ? '오전' : '오후';
    } else {
      timeLabel = '내일';
    }

    const displayHours = hours > 12 ? hours - 12 : (hours === 0 ? 12 : hours);
    timeValue = `${String(displayHours).padStart(2, '0')}:${minutes}`;
  }

  return (
    <div onClick={() => onMatch(m)} style={{
      flexShrink:0, width:280, borderRadius:20, overflow:'hidden', position:'relative',
      cursor:'pointer', background:'var(--card)', border:'0.5px solid var(--border)'
    }}>
      <div style={{ position:'relative', zIndex:2, padding:'16px' }}>
        {/* Korean player section - TOP */}
        <div style={{ display:'flex', alignItems:'flex-start', gap:10, marginBottom:16, paddingBottom:14, borderBottom:'0.5px solid var(--border)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, flex:1, minWidth:0 }}>
            {tweaks.showPlayerPhoto && player && (
              <div style={{
                width:48, height:48, borderRadius:'50%', overflow:'hidden',
                background:'#fff', flexShrink:0,
                boxShadow:'0 2px 6px rgba(0,0,0,0.15)'
              }}>
                <PlayerPhoto player={player} style={{
                  width:'100%', height:'100%'
                }}/>
              </div>
            )}
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:15, fontWeight:700, color:'var(--text)', marginBottom:3 }}>
                🇰🇷 {m.koreanPlayer?.name}
              </div>
              <div style={{ fontSize:11, color:'var(--text3)' }}>
                {m.koreanPlayer?.team} #{m.koreanPlayer?.number}
              </div>
            </div>
          </div>

          {/* Event info - TOP RIGHT */}
          {m.koreanPlayer?.event && (
            <div style={{
              background: isLive ? 'rgba(230,48,48,0.1)' : 'var(--btn-bg)',
              borderRadius:6, padding:'5px 8px', flexShrink:0
            }}>
              <span style={{ fontSize:10, fontWeight:600, color: isLive ? 'var(--acc)' : 'var(--text2)', whiteSpace:'nowrap' }}>
                {m.koreanPlayer.event}
              </span>
            </div>
          )}
        </div>

        {/* Time Section - PROMINENT */}
        <div style={{ marginBottom:16 }}>
          {isLive ? (
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{
                display:'inline-flex', alignItems:'center', gap:6,
                background:'var(--acc)', borderRadius:8, padding:'6px 10px',
                boxShadow:'0 2px 8px rgba(230,48,48,0.3)'
              }}>
                <span style={{ position:'relative', display:'inline-flex', alignItems:'center', justifyContent:'center', width:8, height:8 }}>
                  <span style={{ position:'absolute', width:8, height:8, borderRadius:'50%', background:'#fff', opacity:0.4, animation:'ripple 1.4s ease-out infinite' }}/>
                  <span style={{ width:5, height:5, borderRadius:'50%', background:'#fff', position:'relative' }}/>
                </span>
                <span style={{ fontSize:13, fontWeight:800, color:'#fff', letterSpacing:0.5 }}>
                  LIVE
                </span>
              </div>
              {m.minute && (
                <span style={{ fontSize:16, fontWeight:700, color:'var(--text)', letterSpacing:-0.3 }}>
                  {m.minute}'
                </span>
              )}
            </div>
          ) : (
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ fontSize:20, fontWeight:700, color:'var(--text)', letterSpacing:-0.3 }}>
                {timeLabel} {timeValue}
              </span>
              {countdown && (
                <div style={{
                  background:'rgba(255,217,61,0.15)', borderRadius:6, padding:'4px 8px', flexShrink:0,
                  border:'0.5px solid rgba(255,217,61,0.3)'
                }}>
                  <span style={{ fontSize:10, fontWeight:600, color:'#FFD93D', whiteSpace:'nowrap' }}>
                    {countdown}
                  </span>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Teams */}
        <div style={{ marginBottom:12 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
            <TeamBadge code={m.home.code} size={20}/>
            <span style={{ fontSize:15, fontWeight:600, color:'var(--text)' }}>{m.home.name}</span>
            {isLive && (
              <span style={{ ...NUM, fontSize:22, fontWeight:800, color:'var(--text)', marginLeft:'auto' }}>

          <div style={{ display:'flex', alignItems:'center', gap:10 }}>

                {m.away.score}
              </span>
            )}
          </div>
        </div>

        {/* Competition info */}
        <div style={{ fontSize:11, color:'var(--text4)' }}>
          {m.sport.split(' ')[1]} · {m.competition}
        </div>
      </div>
    </div>
  );
}

// ─── SCREEN: HOME V2 — Editorial ─────────────────────────────
function HomeV2({ onMatch, onPlayer, tweaks, liveApiMatches = [], isLoading = false }) {
  // State for real-time countdown updates
  const [currentTime, setCurrentTime] = React.useState(new Date());

  // Update current time every second for countdown
  React.useEffect(() => {
    const interval = setInterval(() => {
      setCurrentTime(new Date());
    }, 1000);
    return () => clearInterval(interval);
  }, []);

  // Combine static and API matches
  const allMatches = [...MATCHES, ...liveApiMatches];
  const liveMatches = allMatches.filter(m => m.live || m.time === 'LIVE');

  // Filter upcoming matches to show only within 12 hours
  const now = currentTime;
  const twelveHoursLater = new Date(now.getTime() + 12 * 60 * 60 * 1000);
  const upcoming = allMatches
    .filter(m => {
      if (m.live || m.time === 'LIVE') return false;
      if (!m.fullDate) return false; // Only show matches with valid dates
      const matchDate = new Date(m.fullDate);
      return matchDate >= now && matchDate <= twelveHoursLater;
    })
    .sort((a, b) => new Date(a.fullDate) - new Date(b.fullDate)); // Sort by soonest first

  // Determine highlight match based on priority
  const getHighlightMatch = () => {
    // Priority 1: Live match with Korean player (HIGHEST PRIORITY)
    const liveWithKorean = allMatches.find(m =>
      (m.live || m.time === 'LIVE') && m.koreanPlayer
    );
    if (liveWithKorean) {
      console.log('🔴 LIVE MATCH FOUND:', liveWithKorean.koreanPlayer.name, '-', liveWithKorean.home.code, 'vs', liveWithKorean.away.code);
      return { match: liveWithKorean, priority: 1 };
    }

    // Priority 2: Match with Korean player goal/assist/point
    const matchWithGoal = allMatches.find(m =>
      m.koreanPlayer && m.events?.some(e =>
        e.type === 'goal' || e.type === 'assist' || e.player === m.koreanPlayer.name
      )
    );
    if (matchWithGoal) return { match: matchWithGoal, priority: 2 };

    // Priority 3: Match starting soon (within 1 hour)
    const oneHourLater = new Date(now.getTime() + 60 * 60 * 1000);
    const startingSoon = allMatches.find(m => {
      if (!m.fullDate || !m.koreanPlayer) return false;
      const matchDate = new Date(m.fullDate);
      return matchDate >= now && matchDate <= oneHourLater;
    });
    if (startingSoon) return { match: startingSoon, priority: 3 };

    // Priority 4: Next upcoming match with Korean player
    const nextMatch = upcoming.find(m => m.koreanPlayer);
    if (nextMatch) return { match: nextMatch, priority: 4 };

    return null;
  };

  const highlightData = getHighlightMatch();
  const highlightMatch = highlightData?.match;
  const highlightPlayer = highlightMatch ? ALL_PLAYERS.find(p => p.name === highlightMatch.koreanPlayer?.name) : null;

  // Generate highlight text based on priority
  const getHighlightText = () => {
    if (!highlightMatch || !highlightData) return { status: '', main: '한국 선수 경기를 확인하세요', sub: '' };

    const m = highlightMatch;
    const isLive = m.live || m.time === 'LIVE';

    switch (highlightData.priority) {
      case 1: // Live match (HIGHEST PRIORITY)
        // Check if there's a goal/assist event
        const lastEvent = m.events?.[m.events.length - 1];
        const hasGoalEvent = lastEvent && (lastEvent.type === 'goal' || lastEvent.type === 'assist');

        if (hasGoalEvent) {
          return {
            status: `LIVE NOW · ${m.minute || ''}\'`,
            main: `${m.koreanPlayer.name}\n${lastEvent.type === 'goal' ? '⚽ 골' : '🅰️ 어시스트'} — ${m.home.score}:${m.away.score}`,
            sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
          };
        } else {
          return {
            status: `LIVE NOW · ${m.minute || ''}\'`,
            main: `${m.koreanPlayer.name} 출전 중\n${m.home.score}:${m.away.score}`,
            sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
          };
        }
      case 2: // Goal/Assist (no longer used as separate priority)
        const goalEvent = m.events?.[m.events.length - 1];
        return {
          status: `LIVE NOW · ${m.minute || ''}\'`,
          main: `${m.koreanPlayer.name}\n${goalEvent?.type === 'goal' ? '⚽ 골' : '🅰️ 어시스트'} — ${m.home.score}:${m.away.score}`,
          sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
        };
      case 3: // Starting soon
        const diff = new Date(m.fullDate) - now;
        const hoursLeft = Math.floor(diff / (1000 * 60 * 60));
        const minsLeft = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secsLeft = Math.floor((diff % (1000 * 60)) / 1000);

        let timeText = '';
        if (hoursLeft > 0) {
          timeText = `${hoursLeft}시간 ${minsLeft}분 후 시작`;
        } else if (minsLeft > 0) {
          timeText = `${minsLeft}분 ${secsLeft}초 후 시작`;
        } else if (secsLeft > 0) {
          timeText = `${secsLeft}초 후 시작`;
        } else {
          timeText = '곧 시작';
        }

        const statusText3 = m.lineupConfirmed ? '선발 출전' : '출전 예정';
        return {
          status: timeText,
          main: `${m.koreanPlayer.name}\n${statusText3}`,
          sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
        };
      case 4: // Upcoming
        const statusText4 = m.lineupConfirmed ? '선발 출전' : '출전 예정';
        return {
          status: m.krTime || m.time,
          main: `${m.koreanPlayer.name}\n${statusText4}`,
          sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
        };
    }
  };

  const highlightText = getHighlightText();
  const heroPlayer = highlightPlayer || PLAYERS[0];

  // Show skeleton on initial load
  if (isLoading) {
    return (
      <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
        <SkeletonHighlight/>
        <div style={{ padding:'16px 16px 8px' }}>
          <div style={{ width:80, height:16, background:'var(--border)', borderRadius:6, opacity:0.5 }}/>
        </div>
        <div style={{ display:'flex', gap:10, padding:'8px 16px 20px', overflowX:'auto' }} className="scrollbar-hide">
          <SkeletonMatchCard/>
          <SkeletonMatchCard/>
          <SkeletonMatchCard/>
        </div>
        <SkeletonUpcomingMatch/>
        <SkeletonUpcomingMatch/>
        <SkeletonUpcomingMatch/>
      </div>
    );
  }

  return (
    <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
      {/* Big editorial header */}
      <div style={{ position:'relative', height:260, overflow:'hidden', marginBottom:0 }}>
        {/* Goal background image */}
        <div style={{ position:'absolute', inset:0 }}>
          <img src="image/goal.jpg" alt="Goal" style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center' }}/>
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%)' }}/>
        </div>
        {tweaks.showPlayerPhoto && (
          <PlayerPhoto player={heroPlayer} style={{ position:'absolute', right:0, bottom:0, width:'28%', height:'70%', zIndex:1 }}/>
        )}
        <div style={{ position:'absolute', top:12, left:20, right:20, display:'flex', justifyContent:'space-between', alignItems:'center', zIndex:2 }}>
          <span style={{ fontSize:15, fontWeight:900, color:'#fff', letterSpacing:2, textTransform:'uppercase' }}>JUMO</span>
          <div style={{ display:'flex', gap:8 }}>
            <button style={{ background:'rgba(0,0,0,0.4)', backdropFilter:'blur(10px)', border:'0.5px solid rgba(255,255,255,0.2)', borderRadius:20, padding:'6px 10px', color:'rgba(255,255,255,0.9)', fontSize:12, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <svg width="18" height="18" viewBox="0 0 22 22" fill="none"><path d="M11 2a7 7 0 00-7 7v4l-1.5 2.5h17L18 13V9a7 7 0 00-7-7z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round" fill="none"/><path d="M9 18.5a2 2 0 004 0" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
            </button>
          </div>
        </div>
        <div style={{ position:'absolute', bottom:20, left:20, right:20, zIndex:2 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
            {(highlightData?.priority === 1 || highlightData?.priority === 2) && <LiveDot/>}
            <span style={{ fontSize:11, fontWeight:700, color: (highlightData?.priority === 1 || highlightData?.priority === 2) ? 'var(--acc)' : 'rgba(255,255,255,0.7)', letterSpacing:1.5 }}>{highlightText.status}</span>
          </div>
          <div style={{ fontSize:28, fontWeight:900, color:'#fff', lineHeight:1.1, marginBottom:8, letterSpacing:-0.5, whiteSpace:'pre-line' }}>{highlightText.main}</div>
          <div style={{ fontSize:12, color:'rgba(255,255,255,0.7)' }}>{highlightText.sub}</div>
        </div>
      </div>

      {/* Today's Matches Section */}
      <div style={{ padding:'16px 16px 8px' }}>
        <div style={{ fontSize:13, fontWeight:700, color:'var(--text)', letterSpacing:-0.2 }}>오늘의 경기</div>
      </div>

      {/* Today's Matches Carousel */}
      <div style={{ display:'flex', gap:10, padding:'8px 16px 20px', overflowX:'auto', scrollSnapType:'x mandatory' }} className="scrollbar-hide">
        {allMatches
          .filter(m => {
            if (!m.koreanPlayer) return false;
            if (m.live || m.time === 'LIVE') return true; // Include live matches
            if (!m.fullDate) return false;
            const matchDate = new Date(m.fullDate);
            return matchDate >= now && matchDate <= twelveHoursLater;
          })
          .sort((a, b) => {
            // Live matches first, then sort by fullDate (earliest first)
            if ((a.live || a.time === 'LIVE') && !(b.live || b.time === 'LIVE')) return -1;
            if (!(a.live || a.time === 'LIVE') && (b.live || b.time === 'LIVE')) return 1;
            const dateA = a.fullDate ? new Date(a.fullDate) : new Date('2099-12-31');
            const dateB = b.fullDate ? new Date(b.fullDate) : new Date('2099-12-31');
            return dateA - dateB;
          })
          .map(m => (
            <div key={m.id} style={{ scrollSnapAlign:'start' }}>
              <TodayMatchCard m={m} onMatch={onMatch} tweaks={tweaks}/>
            </div>
          ))}
        <div style={{ flexShrink:0, width:8 }}/>
      </div>

      {/* Upcoming matches list */}
      {upcoming.length > 0 && (
        <div style={{ margin:'4px 16px', padding:'14px 0', borderTop:'0.5px solid var(--border)' }}>
          {upcoming.map(m => {
            let timeDisplay = '—';
            let dayLabel = '';

            if (m.fullDate) {
              const date = new Date(m.fullDate);
              const now = new Date();
              const hours = String(date.getHours()).padStart(2, '0');
              const minutes = String(date.getMinutes()).padStart(2, '0');
              const isToday = date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();

              timeDisplay = `${hours}:${minutes}`;
              dayLabel = isToday ? '오늘' : '내일';
            }

            const player = ALL_PLAYERS.find(p => p.name === m.koreanPlayer?.name);

            return (
              <div key={m.id} onClick={() => onMatch(m)} style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12, cursor:'pointer' }}>
                <div style={{ ...NUM, width:38, fontSize:11, fontWeight:600, color:'var(--text3)', flexShrink:0, lineHeight:1.3, display:'flex', flexDirection:'column', alignItems:'flex-end' }}>
                  <div style={{ fontSize:10, color:'var(--text5)' }}>{dayLabel}</div>
                  <div>{timeDisplay}</div>
                </div>
                <div style={{ flex:1, display:'flex', flexDirection:'column', gap:2 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>{m.home.name} <span style={{ color:'var(--text4)' }}>vs</span> {m.away.name}</div>
                  <div style={{ fontSize:11, color:'var(--text4)' }}>{m.sport.split(' ')[1]} · {m.competition}</div>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:6, flexShrink:0 }}>

                  )}
                  <span style={{ fontSize:11, fontWeight:600, color:'var(--text)' }}>{m.koreanPlayer?.name}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ height:24 }}/>
    </div>
  );
}

// ─── SCREEN: SCHEDULE ─────────────────────────────────────────
function ScheduleScreen({ onMatch }) {
  const days = ['일','월','화','수','목','금','토'];
  const today = 19;
  const [selDay, setSelDay] = React.useState(today);
  const dates = Array.from({length:14}, (_,i) => today - 2 + i);

  return (
    <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
      <div style={{ padding:'16px 20px 8px', fontSize:22, fontWeight:700, color:'var(--text)', letterSpacing:-0.5 }}>일정</div>
      {/* Date strip */}
      <div style={{ display:'flex', gap:6, padding:'8px 16px 12px', overflowX:'auto' }} className="scrollbar-hide">
        {dates.map(d => {
          const dayIdx = (d % 7 + 7) % 7;
          const isSel = d === selDay;
          const isToday = d === today;
          return (
            <div key={d} onClick={() => setSelDay(d)} style={{ flexShrink:0, width:44, height:60, borderRadius:12, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2, cursor:'pointer', background: isSel ? 'var(--acc)' : isToday ? 'rgba(230,48,48,0.12)' : 'var(--border2)', border: isToday && !isSel ? '0.5px solid rgba(230,48,48,0.3)' : '0.5px solid transparent' }}>
              <span style={{ fontSize:10, color: isSel ? 'var(--text-70)' : 'var(--text4)', fontWeight:600 }}>{days[dayIdx]}</span>
              <span style={{ ...NUM, fontSize:18, fontWeight:800, color: isSel ? '#fff' : isToday ? 'var(--acc)' : 'var(--text-70)' }}>{d}</span>
            </div>
          );
        })}
      </div>

      {/* Match list */}
      <div style={{ padding:'0 16px' }}>
        {MATCHES.map(m => (
          <div key={m.id} onClick={() => onMatch(m)} style={{ marginBottom:10, background:'var(--surface)', borderRadius:14, padding:'14px 16px', cursor:'pointer', border: m.live ? '0.5px solid rgba(230,48,48,0.25)' : '0.5px solid var(--border2)', display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ width:50, flexShrink:0, textAlign:'center' }}>
              {m.live ? (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
                  <LiveDot/>
                  <span style={{ ...NUM, fontSize:12, fontWeight:700, color:'var(--acc)' }}>{m.minute}'</span>
                </div>
              ) : (
                <>
                  <div style={{ ...NUM, fontSize:14, fontWeight:700, color:'var(--text-60)', lineHeight:1 }}>{m.time||'예정'}</div>
                  <div style={{ fontSize:9, color:'var(--text5)', marginTop:2 }}>KST</div>
                </>
              )}
            </div>
            <div style={{ width:0.5, height:36, background:'var(--border)' }}/>
            <div style={{ flex:1 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                <TeamBadge code={m.home.code} size={24}/>
                <span style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>{m.home.name}</span>
                {m.live && <span style={{ ...NUM, fontSize:18, fontWeight:800, color:'var(--text)', letterSpacing:-1, marginLeft:'auto', marginRight:'auto' }}>{m.home.score}:{m.away.score}</span>}
                {!m.live && <span style={{ fontSize:12, color:'var(--text4)', marginLeft:'auto', marginRight:'auto' }}>vs</span>}
                <span style={{ fontSize:13, fontWeight:600, color:'var(--text2)', textAlign:'right' }}>{m.away.name}</span>
                <TeamBadge code={m.away.code} size={24}/>
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontSize:11, color:'var(--text4)' }}>{m.sport} · {m.competition}</span>
                <span style={{ fontSize:11, color:'var(--acc)', fontWeight:600 }}>🇰🇷 {m.koreanPlayer.name}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
      <div style={{ height:24 }}/>
    </div>
  );
}

// ─── SCREEN: ADD PLAYER ───────────────────────────────────────
function AddPlayerScreen({ followed, onToggle, onBack }) {
  const sports = ['전체','⚽ 축구','⚾ 야구','🏸 배드민턴'];
  const sportMap = { '전체': null, '⚽ 축구':'축구', '⚾ 야구':'야구', '🏸 배드민턴':'배드민턴' };
  const [filter, setFilter] = React.useState('전체');
  const [query, setQuery] = React.useState('');

  const filtered = ALL_PLAYERS.filter(p => {
    const sportMatch = filter === '전체' ? true : p.sport === sportMap[filter];
    const q = query.trim().toLowerCase();
    const textMatch = !q || p.name.includes(q) || p.nameEn.toLowerCase().includes(q) || p.team.toLowerCase().includes(q);
    return sportMatch && textMatch;
  });

  const sportIcon = { '축구':'⚽', '야구':'⚾', '배드민턴':'🏸' };

          <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}>

      {/* Profile card */}
      <div style={{ margin:'16px 16px 12px', background:'var(--surface)', borderRadius:18, padding:'18px', border:'0.5px solid var(--border)', display:'flex', alignItems:'center', gap:14 }}>
        <div style={{ width:52, height:52, borderRadius:'50%', background:'linear-gradient(135deg,#e03030,#8b0000)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <span style={{ fontSize:24 }}>🇰🇷</span>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:16, fontWeight:800, color:'var(--text)', marginBottom:2 }}>한국 스포츠 팬</div>
          <div style={{ fontSize:12, color:'var(--text3)' }}>5명 팔로우 중 · 2경기 진행 중</div>
        </div>
        <button style={{ background:'var(--border)', border:'0.5px solid rgba(255,255,255,0.1)', borderRadius:10, padding:'7px 12px', color:'var(--text-60)', fontSize:12, fontWeight:600, cursor:'pointer' }}>편집</button>
      </div>

      {groups.map(g => (
        <div key={g.label} style={{ marginBottom:20 }}>
          <div style={{ fontSize:11, fontWeight:700, color:'var(--text4)', letterSpacing:1.5, textTransform:'uppercase', padding:'0 20px', marginBottom:8 }}>{g.label}</div>
          <div style={{ margin:'0 16px', background:'var(--surface)', borderRadius:16, overflow:'hidden', border:'0.5px solid var(--border)' }}>
            {g.items.map((item, i) => (
              <div key={item.id} onClick={() => { if (item.onToggle) item.onToggle(); else if (item.chevron) setSub(item.id); }} style={{ display:'flex', alignItems:'center', gap:12, padding:'13px 16px', borderBottom: i < g.items.length-1 ? '0.5px solid var(--border2)' : 'none', cursor:'pointer' }}>
                <div style={{ width:32, height:32, borderRadius:8, background:item.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0 }}>{item.icon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:600, color:'var(--text)', marginBottom:1 }}>{item.title}</div>
                  <div style={{ fontSize:11, color:'var(--text4)' }}>{item.sub}</div>
                </div>
                {item.toggle && <div style={{ width:44, height:26, borderRadius:13, background: item.val ? 'var(--acc)' : 'var(--btn-bg)', position:'relative', flexShrink:0, transition:'background 0.2s' }}><div style={{ position:'absolute', top:3, left: item.val ? 21 : 3, width:20, height:20, borderRadius:'50%', background:'#fff', transition:'left 0.2s', boxShadow:'0 1px 3px rgba(0,0,0,0.3)' }}/></div>}
                {item.chevron && <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="var(--text5)" strokeWidth="1.8" strokeLinecap="round"/></svg>}
              </div>
            ))}
          </div>
        </div>
      ))}
      <div style={{ height:24 }}/>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('jumo_tweaks')||'{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [tab, setTab] = React.useState(() => localStorage.getItem('jumo_tab')||'home');
  const [screen, setScreen] = React.useState('main');
  const [selectedMatch, setSelectedMatch] = React.useState(null);
  const [selectedPlayer, setSelectedPlayer] = React.useState(null);
  const [followed, setFollowed] = React.useState(() => new Set([1,2,3,6,7,8,9,17,18,15]));
  const toggleFollow = (id) => setFollowed(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const [darkMode, setDarkMode] = React.useState(true);
  const toggleDark = () => setDarkMode(d => !d);
  const [liveMatches, setLiveMatches] = React.useState([]);
  const [apiLoading, setApiLoading] = React.useState(true); // Start with true for initial load
  const [isInitialLoad, setIsInitialLoad] = React.useState(true);

  // Fetch live matches from ESPN API
  React.useEffect(() => {
    const fetchLiveMatches = async () => {
      setApiLoading(true);
      try {
        const allMatches = [];

        // Fetch soccer leagues
        for (const [league, url] of Object.entries(ESPN_API.soccer)) {
          try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.events) {
              const matches = data.events.map(e => transformESPNEvent(e, 'soccer', league));
              allMatches.push(...matches);
              console.log(`📡 ${league.toUpperCase()}: ${data.events.length} matches fetched`);
            }
          } catch (err) {
            console.error(`❌ Failed to fetch ${league}:`, err);
          }
        }

        // Fetch MLB
        const mlbRes = await fetch(ESPN_API.mlb);
        const mlbData = await mlbRes.json();
        if (mlbData.events) {
          const matches = mlbData.events.map(e => transformESPNEvent(e, 'mlb'));
          allMatches.push(...matches);
        }

        // Filter for Korean players
        const koreanMatches = allMatches.filter(m => m.koreanPlayer);
        setLiveMatches(koreanMatches);

        // Log detailed info
        console.log('✅ API Updated:', new Date().toLocaleTimeString('ko-KR'));
        console.log('📊 Total matches:', allMatches.length);
        console.log('🇰🇷 Korean player matches:', koreanMatches.length);
        koreanMatches.forEach(m => {
          const status = m.live ? '🔴 LIVE' : '⏰ Upcoming';
          console.log(`  ${status} ${m.koreanPlayer.name} - ${m.home.code} vs ${m.away.code} (${m.lineupConfirmed ? '✓ 라인업 확정' : '⏳ 라인업 미정'})`);
        });
      } catch (error) {
        console.error('❌ Failed to fetch matches:', error);
      } finally {
        setApiLoading(false);
        setIsInitialLoad(false);
      }
    };

    fetchLiveMatches();
    // Refresh every 60 seconds for live matches, 5 minutes for upcoming
    const interval = setInterval(fetchLiveMatches, 60000);
    return () => clearInterval(interval);
  }, []);

  const transformESPNEvent = (event, sport, league = '') => {
    const comp = event.competitions[0];
    const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
    const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];
    const status = event.status.type.name;
    // Check multiple live status codes
    const isLive = status === 'STATUS_IN_PROGRESS' ||
                   status === 'STATUS_FIRST_HALF' ||
                   status === 'STATUS_SECOND_HALF' ||
                   status === 'STATUS_HALFTIME' ||
                   status === 'STATUS_EXTRA_TIME' ||
                   status === 'STATUS_OVERTIME';

    // Check for Korean players
    let koreanPlayer = null;
    let lineupConfirmed = false;
    let events = [];
    const homeTeam = home.team.displayName;
    const awayTeam = away.team.displayName;
    const homeAbbr = home.team.abbreviation;
    const awayAbbr = away.team.abbreviation;

    // Try multiple variations to match Korean players
    const homeVariations = [homeTeam, homeAbbr, home.team.name, home.team.shortDisplayName].filter(Boolean);
    const awayVariations = [awayTeam, awayAbbr, away.team.name, away.team.shortDisplayName].filter(Boolean);

    // Debug: Log team names for Turkish league
    if (league === 'tur' && isLive) {
      console.log(`🇹🇷 TUR Live Match: ${homeTeam} (${homeAbbr}) vs ${awayTeam} (${awayAbbr})`);
      console.log(`   Home variations:`, homeVariations);
      console.log(`   Away variations:`, awayVariations);
      console.log(`   Status: ${status}`);
    }

    for (const variation of homeVariations) {
      if (KOREAN_PLAYERS[variation]) {
        koreanPlayer = { ...KOREAN_PLAYERS[variation], team: homeAbbr };
        console.log(`✅ Korean player found (home): ${koreanPlayer.name} in ${variation}`);
        break;
      }
    }

    if (!koreanPlayer) {
      for (const variation of awayVariations) {
        if (KOREAN_PLAYERS[variation]) {
          koreanPlayer = { ...KOREAN_PLAYERS[variation], team: awayAbbr };
          console.log(`✅ Korean player found (away): ${koreanPlayer.name} in ${variation}`);
          break;
        }
      }
    }

    // Check lineup confirmation (if lineup data exists, it's confirmed)
    if (comp.situation?.lastPlay || comp.details || home.linescores) {
      lineupConfirmed = true;
    }

    // Extract events (goals, cards, etc.) from the match
    if (comp.details) {
      const details = comp.details;
      if (details.redCards) {
        details.redCards.forEach(card => {
          events.push({ type: 'red', player: card.athlete?.displayName, min: card.clock?.displayValue, team: card.team?.abbreviation });
        });
      }
      if (details.yellowCards) {
        details.yellowCards.forEach(card => {
          events.push({ type: 'yellow', player: card.athlete?.displayName, min: card.clock?.displayValue, team: card.team?.abbreviation });
        });
      }
    }

    // Check for Korean player in match events (goals, assists)
    if (koreanPlayer && comp.situation?.lastPlay) {
      const lastPlay = comp.situation.lastPlay;
      if (lastPlay.text && lastPlay.text.includes(koreanPlayer.name)) {
        if (lastPlay.scoringPlay) {
          events.push({ type: 'goal', player: koreanPlayer.name, min: lastPlay.clock?.displayValue, team: koreanPlayer.team });
        }
      }
    }

    // Format time for Korean timezone
    let timeDisplay = '';
    if (!isLive && event.date) {
      const date = new Date(event.date);
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(11, 59, 59, 999);

      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');

      // Check if it's today or tomorrow morning
      if (date.toDateString() === now.toDateString()) {
        // Today: show HH:MM only
        timeDisplay = `${hours}:${minutes}`;
      } else if (date <= tomorrow) {
        // Tomorrow morning (before 11:59): show MM/DD
        timeDisplay = `${month}/${day}`;
      } else {
        timeDisplay = `${month}/${day}`;
      }
    } else if (isLive) {
      timeDisplay = 'LIVE';
    }

    // Determine Korean player event status
    let playerEventText = '출전 예정';
    if (isLive && koreanPlayer) {
      playerEventText = '출전 중';
    } else if (lineupConfirmed && koreanPlayer) {
      playerEventText = '선발 출전';
    }

    // Get current minute for live matches
    let minute = '';
    if (isLive && event.status?.displayClock) {
      minute = event.status.displayClock;
    }

    return {
      id: event.id,
      live: isLive,
      minute,
      sport: sport === 'mlb' ? '⚾ MLB' : `⚽ ${league.toUpperCase()}`,
      home: { name: homeTeam, code: home.team.abbreviation, score: parseInt(home.score) || 0 },
      away: { name: awayTeam, code: away.team.abbreviation, score: parseInt(away.score) || 0 },
      koreanPlayer: koreanPlayer ? { ...koreanPlayer, event: playerEventText } : null,
      competition: event.competitions[0].league?.name || '',
      venue: event.competitions[0].venue?.fullName || '',
      time: timeDisplay,
      fullDate: event.date,
      krTime: formatKRTime(event.date),
      lineupConfirmed,
      events,
      stats: null,
    };
  };

  React.useEffect(() => {
    document.documentElement.classList.toggle('light-mode', !darkMode);
  }, [darkMode]);
  const [showTweaks, setShowTweaks] = React.useState(false);

  const updateTweaks = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    localStorage.setItem('jumo_tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  React.useEffect(() => {
    window.__jumoSetTweaks = setShowTweaks;
  }, [setShowTweaks]);

  const goMatch = (m) => { setSelectedMatch(m); setScreen('match'); };
  const goPlayer = (p) => { setSelectedPlayer(p); setScreen('player'); };
  const goAddPlayer = () => setScreen('addplayer');
  const goBack = () => setScreen('main');

  const handleTab = (t) => { setTab(t); setScreen('main'); localStorage.setItem('jumo_tab', t); };

  const HomeComponent = [HomeV1, HomeV2, HomeV3][tweaks.homeVariant] || HomeV1;

  const homeVariantNames = ['카드 스택', '에디토리얼', '컴팩트'];

  return (
    <div style={{ '--acc': tweaks.accentColor, fontFamily:"'Noto Sans KR', system-ui, sans-serif", WebkitFontSmoothing:'antialiased' }}>
        <div style={{
          display:'flex',
          flexDirection:'column',
          minHeight:'100vh',
          background:'var(--bg)',
          width:'100%',
          maxWidth:'480px',
          position:'relative',
          boxShadow: window.innerWidth >= 768 ? '0 0 60px rgba(0,0,0,0.5)' : 'none'
        }}>
          {screen === 'main' && (
            <>
              {tab === 'home' && <HomeComponent onMatch={goMatch} onPlayer={goPlayer} tweaks={tweaks} liveApiMatches={liveMatches} isLoading={isInitialLoad && apiLoading}/>}
              {tab === 'schedule' && <ScheduleScreen onMatch={goMatch}/>}
              {tab === 'players' && <PlayersScreen onPlayer={goPlayer} onAdd={goAddPlayer} followed={followed}/>}
              {tab === 'notif' && <NotifScreen/>}
              {tab === 'more' && <MoreScreen darkMode={darkMode} onToggleDark={toggleDark}/>}
            </>
          )}
          {screen === 'match' && selectedMatch && (
            <LiveDetailScreen match={selectedMatch} onBack={goBack}/>
          )}
          {screen === 'player' && selectedPlayer && (
            <PlayerScreen player={selectedPlayer} onBack={goBack} onMatch={goMatch}/>
          )}
          {screen === 'addplayer' && (
            <AddPlayerScreen followed={followed} onToggle={toggleFollow} onBack={goBack}/>
          )}
          <TabBar active={tab} onTab={handleTab}/>
        </div>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{ position:'fixed', bottom:24, right:24, background:'var(--card)', border:'0.5px solid var(--btn-bg)', borderRadius:20, padding:'20px', width:260, boxShadow:'0 20px 60px rgba(0,0,0,0.6)', zIndex:9999, animation:'slideUp 0.2s ease' }}>
          <div style={{ fontSize:13, fontWeight:700, color:'var(--text2)', letterSpacing:1.5, textTransform:'uppercase', marginBottom:16 }}>Tweaks</div>

          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, color:'var(--text3)', marginBottom:8, fontWeight:600 }}>홈 스타일</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {homeVariantNames.map((name, i) => (
                <button key={i} onClick={() => updateTweaks('homeVariant', i)} style={{ background: tweaks.homeVariant===i ? 'var(--acc)' : 'var(--border)', border:'none', borderRadius:10, padding:'10px 14px', color: tweaks.homeVariant===i ? '#fff' : 'var(--text-60)', fontSize:13, fontWeight:600, cursor:'pointer', textAlign:'left' }}>
                  {i===0 ? '1️⃣' : i===1 ? '2️⃣' : '3️⃣'} {name}
                </button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, color:'var(--text3)', marginBottom:8, fontWeight:600 }}>강조 색상</div>
            <div style={{ display:'flex', gap:8 }}>
              {['#e03030','#0071e3','#2cc96b','#f5a623','#9b59b6'].map(c => (
                <button key={c} onClick={() => updateTweaks('accentColor', c)} style={{ width:32, height:32, borderRadius:'50%', background:c, border: tweaks.accentColor===c ? '2.5px solid #fff' : '2.5px solid transparent', cursor:'pointer' }}/>
              ))}
            </div>
          </div>

          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
            <span style={{ fontSize:13, color:'var(--text-60)', fontWeight:600 }}>선수 사진 플레이스홀더</span>
            <button onClick={() => updateTweaks('showPlayerPhoto', !tweaks.showPlayerPhoto)} style={{ width:40, height:24, borderRadius:12, background: tweaks.showPlayerPhoto ? 'var(--acc)' : 'var(--text6)', border:'none', cursor:'pointer', position:'relative', transition:'background 0.2s' }}>
              <div style={{ position:'absolute', top:2, left: tweaks.showPlayerPhoto ? 18 : 2, width:20, height:20, borderRadius:'50%', background:'#fff', transition:'left 0.2s' }}/>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
