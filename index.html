function getBroadcasters(m) {
  if (!m) return [];
  const sport = m.sport || '';
  if (sport.includes('MLB') || sport.includes('⚾')) return ['쿠팡플레이'];
  const comp = m.competition || '';
  if (BROADCASTERS[comp]) return BROADCASTERS[comp];
  const lower = comp.toLowerCase();
  for (const key of Object.keys(BROADCASTERS)) {
    if (lower.includes(key.toLowerCase())) return BROADCASTERS[key];
  }
  return [];
}

// ─── HELPER: Start probability based on last 5 finished matches ─
function computeStartProbability(playerName, allMatches) {
  const FINAL = ['STATUS_FINAL','STATUS_FULL_TIME','final','STATUS_END_PERIOD','STATUS_FINAL_PEN'];
  // Try dynamic from recent finished matches with parsed lineup data
  const past = (allMatches || [])
    .filter(m => {
      if (!FINAL.includes(m.status)) return false;
      const allKp = m.koreanPlayers || [m.koreanPlayer];
      const kp = allKp.find(p => p?.name === playerName);
      // Only count if we have actual lineup-parsed event (not the default '미출전')
      if (!kp) return false;
      const hasParsedData = kp.event === '풀타임' || kp.event === '교체 아웃'
        || kp.event === '벤치' || (typeof kp.event === 'string' && kp.event.includes('분 출전'))
        || (kp.minutesPlayed||0) > 0 || (kp.matchGoals||0) > 0 || (kp.matchAssists||0) > 0;
      return hasParsedData;
    })
    .sort((a, b) => new Date(b.fullDate||0) - new Date(a.fullDate||0))
    .slice(0, 5);
  if (past.length >= 3) {
    let starts = 0;
    for (const m of past) {
      const allKp = m.koreanPlayers || [m.koreanPlayer];
      const kp = allKp.find(p => p?.name === playerName);
      if (!kp) continue;
      if (kp.event === '풀타임' || kp.event === '교체 아웃') starts++;
      else if ((kp.minutesPlayed||0) >= 60) starts++;
    }
    return Math.round((starts / past.length) * 100);
  }
  // Fallback: per-player baseline from ALL_PLAYERS.startRate
  const p = ALL_PLAYERS.find(x => x.name === playerName);
  return p?.startRate ?? null;
}

  if (!kp) return '';
  if (kp.event === '출전 예상') {
    const p = computeStartProbability(kp.name, allMatches);
    if (p != null) return `출전 예상 ${p}%`;
  }
  return kp.event || '';
}

// ─── HELPER: Dynamic date generator ──────────────────────────
function getRelativeDate(hoursFromNow) {
  const date = new Date();
  date.setHours(date.getHours() + hoursFromNow);
  return date.toISOString();
}

function formatHHMM(date) {
  const parts = new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Seoul', hour: '2-digit', minute: '2-digit', hour12: false })
    .formatToParts(new Date(date)).reduce((acc, p) => (acc[p.type] = p.value, acc), {});
  return `${parts.hour}:${parts.minute}`;
}

function formatKRTime(date) {
  const d = new Date(date);
  const tz = 'Asia/Seoul';
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    hour: 'numeric', minute: '2-digit', hour12: false,
    year: 'numeric', month: 'numeric', day: 'numeric',
  }).formatToParts(d).reduce((acc, p) => (acc[p.type] = p.value, acc), {});
  const hours = parseInt(parts.hour, 10);
  const minutes = parts.minute;
  const period = hours < 12 ? '오전' : '오후';
  const displayHours = hours > 12 ? hours - 12 : (hours === 0 ? 12 : hours);

  const nowParts = new Intl.DateTimeFormat('en-US', { timeZone: tz, year:'numeric', month:'numeric', day:'numeric' })
    .formatToParts(new Date()).reduce((acc, p) => (acc[p.type] = p.value, acc), {});
  const isToday = parts.year === nowParts.year && parts.month === nowParts.month && parts.day === nowParts.day;
  const dayLabel = isToday ? '오늘' : '내일';

  return `${dayLabel} ${period} ${displayHours}:${minutes} KST`;
}

function formatShortTime(date) {
  const d = new Date(date);
  const now = new Date();
  const hours = String(d.getHours()).padStart(2, '0');
  const minutes = String(d.getMinutes()).padStart(2, '0');

  const isToday = d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();

  if (isToday) {
    return `${hours}:${minutes}`;
  } else {
    return `내일 ${hours}:${minutes}`;
  }
}

const teamLogoCache = {};

function TeamBadge({ code, size=36, logo }) {
  const colors = { TOT:'#132257', MCI:'#6CABDD', PSG:'#003399', OL:'#FFFFFF', LAD:'#005A9C', TOR:'#134A8E', FCB:'#DC052D', BVB:'#FDE100', T1:'#C89B3C', GEN:'#EC1C24' };
  const textColors = { MCI:'#132257', OL:'#1B3A6B', BVB:'#1B1B1B' };
  const bg = colors[code] || '#333';
  const tc = textColors[code] || '#fff';
  const [blobUrl, setBlobUrl] = React.useState(logo ? (teamLogoCache[logo] || null) : null);

  React.useEffect(() => {
    if (!logo) return;
    if (teamLogoCache[logo]) { setBlobUrl(teamLogoCache[logo]); return; }
    if (teamLogoCache[logo] === '') return;
    fetch(logo, { referrerPolicy: 'no-referrer' })
      .then(r => r.ok ? r.blob() : null)
      .then(blob => {
        if (!blob) { teamLogoCache[logo] = ''; return; }
        const url = URL.createObjectURL(blob);
        teamLogoCache[logo] = url;
        setBlobUrl(url);
      })
      .catch(() => { teamLogoCache[logo] = ''; });
  }, [logo]);

  if (blobUrl) {
    return <img src={blobUrl} alt={code} style={{ width:size, height:size, objectFit:'contain', flexShrink:0 }}/>;
  }

  return (
    <div style={{ width:size, height:size, borderRadius:size*0.22, background:bg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
      <span style={{ ...NUM, fontSize:size*0.3, fontWeight:700, color:tc, letterSpacing:-0.5 }}>{code}</span>
    </div>
  );
}

// ─── TAB BAR ─────────────────────────────────────────────────
// iOS 26+ detection.
//   1) `?glass=1` query forces ON.
//   2) Capacitor iOS shell: ON unconditionally (the iOS 26 WKWebView reports
//      a frozen UA of "iPhone OS 18_x" so version sniffing doesn't work —
//      we instead rely on Xcode's deployment target to gate the OS version).
//   3) Mobile Safari on the public web: try UA patterns (works for ?glass=1
//      previews from desktop, and any future iOS that exposes a real version).
const IS_IOS26_PLUS = (() => {
  try {
    if (typeof location !== 'undefined' && /[?&]glass=1\b/.test(location.search)) return true;
    const inCapacitorIOS = typeof window !== 'undefined' && !!(window.Capacitor && window.Capacitor.getPlatform && window.Capacitor.getPlatform() === 'ios');
    if (inCapacitorIOS) return true;
    const ua = (typeof navigator !== 'undefined' && navigator.userAgent) || '';
    if (!/iPhone|iPad|iPod/.test(ua)) return false;
    const patterns = [/OS (\d+)[_.]/, /Version\/(\d+)\./, /CPU OS (\d+)/];
    let major = 0;
    for (const re of patterns) {
      const m = ua.match(re);
      if (m) major = Math.max(major, parseInt(m[1], 10));
    }
    return major >= 26;
  } catch { return false; }
})();

const TabBar = React.memo(function TabBar({ active: propActive, onTab }) {
  const [active, setActive] = React.useState(propActive);
  React.useEffect(() => { setActive(propActive); }, [propActive]);
  const handlePress = (id) => {
    if (id !== active) setActive(id);
  };
  const handleClick = (id) => {
    onTab(id);
  };
  // In Liquid Glass mode, active state is shown via the pill background, so we
  // keep icons stroke-only (no heavy fill) to match iOS 26 native behavior.
  const fillFor = (id) => (IS_IOS26_PLUS ? 'none' : (active===id ? 'currentColor' : 'none'));
  const ICON_SIZE = IS_IOS26_PLUS ? 21 : 22;
  const tabs = [
    { id:'home', label:'홈', icon: <svg width={ICON_SIZE} height={ICON_SIZE} viewBox="0 0 22 22" fill="none"><path d="M3 9.5L11 2l8 7.5V20H14v-5h-6v5H3V9.5z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round" fill={fillFor('home')}/></svg> },
    { id:'schedule', label:'일정', icon: <svg width={ICON_SIZE} height={ICON_SIZE} viewBox="0 0 22 22" fill="none"><rect x="3" y="5" width="16" height="15" rx="3" stroke="currentColor" strokeWidth="1.8"/><path d="M7 3v4M15 3v4M3 10h16" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>{active==='schedule' && !IS_IOS26_PLUS && <circle cx="11" cy="15" r="1.5" fill="currentColor"/>}</svg> },
    { id:'players', label:'선수', icon: <svg width={ICON_SIZE} height={ICON_SIZE} viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="3.5" stroke="currentColor" strokeWidth="1.8" fill={fillFor('players')}/><path d="M4 19c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg> },
    { id:'news', label:'뉴스', icon: <svg width={ICON_SIZE} height={ICON_SIZE} viewBox="0 0 22 22" fill="none"><rect x="2" y="4" width="18" height="14" rx="2.5" stroke="currentColor" strokeWidth="1.8" fill={fillFor('news')}/><path d="M6 8.5h10M6 12h7" stroke={(active==='news' && !IS_IOS26_PLUS) ? 'var(--bg)' : 'currentColor'} strokeWidth="1.6" strokeLinecap="round"/></svg> },
    { id:'more', label:'더보기', icon: <svg width={ICON_SIZE} height={ICON_SIZE} viewBox="0 0 22 22" fill="none"><circle cx="5" cy="11" r="1.8" fill="currentColor"/><circle cx="11" cy="11" r="1.8" fill="currentColor"/><circle cx="17" cy="11" r="1.8" fill="currentColor"/></svg> },
  ];
  return (
    <div className={IS_IOS26_PLUS ? 'tabbar-liquid-glass' : ''} style={{
      position: 'fixed',
      bottom: 0,
      left: 0,
      right: 0,
      zIndex: 100,
      display:'flex',
      borderTop: IS_IOS26_PLUS ? 'none' : '0.5px solid var(--border)',
      background: IS_IOS26_PLUS ? undefined : 'var(--tab-bg)',
      backdropFilter: IS_IOS26_PLUS ? undefined : 'blur(20px)',
      WebkitBackdropFilter: IS_IOS26_PLUS ? undefined : 'blur(20px)',
      paddingBottom: IS_IOS26_PLUS ? undefined : 'calc(8px + env(safe-area-inset-bottom))',
      paddingTop: IS_IOS26_PLUS ? undefined : 8,
      transform:'translateZ(0)',
      WebkitTransform:'translateZ(0)',
      willChange:'transform',
    }}>
      {tabs.map(t => (
        <button key={t.id} className={active===t.id ? 'active' : ''} onPointerDown={() => handlePress(t.id)} onClick={() => handleClick(t.id)} style={{ flex:1, background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:3, color: active===t.id ? 'var(--acc)' : 'var(--text4)', transition:'none', padding:'4px 0', WebkitTapHighlightColor:'transparent', touchAction:'manipulation' }}>
          {t.icon}
          <span style={{ fontSize: IS_IOS26_PLUS ? 9 : 10, fontWeight:600, letterSpacing:0.2 }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
});

function TodayMatchCard({ m, onMatch, tweaks, allMatches = [] }) {
  const player = ALL_PLAYERS.find(p => p.name === m.koreanPlayer?.name);
  const isLive = m.live || m.time === 'LIVE';
  const isFinished = m.status === 'STATUS_FINAL' ||
                     m.status === 'STATUS_FULL_TIME' ||
                     m.status === 'final' ||
                     m.status === 'STATUS_END_PERIOD' ||
                     m.status === 'STATUS_FINAL_PEN';

  // Real-time live minute
  const calcMinute = () => {
    if (!m.periodStartTs) return m.minute || '';
    const minsInPeriod = Math.floor((Date.now()/1000 - m.periodStartTs) / 60);
    return String(Math.max(0, minsInPeriod + ((m.sfPeriod || 1) >= 2 ? 45 : 0)));
  };
  const [liveMinute, setLiveMinute] = React.useState(calcMinute);
  React.useEffect(() => {
    if (!isLive) return;
    const iv = setInterval(() => setLiveMinute(calcMinute()), 30000);
    return () => clearInterval(iv);
  }, [isLive, m.periodStartTs, m.sfPeriod]);

  // Countdown calculation
  const [countdown, setCountdown] = React.useState('');

  React.useEffect(() => {
    if (!isLive && m.fullDate) {
      const updateCountdown = () => {
        const now = new Date();
        const matchDate = new Date(m.fullDate);
        const diff = matchDate - now;

        if (diff > 0) {
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          setCountdown(`${hours}시간 ${minutes}분 ${seconds}초 뒤 시작`);
        } else {
          setCountdown('곧 시작');
        }
      };

      updateCountdown();
      const interval = setInterval(updateCountdown, 1000);
      return () => clearInterval(interval);
    }
  }, [isLive, m.fullDate]);

  // Format time display
  let timeLabel = '';
  let timeValue = m.time || '예정';
  if (!isLive && m.fullDate) {
    const date = new Date(m.fullDate);
    const now = new Date();
    const hours = date.getHours();
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const isToday = date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();

    const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
    const isTomorrow = date.getDate() === tomorrow.getDate() && date.getMonth() === tomorrow.getMonth() && date.getFullYear() === tomorrow.getFullYear();
    if (isToday) {
      timeLabel = hours < 12 ? '오전' : '오후';
    } else if (isTomorrow) {
      timeLabel = '내일';
    } else {
      timeLabel = `${date.getMonth() + 1}월 ${date.getDate()}일`;
    }

    const displayHours = hours > 12 ? hours - 12 : (hours === 0 ? 12 : hours);
    timeValue = `${String(displayHours).padStart(2, '0')}:${minutes}`;
  }

  return (
    <div onClick={() => onMatch(m)} style={{
      flexShrink:0, width:'calc(100vw - 44px)', maxWidth:280, borderRadius:20, overflow:'hidden', position:'relative',
      cursor:'pointer', background:'var(--card)', border:'0.5px solid var(--border)'
    }}>
      <div style={{ position:'relative', zIndex:2, padding:'16px' }}>
        {/* Korean player section - TOP */}
        <div style={{ display:'flex', alignItems:'flex-start', gap:10, marginBottom:16, paddingBottom:14, borderBottom:'0.5px solid var(--border)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, flex:1, minWidth:0 }}>
            {tweaks.showPlayerPhoto && player && (
              <div style={{
                width:48, height:48, borderRadius:'50%', overflow:'hidden',
                background:'#fff', flexShrink:0,
                boxShadow:'0 2px 6px rgba(0,0,0,0.15)'
              }}>
                <PlayerPhoto player={player} style={{
                  width:'100%', height:'100%'
                }}/>
              </div>
            )}
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:15, fontWeight:700, color:'var(--text)', marginBottom:3 }}>
                🇰🇷 {m.koreanPlayer?.name}
              </div>
              <div style={{ fontSize:11, color:'var(--text3)' }}>
                {m.koreanPlayer?.team} #{m.koreanPlayer?.number}
              </div>
            </div>
          </div>

          {/* Event info - TOP RIGHT */}
          {m.koreanPlayer?.event && (
            <div style={{
              background: isLive ? 'rgba(230,48,48,0.1)' : 'var(--btn-bg)',
              borderRadius:6, padding:'5px 8px', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center'
            }}>
              <span style={{ fontSize:10, fontWeight:600, color: isLive ? 'var(--acc)' : 'var(--text2)', whiteSpace:'nowrap', lineHeight:1 }}>
                {formatExpectedEvent(m.koreanPlayer, allMatches)}
              </span>
            </div>
          )}
        </div>

        {/* Time Section or Result Section */}
        {isFinished ? (
          // FINISHED MATCH - Show score and player performance
          (() => {
            const koreanTeam = m.koreanPlayer?.team;
            const isHomeTeam = koreanTeam === m.home.code;
            const koreanScore = isHomeTeam ? m.home.score : m.away.score;
            const opponentScore = isHomeTeam ? m.away.score : m.home.score;
            const isWin = koreanScore > opponentScore;
            const isDraw = koreanScore === opponentScore;
            const opponentTeam = isHomeTeam ? m.away : m.home;

            const kp = m.koreanPlayer;
            const isMLB = (m.sport||'').includes('MLB') || (m.sport||'').includes('⚾');
            const matchGoals = m.events?.filter(e => e.type==='goal' && e.player===kp.name).length || 0;
            const matchAssists = m.events?.filter(e => e.type==='assist' && e.player===kp.name).length || 0;
            // 골/도움이 있으면 무조건 출전한 것
            const didPlay = kp.event !== '미출전' || matchGoals > 0 || matchAssists > 0;

            // Build stat pills
            const statPills = [];
            if (!isMLB && didPlay) {
              if (matchGoals > 0) statPills.push({ label:`⚽ ${matchGoals}골`, accent:true });
              if (matchAssists > 0) statPills.push({ label:`🅰️ ${matchAssists}도움`, accent:true });
              if (kp.sfRating) statPills.push({ label:`★ ${kp.sfRating}`, accent:false, rating:true });
              else if (kp.rating) statPills.push({ label:`★ ${kp.rating}`, accent:false });
            } else if (isMLB && didPlay) {
              if (kp.hits !== undefined) statPills.push({ label:`${kp.hits}안타`, accent: kp.hits > 0 });
              if (kp.homeRuns > 0) statPills.push({ label:`${kp.homeRuns}홈런`, accent:true });
              if (kp.rbi > 0) statPills.push({ label:`${kp.rbi}타점`, accent:false });
              if (kp.avg) statPills.push({ label:`타율 ${kp.avg}`, accent:false });
            }

            return (
              <>
                {/* Player performance summary */}
                <div style={{ marginBottom:14 }}>
                  {didPlay ? (
                    statPills.length > 0 ? (
                      <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
                        {statPills.map((s, i) => (
                          <span key={i} style={{
                            fontSize:11, fontWeight:700, padding:'4px 9px', borderRadius:8,
                            display:'inline-flex', alignItems:'center', lineHeight:1,
                            background: s.rating || s.accent ? 'rgba(245,196,0,0.15)' : 'var(--btn-bg)',
                            color: s.rating || s.accent ? 'var(--acc)' : 'var(--text2)',
                            border: s.rating || s.accent ? '0.5px solid rgba(245,196,0,0.3)' : '0.5px solid var(--border)',
                          }}>{s.label}</span>
                        ))}
                      </div>
                    ) : (
                      <span style={{ fontSize:13, color:'var(--text3)', fontWeight:600 }}>출전 완료</span>
                    )
                  ) : (
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:'var(--text4)' }}>미출전</span>
                      <span style={{ fontSize:11, color:'var(--text5)' }}>· 엔트리 제외 또는 부상</span>
                    </div>
                  )}
                </div>

                {/* Teams with scores */}
                <div style={{ marginBottom:12 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
                    <TeamBadge code={m.home.code} size={20} logo={m.home.logo}/>
                    <span style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>{m.home.name}</span>
                    <span style={{ ...NUM, fontSize:22, fontWeight:800, color:'var(--text)', marginLeft:'auto' }}>{m.home.score}</span>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <TeamBadge code={m.away.code} size={20} logo={m.away.logo}/>
                    <span style={{ fontSize:14, fontWeight:600, color:'var(--text-70)' }}>{m.away.name}</span>
                    <span style={{ ...NUM, fontSize:22, fontWeight:800, color:'var(--text-70)', marginLeft:'auto' }}>{m.away.score}</span>
                  </div>
                </div>

                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }}>
                  <div style={{ fontSize:11, color:'var(--text4)', minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.competition}</div>
                  <BroadcastBadge match={m}/>
                </div>
              </>
            );
          })()
        ) : (
          // UPCOMING or LIVE MATCH - Show time and teams
          <>
            <div style={{ marginBottom:16 }}>
              {isLive ? (
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <div style={{
                    display:'inline-flex', alignItems:'center', gap:6,
                    background:'var(--acc)', borderRadius:8, padding:'6px 10px',
                    boxShadow:'0 2px 8px rgba(230,48,48,0.3)'
                  }}>
                    <span style={{ position:'relative', display:'inline-flex', alignItems:'center', justifyContent:'center', width:8, height:8 }}>
                      <span style={{ position:'absolute', width:8, height:8, borderRadius:'50%', background:'#000', opacity:0.4, animation:'ripple 1.4s ease-out infinite' }}/>
                      <span style={{ width:5, height:5, borderRadius:'50%', background:'#000', position:'relative' }}/>
                    </span>
                    <span style={{ fontSize:13, fontWeight:800, color:'#000', letterSpacing:0.5 }}>
                      LIVE
                    </span>
                  </div>
                  {liveTimeLabel(m, liveMinute) && (
                    <span style={{ fontSize:16, fontWeight:700, color:'var(--text)', letterSpacing:-0.3 }}>
                      {liveTimeLabel(m, liveMinute)}
                    </span>
                  )}
                </div>
              ) : (
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <span style={{ fontSize:20, fontWeight:700, color:'var(--text)', letterSpacing:-0.3 }}>
                    {timeLabel} {timeValue}
                  </span>
                  {countdown && (
                    <div style={{
                      background:'rgba(255,217,61,0.15)', borderRadius:6, padding:'4px 8px', flexShrink:0,
                      border:'0.5px solid rgba(255,217,61,0.3)', display:'flex', alignItems:'center', justifyContent:'center'
                    }}>
                      <span style={{ fontSize:10, fontWeight:600, color:'#FFD93D', whiteSpace:'nowrap', lineHeight:1 }}>
                        {countdown}
                      </span>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Teams */}
            <div style={{ marginBottom:12 }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
                <TeamBadge code={m.home.code} size={20} logo={m.home.logo}/>
                <span style={{ fontSize:15, fontWeight:600, color:'var(--text)' }}>{m.home.name}</span>
                {isLive && m.home.score !== null && m.home.score !== undefined && (
                  <span style={{ ...NUM, fontSize:22, fontWeight:800, color:'var(--text)', marginLeft:'auto' }}>
                    {m.home.score}
                  </span>
                )}
              </div>

              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <TeamBadge code={m.away.code} size={20} logo={m.away.logo}/>
                <span style={{ fontSize:15, fontWeight:600, color:'var(--text-70)' }}>{m.away.name}</span>

      </div>
    </div>
  );

function HomeV1({ onMatch, onPlayer, onNotif, tweaks, liveApiMatches = [], isLoading = false }) {
  const allMatches = [...MATCHES, ...liveApiMatches];
  const liveMatches = allMatches.filter(m => m.live || m.time === 'LIVE');

  // Filter upcoming matches to show only within 12 hours
  const now = new Date();
  const twelveHoursLater = new Date(now.getTime() + 12 * 60 * 60 * 1000);
  const upcoming = allMatches
    .filter(m => {
      if (m.live || m.time === 'LIVE') return false;
      if (!m.fullDate) return false; // Only show matches with valid dates
      const matchDate = new Date(m.fullDate);
      return matchDate >= now && matchDate <= twelveHoursLater;
    })
    .sort((a, b) => new Date(a.fullDate) - new Date(b.fullDate)); // Sort by soonest first

  return (
    <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
      {/* Header */}
      <div style={{ padding:'12px 20px 10px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <div style={{ fontSize:11, fontWeight:600, color:'var(--text4)', letterSpacing:1.5, textTransform:'uppercase', marginBottom:2 }}>JUMO</div>
          <div style={{ fontSize:22, fontWeight:700, color:'var(--text)', letterSpacing:-0.5 }}>오늘의 경기</div>
        </div>
        <button onClick={onNotif} style={{ ...LG.base, ...LG.circle, color:'rgba(255,255,255,0.85)' }}>

        <div style={{ display:'flex', animation:'ticker 18s linear infinite', whiteSpace:'nowrap' }}>
          {[...Array(2)].map((_, ri) => (
            <span key={ri} style={{ display:'inline-flex', gap:32, paddingRight:32 }}>
              {liveMatches.map(m => (
                <span key={m.id} style={{ display:'inline-flex', alignItems:'center', gap:8, fontSize:11, fontWeight:600, color:'var(--text-60)', letterSpacing:0.3 }}>
                  <LiveDot/> {m.home.code} {m.home.score}–{m.away.score} {m.away.code} <span style={{ color:'var(--text4)' }}>{liveTimeLabel(m)}</span>
                  <span style={{ color:'var(--acc)' }}>· 🇰🇷 {m.koreanPlayer.name}</span>
                </span>

      {/* Upcoming */}

        <span style={{ fontSize:16, fontWeight:700, color:'var(--text)' }}>오늘 예정</span>
        <span style={{ fontSize:12, color:'var(--text4)', fontWeight:500 }}>전체보기</span>

          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:6 }}>
            <span style={{ ...NUM, fontSize:12, fontWeight:700, color:'var(--text3)', flexShrink:0, width:36 }}>{m.time||'예정'}</span>
            <div style={{ width:0.5, height:20, background:'var(--border)', flexShrink:0 }}/>
            <div style={{ flex:1, display:'flex', alignItems:'center', gap:6, minWidth:0 }}>
              <TeamBadge code={m.home.code} size={24} logo={m.home.logo}/>
              <span style={{ fontSize:13, fontWeight:600, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1 }}>{m.home.name}</span>
              <span style={{ fontSize:11, color:'var(--text4)', flexShrink:0 }}>vs</span>
              <span style={{ fontSize:13, fontWeight:600, color:'var(--text2)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1, textAlign:'right' }}>{m.away.name}</span>
              <TeamBadge code={m.away.code} size={24}/>
            </div>
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingLeft:48 }}>
            <span style={{ fontSize:11, color:'var(--text5)' }}>{m.sport} · {m.krTime}</span>
            <span style={{ fontSize:11, color:'var(--acc)', fontWeight:700, flexShrink:0 }}>🇰🇷 {m.koreanPlayer.name}</span>
          </div>
        </div>
      ))}
      <div style={{ height:'calc(96px + env(safe-area-inset-bottom))' }}/>
    </div>
  );
}

// ─── TODAY MATCHES CAROUSEL ──────────────────────────────────
function TodayMatchesCarousel({ todayMatches, matches, now, onMatch, tweaks }) {
  const scrollRef = React.useRef(null);

  // Auto-scroll to first future match on mount
  React.useEffect(() => {
    if (!scrollRef.current || todayMatches.length === 0) return;

    const firstFutureIndex = todayMatches.findIndex(m => {
      if (m.live || m.time === 'LIVE') return true;
      const matchDate = new Date(m.fullDate);
      return matchDate >= now;
    });

    const cardWidth = 292; // 280px card + 12px gap

    if (firstFutureIndex > 0) {
      // Scroll to first future match, keeping 16px left padding
      const scrollPosition = (firstFutureIndex * cardWidth);
      setTimeout(() => {
        scrollRef.current?.scrollTo({ left: scrollPosition, behavior: 'smooth' });
      }, 100);
    } else if (firstFutureIndex === 0) {
      // First card is the future match, keep at 16px (default padding position)
      setTimeout(() => {
        scrollRef.current?.scrollTo({ left: 0, behavior: 'instant' });
      }, 100);
    }
  }, [todayMatches.length]);

  return (
    <div ref={scrollRef} style={{ display:'flex', gap:12, paddingLeft:16, paddingRight:16, paddingTop:8, paddingBottom:20, overflowX:'auto', scrollSnapType:'x mandatory', scrollPaddingLeft:16 }} className="scrollbar-hide">
      {todayMatches.map(m => (
        <div key={m.id} style={{ scrollSnapAlign:'center', flexShrink:0 }}>
          <TodayMatchCard m={m} onMatch={onMatch} tweaks={tweaks} allMatches={matches}/>
        </div>
      ))}
    </div>
  );
}

// ─── SCREEN: HOME V2 — Editorial ─────────────────────────────
function HomeV2({ onMatch, onPlayer, onNotif, tweaks, liveApiMatches = [], worldCupMatches = [], isLoading = false, scrollTopKey = 0, onRefresh, unreadCount = 0, nativeTabBar = false }) {
  const homeScrollRef = React.useRef(null);
  React.useEffect(() => { if (scrollTopKey > 0) homeScrollRef.current?.scrollTo({ top: 0, behavior: 'smooth' }); }, [scrollTopKey]);
  // Pull-to-refresh
  const [pullY, setPullY] = React.useState(0);
  const [refreshing, setRefreshing] = React.useState(false);
  const touchStartY = React.useRef(0);
  const PULL_THRESHOLD = 64;
  const handleHomeTouchStart = (e) => { touchStartY.current = e.touches[0].clientY; };
  const handleHomeTouchMove = (e) => {
    if (refreshing) return;
    const scrollTop = homeScrollRef.current?.scrollTop || 0;
    if (scrollTop > 0) return;
    const dy = e.touches[0].clientY - touchStartY.current;
    if (dy > 0) setPullY(Math.min(dy * 0.45, PULL_THRESHOLD + 16));
  };
  const handleHomeTouchEnd = async () => {
    if (pullY >= PULL_THRESHOLD && onRefresh && !refreshing) {
      setRefreshing(true);
      setPullY(PULL_THRESHOLD);
      // Safety: cap PTR spinner duration so it never sticks.
      const ptrSafety = setTimeout(() => setRefreshing(false), 12000);
      try { await onRefresh(); } catch (e) { console.warn('PTR refresh error:', e); }
      clearTimeout(ptrSafety);
      setRefreshing(false);
    }
    setPullY(0);
  };
  // State for real-time countdown updates
  const [currentTime, setCurrentTime] = React.useState(new Date());
  const [hlBgImg, setHlBgImg] = React.useState(null);
  const [hlLiveMinute, setHlLiveMinute] = React.useState('');

  // Update current time every second for countdown
  React.useEffect(() => {
    const interval = setInterval(() => {
      setCurrentTime(new Date());
    }, 1000);
    return () => clearInterval(interval);
  }, []);

  // Combine static and API matches
  const allMatches = [...MATCHES, ...liveApiMatches];
  const liveMatches = allMatches.filter(m => m.live || m.time === 'LIVE');

  // Filter matches for today (including past results)
  const now = currentTime;
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
  const endOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  const twelveHoursLater = new Date(now.getTime() + 12 * 60 * 60 * 1000);

  const isFinalStatus = (status) => ['STATUS_FINAL','STATUS_FULL_TIME','final','STATUS_END_PERIOD','STATUS_FINAL_PEN'].includes(status);

  const upcoming = allMatches
    .filter(m => {
      if (m.live || m.time === 'LIVE') return false;
      if (!m.fullDate) return false; // Only show matches with valid dates
      const matchDate = new Date(m.fullDate);
      return matchDate >= now && matchDate <= twelveHoursLater;
    })
    .sort((a, b) => new Date(a.fullDate) - new Date(b.fullDate)); // Sort by soonest first

  const finishedWithKorean = allMatches
    .filter(m => isFinalStatus(m.status) && m.koreanPlayer && m.koreanPlayer.event !== '미출전')
    .sort((a, b) => new Date(b.fullDate || 0) - new Date(a.fullDate || 0));

  const finishedTodayWithKorean = allMatches
    .filter(m => {
      if (!isFinalStatus(m.status) || !m.koreanPlayer || !m.fullDate) return false;
      if (m.koreanPlayer.event === '미출전') return false;
      const matchDate = new Date(m.fullDate);
      return matchDate >= startOfToday && matchDate <= now;
    })
    .sort((a, b) => new Date(b.fullDate || 0) - new Date(a.fullDate || 0));

  const upcomingTodayWithKorean = allMatches
    .filter(m => {
      if (m.live || m.time === 'LIVE' || !m.koreanPlayer || !m.fullDate) return false;
      if (isFinalStatus(m.status)) return false;
      const matchDate = new Date(m.fullDate);
      return matchDate > now && matchDate <= endOfToday;
    })
    .sort((a, b) => new Date(a.fullDate || 0) - new Date(b.fullDate || 0));

  // Today's matches pool — shared with TodayMatchesCarousel so highlight & carousel
  // are guaranteed to draw from the exact same set of matches.
  const todayMatches = allMatches
    .filter(m => {
      if (!m.koreanPlayer) return false;
      if (!m.fullDate) return false;
      if (m.live || m.time === 'LIVE') return true;
      const matchDate = new Date(m.fullDate);
      const isFinished = isFinalStatus(m.status);
      const isToday = matchDate >= startOfToday && matchDate <= endOfToday;
      const isUpcoming = matchDate > now && matchDate <= twelveHoursLater;
      return (isFinished && isToday) || isUpcoming;
    })
    .sort((a, b) => new Date(a.fullDate) - new Date(b.fullDate));

  // Highlight: pick the match with the biggest Korean-player impact from today's pool.
  // Live » goals » assists » recency. Excludes matches where the Korean did not play.
  const getHighlightMatch = () => {
    const eligible = todayMatches.filter(m => m.koreanPlayer?.event !== '미출전');
    if (eligible.length === 0) return null;

    const isLive = m => m.live || m.time === 'LIVE';
    const isFinal = m => isFinalStatus(m.status);
    const goals = m => m.koreanPlayer?.matchGoals || 0;
    const assists = m => m.koreanPlayer?.matchAssists || 0;

    const score = m => {
      let s = 0;
      if (isLive(m)) s += 1000;            // live always outranks non-live
      s += goals(m) * 100;                  // each goal: massive impact
      s += assists(m) * 50;                 // each assist: big impact
      if (isFinal(m)) {
        const hoursAgo = (now - new Date(m.fullDate)) / 3600000;
        s += Math.max(0, 30 - hoursAgo * 5); // recency boost: 0h→+30, 6h+→0
      } else if (!isLive(m)) {
        const hoursUntil = (new Date(m.fullDate) - now) / 3600000;
        s += Math.max(0, 25 - hoursUntil * 2); // imminence boost: 0h→+25, 12.5h→0
      }
      return s;
    };

    const best = [...eligible].sort((a, b) => score(b) - score(a))[0];
    if (!best) return null;
    if (isLive(best)) return { match: best, priority: 1 };
    if (isFinal(best)) return { match: best, priority: 4 };
    return { match: best, priority: 5 };
  };

  const highlightData = getHighlightMatch();
  const highlightMatch = highlightData?.match;
  const highlightPlayer = highlightMatch ? ALL_PLAYERS.find(p => p.name === highlightMatch.koreanPlayer?.name) : null;
  const heroPlayer = highlightPlayer;
  // Generate highlight text based on priority
  const getHighlightText = () => {
    if (!highlightMatch || !highlightData) return { status: '', main: '한국 선수 경기를 확인하세요', sub: '' };

    const m = highlightMatch;
    const isLive = m.live || m.time === 'LIVE';

    switch (highlightData.priority) {
      case 1: // Live match (HIGHEST PRIORITY)
        // Check if there's a goal/assist event
        const lastEvent = m.events?.[m.events.length - 1];
        const hasGoalEvent = lastEvent && (lastEvent.type === 'goal' || lastEvent.type === 'assist');

        const scoreNode = (
          <div style={{ display:'flex', alignItems:'center', gap:10, margin:'6px 0 2px' }}>
            <TeamBadge code={m.home.code} size={28} logo={m.home.logo}/>
            <span style={{ fontVariantNumeric:'tabular-nums', fontSize:32, fontWeight:900, color:'#fff', letterSpacing:-1 }}>{m.home.score ?? 0}</span>
            <span style={{ fontSize:20, color:'rgba(255,255,255,0.4)', fontWeight:300 }}>:</span>
            <span style={{ fontVariantNumeric:'tabular-nums', fontSize:32, fontWeight:900, color:'rgba(255,255,255,0.5)', letterSpacing:-1 }}>{m.away.score ?? 0}</span>
            <TeamBadge code={m.away.code} size={28} logo={m.away.logo}/>
          </div>
        );
        if (hasGoalEvent) {
          return {
            status: matchSportKey(m) === 'baseball' ? `LIVE NOW · ${m.inning || ''}` : `LIVE NOW · ${hlLiveMinute || m.minute || ''}\'`,
            main: lastEvent.type === 'goal' ? `⚽ ${m.koreanPlayer.name} 골!` : `${m.koreanPlayer.name} 어시스트!`,
            scoreNode,
            sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
          };
        } else {
          const ev = m.koreanPlayer.event || '';
          const inj = highlightPlayer?.injury;
          const notPlaying = ['', '벤치', '미출전', '마이너', '부상', '출전 예상'].includes(ev);
          const evLabel =
            (notPlaying && inj?.kind === 'minors') ? '마이너 리그' :
            (notPlaying && (inj?.kind === 'il' || inj?.kind === 'injured')) ? '부상 결장' :
            ev === '교체 출전 중' ? '교체 출전 중' : ev === '교체 아웃' ? '교체 아웃' :
            ev === '벤치' ? '벤치 대기' : ev === '미출전' ? '결장' :
            ev === '마이너' ? '마이너 리그' : ev === '부상' ? '부상 결장' :
            ev === '출전 예상' ? '출전 여부 확인 중' : '출전 중';
          return {
            status: matchSportKey(m) === 'baseball' ? `LIVE NOW · ${m.inning || ''}` : `LIVE NOW · ${hlLiveMinute || m.minute || ''}\'`,
            main: `${m.koreanPlayer.name} ${evLabel}`,
            scoreNode,
            sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
          };
        }
      case 4: // Finished match
        return { status: '경기 종료', main: '', sub: '' };
      case 5: // Upcoming
        const statusText5 = m.lineupConfirmed ? '선발 출전' : '출격 대기';
        return {
          status: m.krTime || m.time,
          main: `${m.koreanPlayer.name}\n${statusText5}`,
          sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
        };
    }
  };

  const highlightText = getHighlightText();

  // Build finished match headline helper
  const buildFinishedHeadline = (m) => {
    if (!m?.koreanPlayer) return { main: '', sub: '' };
    const kp = m.koreanPlayer;
    const name = kp.name;
    const matchGoals = m.events?.filter(e => e.type === 'goal' && e.player === name).length || 0;
    const matchAssists = m.events?.filter(e => e.type === 'assist' && e.player === name).length || 0;
    const mins = kp.minutesPlayed;
    const isMLB = (m.sport||'').includes('MLB') || (m.sport||'').includes('⚾');

    let main = name;
    if (isMLB) {
      const parts = [];
      if (kp.hits > 0) parts.push(`${kp.hits}안타`);
      if (kp.homeRuns > 0) parts.push(`${kp.homeRuns}홈런`);
      if (kp.rbi > 0) parts.push(`${kp.rbi}타점`);
      main = parts.length > 0 ? `${name} ${parts.join(' ')}` : `${name} 출전`;
    } else {
      const parts = [];
      if (matchGoals > 0) parts.push(`${matchGoals}골`);
      if (matchAssists > 0) parts.push(`${matchAssists}도움`);
      main = parts.length > 0 ? `${name} ${parts.join(' ')}` : `${name} ${mins >= 90 ? '풀타임 활약' : mins > 0 ? `${mins}분 출전` : '출전'}`;
    }

    const homeWin = m.home.score > m.away.score;
    const draw = m.home.score === m.away.score;
    const resultText = draw ? '무승부' : homeWin ? `${m.home.name} 승` : `${m.away.name} 승`;
    const scoreText = `${m.home.score}-${m.away.score}`;
    const minsText = !isMLB && mins >= 90 ? '선발 풀타임' : !isMLB && mins > 0 ? `${mins}분 출전` : '';
    const sub = [minsText, `${m.home.name} ${scoreText} ${m.away.name}`, resultText].filter(Boolean).join(' · ');

    return { main, sub };
  };

  const isFinishedHighlight = highlightData?.priority === 4;
  const finishedHeadline = isFinishedHighlight ? buildFinishedHeadline(highlightMatch) : null;

  // landscape image map: Korean name → filename in image/landscape/
  const LANDSCAPE_MAP = {
    '손흥민': 'heungmin.jpg', '이강인': 'kangin.png', '김민재': 'minjae.jpeg',
    '조규성': 'guesung.jpeg', '황희찬': 'heechan.jpeg', '황인범': 'inbeom.png',
    '김하성': 'haseong.jpeg', '이정후': 'junghoo.jpeg', '김혜성': 'hyesung.jpeg',
    '오현규': 'hyeongyu.jpeg', '양현준': 'hyunjun.jpeg',
    '백승호': 'seungho.png', '배준호': 'junho.jpeg', '엄지성': 'jisung.jpeg',
    '설영우': 'youngwoo.jpeg',
  };
  React.useEffect(() => {
    const playerName = highlightMatch?.koreanPlayer?.name;
    const landscapeFile = LANDSCAPE_MAP[playerName];
    setHlBgImg(landscapeFile ? `image/landscape/${landscapeFile}` : null);
  }, [highlightMatch?.koreanPlayer?.name]);

  // Real-time minute for highlight live match
  React.useEffect(() => {
    if (!highlightMatch?.live || !highlightMatch.periodStartTs) {
      setHlLiveMinute(highlightMatch?.minute || '');
      return;
    }
    const calc = () => {
      const mins = Math.floor((Date.now()/1000 - highlightMatch.periodStartTs) / 60);
      setHlLiveMinute(String(Math.max(0, mins + ((highlightMatch.sfPeriod || 1) >= 2 ? 45 : 0))));
    };
    calc();
    const iv = setInterval(calc, 30000);
    return () => clearInterval(iv);
  }, [highlightMatch?.id, highlightMatch?.live, highlightMatch?.periodStartTs, highlightMatch?.sfPeriod]);

  // Show skeleton on initial load
  if (isLoading) {
    return (
      <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
        <SkeletonHighlight/>
        <div style={{ padding:'16px 16px 8px' }}>
          <div style={{ width:80, height:16, background:'var(--border)', borderRadius:6, opacity:0.5 }}/>
        </div>
        <div style={{ display:'flex', gap:10, padding:'8px 16px 20px', overflowX:'auto' }} className="scrollbar-hide">
          <SkeletonMatchCard/>
          <SkeletonMatchCard/>
          <SkeletonMatchCard/>
        </div>
        <SkeletonUpcomingMatch/>
        <SkeletonUpcomingMatch/>
        <SkeletonUpcomingMatch/>
      </div>
    );
  }

  return (
    <div ref={homeScrollRef} onTouchStart={handleHomeTouchStart} onTouchMove={handleHomeTouchMove} onTouchEnd={handleHomeTouchEnd} style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
      <div style={{ overflow:'hidden', height: pullY, transition: pullY === 0 ? 'height 0.25s ease' : 'none', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, opacity: Math.min(pullY / PULL_THRESHOLD, 1) }}>
          <div style={{ width:18, height:18, border:'2.5px solid var(--acc)', borderTopColor:'transparent', borderRadius:'50%', animation: refreshing || pullY >= PULL_THRESHOLD ? 'spin 0.7s linear infinite' : 'none', transform: !refreshing && pullY < PULL_THRESHOLD ? `rotate(${pullY * 4}deg)` : undefined }}/>
          <span style={{ fontSize:12, color:'var(--text3)', fontWeight:600 }}>{refreshing ? '새로고침 중...' : pullY >= PULL_THRESHOLD ? '놓아서 새로고침' : '당겨서 새로고침'}</span>
        </div>
      </div>

      {/* ── HIGHLIGHT CARD (finished + live/upcoming share same layout) ── */}
      {isFinishedHighlight ? (() => {
        const kp = highlightMatch.koreanPlayer;
        const isMLB = (highlightMatch.sport||'').includes('MLB') || (highlightMatch.sport||'').includes('⚾');
        const homeIsKorean = kp.team === highlightMatch.home.code;
        const eventsGoals = (highlightMatch.events||[]).filter(e=>e.type==='goal'&&e.player===kp.name).length;
        const eventsAssists = (highlightMatch.events||[]).filter(e=>e.type==='assist'&&e.player===kp.name).length;
        const goals = (kp.matchGoals != null && kp.matchGoals > 0) ? kp.matchGoals : eventsGoals;
        const assists = (kp.matchAssists != null && kp.matchAssists > 0) ? kp.matchAssists : eventsAssists;
        const statParts = [];
        if (isMLB) {
          const h = kp.hits || 0, hr = kp.homeRuns || 0, rbi = kp.rbi || 0, r = kp.runs || 0, sb = kp.stolenBases || 0;
          if (h > 0) statParts.push(`${h}안타`);
          if (hr > 0) statParts.push(`${hr}홈런`);
          if (rbi > 0) statParts.push(`${rbi}타점`);
          if (sb > 0) statParts.push(`${sb}도루`);
          if (r > 0) statParts.push(`${r}득점`);
          if (statParts.length === 0) statParts.push(kp.event || '출전');
        } else {
          if (goals > 0) statParts.push(`${goals}골`);
          if (assists > 0) statParts.push(`${assists}도움`);
          const ev = kp.event || '';
          const mins = kp.minutesPlayed;
          const minText = (ev === '풀타임' || mins >= 90) ? '풀타임 출전'

              {highlightMatch?.home?.logo && <img src={highlightMatch.home.logo} alt="" style={{ position:'absolute', right:-30, top:'50%', transform:'translateY(-50%)', width:200, height:200, objectFit:'contain', opacity:0.08, filter:'blur(2px)' }}/>}

        }

        <div style={{ position:'absolute', top:12, left:20, right:20, display:'flex', justifyContent:'space-between', alignItems:'center', zIndex:2 }}>
          <span style={{ fontSize:15, fontWeight:900, color:'#fff', letterSpacing:2, textTransform:'uppercase' }}>JUMO</span>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={e => { e.stopPropagation(); onNotif(); }} style={{ ...LG.base, ...LG.circle, color:'rgba(255,255,255,0.85)', position:'relative', display: nativeTabBar ? 'none' : 'flex' }}>
              <svg width="18" height="18" viewBox="0 0 22 22" fill="none"><path d="M11 2a7 7 0 00-7 7v4l-1.5 2.5h17L18 13V9a7 7 0 00-7-7z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round" fill="none"/><path d="M9 18.5a2 2 0 004 0" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
              {unreadCount > 0 && <span style={{ position:'absolute', top:-2, right:-2, minWidth:16, height:16, padding:'0 4px', borderRadius:8, background:'#e63030', color:'#fff', fontSize:9, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 0 0 1.5px rgba(0,0,0,0.4)' }}>{unreadCount > 99 ? '99+' : unreadCount}</span>}

      {(() => {
        // Show today's matches + upcoming within 12 hours, deduplicated
        const seenIds = new Set();
        const thisWeekMatches = allMatches
          .filter(m => {
            if (!m.koreanPlayer || !m.fullDate) return false;
            if (seenIds.has(m.id)) return false;
            seenIds.add(m.id);
            if (m.live || m.time === 'LIVE') return true; // always show live
            const matchDate = new Date(m.fullDate);
            return matchDate >= startOfToday && matchDate <= twelveHoursLater;
          })
          .sort((a, b) => {
            const dateA = new Date(a.fullDate);
            const dateB = new Date(b.fullDate);
            return dateA - dateB;
          });

        if (thisWeekMatches.length === 0) return null;

        const todayStr = now.toDateString();

          const s = new Date(d).toDateString();
          if (s === todayStr) return '오늘';
          if (s === tomorrowStr) return '내일';

        let lastDateLabel = null;

              const isLiveMatch = m.live || m.time === 'LIVE';
              const thisDateLabel = isLiveMatch ? '오늘' : getDateLabel(m.fullDate);
              const showHeader = !isLiveMatch && thisDateLabel !== lastDateLabel;
              if (showHeader) lastDateLabel = thisDateLabel;

              const header = showHeader ? (
                <div key={`hdr-${thisDateLabel}`} style={{ padding:'16px 0 6px', fontSize:11, fontWeight:700, color:'var(--text4)', letterSpacing:1.2, textTransform:'uppercase' }}>
                  {thisDateLabel}
                </div>
              ) : null;

              if (isFinished) {
                // FINISHED MATCH DISPLAY
                const koreanTeam = m.koreanPlayer?.team;
                const isHomeTeam = koreanTeam === m.home.code;
                const koreanScore = isHomeTeam ? m.home.score : m.away.score;
                const opponentScore = isHomeTeam ? m.away.score : m.home.score;
                const isWin = koreanScore > opponentScore;
                const isDraw = koreanScore === opponentScore;

                return (
                  <React.Fragment key={m.id}>
                  {header}
                  <div onClick={() => onMatch(m)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 0', cursor:'pointer', borderBottom:'0.5px solid var(--border)' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, justifyContent:'flex-end', minWidth:0 }}>
                      <span style={{ fontSize:14, fontWeight:600, color:'var(--text)', textAlign:'right' }}>{m.home.name}</span>
                      <TeamBadge code={m.home.code} size={24} logo={m.home.logo}/>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flexShrink:0, padding:'0 16px' }}>
                      <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.home.score}</span>
                      <span style={{ fontSize:14, color:'var(--text5)' }}>-</span>
                      <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.away.score}</span>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0 }}>
                      <TeamBadge code={m.away.code} size={24} logo={m.away.logo}/>
                      <span style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>{m.away.name}</span>
                    </div>
                  </div>
                  </React.Fragment>
                );
              } else if (m.live || m.time === 'LIVE') {
                // LIVE MATCH DISPLAY
                return (
                  <React.Fragment key={m.id}>
                  {header}
                  <div onClick={() => onMatch(m)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 0', cursor:'pointer', borderBottom:'0.5px solid var(--border)' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, justifyContent:'flex-end', minWidth:0 }}>
                      <span style={{ fontSize:14, fontWeight:600, color:'var(--text)', textAlign:'right' }}>{m.home.name}</span>
                      <TeamBadge code={m.home.code} size={24} logo={m.home.logo}/>
                    </div>
                    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2, flexShrink:0, padding:'0 16px' }}>
                      <span style={{ fontSize:9, fontWeight:800, color:'var(--acc)', letterSpacing:1, animation:'pulse 2s ease-in-out infinite' }}>LIVE</span>
                      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                        <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.home.score ?? 0}</span>
                        <span style={{ fontSize:12, color:'var(--text5)' }}>-</span>
                        <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.away.score ?? 0}</span>
                      </div>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0 }}>
                      <TeamBadge code={m.away.code} size={24} logo={m.away.logo}/>
                      <span style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>{m.away.name}</span>
                    </div>
                  </div>
                  </React.Fragment>
                );
              } else {
                // UPCOMING MATCH DISPLAY
                const date = new Date(m.fullDate);
                const hours = String(date.getHours()).padStart(2, '0');
                const mins = String(date.getMinutes()).padStart(2, '0');
                const timeDisplay = m.fullDate ? `${hours}:${mins}` : '—';

                return (
                  <React.Fragment key={m.id}>
                  {header}
                  <div onClick={() => onMatch(m)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 0', cursor:'pointer', borderBottom:'0.5px solid var(--border)' }}>

                      <TeamBadge code={m.home.code} size={24} logo={m.home.logo}/>
                    </div>
                    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2, flexShrink:0, padding:'0 16px' }}>
                      <span style={{ ...NUM, fontSize:13, fontWeight:700, color:'var(--text3)' }}>{timeDisplay}</span>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0 }}>
                      <TeamBadge code={m.away.code} size={24} logo={m.away.logo}/>
                      <span style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>{m.away.name}</span>
                    </div>
                  </div>
                  </React.Fragment>
                );
              }
            })}
          </div>
        );
      })()}

      {/* 2026 World Cup — South Korea national-team fixtures, shown as a separate
          block at the very bottom of the home screen (team matches only). */}
      {worldCupMatches.length > 0 && (
        <div style={{ margin:'8px 16px 0', padding:'8px 0 4px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:14 }}>
            <span style={{ fontSize:17 }}>🇰🇷</span>
            <span style={{ fontSize:15, fontWeight:800, color:'var(--text)' }}>2026 월드컵</span>
            <span style={{ fontSize:11, fontWeight:700, color:'var(--text4)' }}>대한민국 조별리그</span>
          </div>
          {worldCupMatches.map(m => {
            const d = new Date(m.fullDate);
            const dateStr = d.toLocaleDateString('ko-KR', { timeZone:'Asia/Seoul', month:'long', day:'numeric', weekday:'short' });
            const timeStr = d.toLocaleTimeString('ko-KR', { timeZone:'Asia/Seoul', hour:'2-digit', minute:'2-digit', hour12:false });
            const showScore = m.live || m.state === 'post';
            const draw = m.home.score === m.away.score;
            const homeWin = m.home.score > m.away.score;
            const koreaWon = showScore && !draw && ((m.koreaIsHome && homeWin) || (!m.koreaIsHome && !homeWin));
            const resultTag = !showScore || m.live ? '' : draw ? '무' : koreaWon ? '승' : '패';
            const resultColor = resultTag === '승' ? 'var(--acc)' : resultTag === '패' ? 'var(--text4)' : 'var(--text3)';
            return (
              <div key={m.id} onClick={() => onMatch && onMatch(m)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 0', cursor:'pointer', borderBottom:'0.5px solid var(--border)' }}>
                {/* home: name + badge (right-aligned, mirrors 오늘/내일 rows) */}
                <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, justifyContent:'flex-end', minWidth:0 }}>
                  <span style={{ fontSize:14, fontWeight: m.koreaIsHome ? 800 : 600, color:'var(--text)', textAlign:'right', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.home.koName}</span>
                  <TeamBadge code={m.home.code} size={24} logo={m.home.logo}/>
                </div>
                {/* middle: score (live/finished) or date+time (upcoming) */}
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2, flexShrink:0, padding:'0 14px', minWidth:74 }}>
                  {showScore ? (
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.home.score}</span>
                      <span style={{ fontSize:14, color:'var(--text5)' }}>-</span>
                      <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.away.score}</span>
                    </div>
                  ) : (
                    <>
                      <span style={{ fontSize:11, fontWeight:700, color:'var(--text4)' }}>{dateStr}</span>
                      <span style={{ ...NUM, fontSize:13, fontWeight:700, color:'var(--text3)' }}>{timeStr}</span>
                    </>
                  )}
                  {m.live ? (
                    <span style={{ fontSize:9, fontWeight:800, color:'var(--acc)', letterSpacing:0.5 }}>● LIVE</span>
                  ) : resultTag ? (
                    <span style={{ fontSize:10, fontWeight:800, color:resultColor }}>{resultTag}</span>
                  ) : null}
                </div>
                {/* away: badge + name */}
                <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0 }}>
                  <TeamBadge code={m.away.code} size={24} logo={m.away.logo}/>
                  <span style={{ fontSize:14, fontWeight: !m.koreaIsHome ? 800 : 600, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.away.koName}</span>
                </div>

          })}
        </div>
      )}

      <div style={{ height:'calc(96px + env(safe-area-inset-bottom))' }}/>
    </div>
  );

// ─── TEAM CHEER METER (tap-to-cheer, proportional bar) ────────
const CHEER_BRAND = { TOT:'#1c2a52', MCI:'#2f5d8a', PSG:'#0a2472', OL:'#2a6cb0', LAD:'#15467e', TOR:'#1a4a8a', FCB:'#7a0a2e', BVB:'#7e7000', ATL:'#a01030', GEN:'#a51a20', BAY:'#7a0a2a', FEY:'#a01818', NEW:'#222222' };
function cheerColor(code, side) {
  if (code && CHEER_BRAND[code]) return CHEER_BRAND[code];
  if (!code) return side === 'home' ? '#2c313a' : '#26384e';
  let h = 0; for (let i = 0; i < code.length; i++) h = (h * 31 + code.charCodeAt(i)) % 360;
  return `hsl(${h}, 40%, 26%)`;
}
function TeamCheerMeter({ match, isLive, isFinished }) {
  const mid = String(match.id);
  const LSK = `jumo_cheer_${mid}`;
  const readLS = () => { try { return JSON.parse(localStorage.getItem(LSK) || '{}'); } catch { return {}; } };
  const [counts, setCounts] = React.useState(() => { const s = readLS(); return { home: s.home || 0, away: s.away || 0 }; });
  const [floats, setFloats] = React.useState([]);
  const pending = React.useRef({ home: 0, away: 0 });
  const inFlight = React.useRef(false);
  const timer = React.useRef(null);
  const fid = React.useRef(0);
  const persist = (c) => { try { localStorage.setItem(LSK, JSON.stringify(c)); } catch {} };

  const flush = React.useCallback(async () => {
    if (inFlight.current) return;
    const n = { ...pending.current };
    if (!n.home && !n.away) return;
    pending.current = { home: 0, away: 0 };
    inFlight.current = true;
    try {
      for (const team of ['home', 'away']) {
        if (n[team] > 0) {
          const { data, error } = await SB.rpc('add_cheers', { p_match_id: mid, p_team: team, p_n: n[team] });
          if (error) throw error;
          if (typeof data === 'number') setCounts(c => { const nc = { ...c, [team]: data + pending.current[team] }; persist(nc); return nc; });
        }
      }
    } catch { /* backend not set up yet → stay local-only (optimistic counts persist) */ }
    finally { inFlight.current = false; }
  }, [mid]);

  const tap = (team) => {
    setCounts(c => { const nc = { ...c, [team]: c[team] + 1 }; persist(nc); return nc; });
    pending.current[team] += 1;
    const id = ++fid.current;
    setFloats(f => [...f, { id, team }]);
    setTimeout(() => setFloats(f => f.filter(x => x.id !== id)), 700);
    if (timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(flush, 650);
  };

  React.useEffect(() => {
    let alive = true;
    const fetchCounts = async () => {
      try {
        const { data, error } = await SB.from('match_cheers').select('team,count').eq('match_id', mid);
        if (error) throw error;
        if (!alive) return;
        const srv = { home: 0, away: 0 };
        (data || []).forEach(r => { if (r.team === 'home' || r.team === 'away') srv[r.team] = Number(r.count) || 0; });
        setCounts(() => { const nc = { home: srv.home + pending.current.home, away: srv.away + pending.current.away }; persist(nc); return nc; });
      } catch { /* keep local */ }
    };
    fetchCounts();
    const iv = setInterval(() => { if (!inFlight.current && !pending.current.home && !pending.current.away) fetchCounts(); }, 12000);
    return () => { alive = false; clearInterval(iv); if (timer.current) clearTimeout(timer.current); flush(); };
  }, [mid, flush]);

  const total = counts.home + counts.away;
  const hShare = total > 0 ? Math.max(0.28, Math.min(0.72, counts.home / total)) : 0.5;
  const hPct = hShare * 100;
  const statusText = isFinished ? '종료' : (isLive ? 'LIVE' : 'VS');
  const statusColor = isLive ? 'var(--acc)' : 'rgba(255,255,255,0.6)';

  const renderSide = (team, t, alignRight) => (
    <button onClick={() => tap(team)} aria-label={`${t.name} 응원`}
      style={{ width:`calc(${team === 'home' ? hPct : 100 - hPct}% - 3px)`, transition:'width 0.45s cubic-bezier(.4,0,.2,1)',
        flexShrink:0, height:'100%', position:'relative', overflow:'hidden', cursor:'pointer', WebkitTapHighlightColor:'transparent',
        background:cheerColor(t.code, team), border:'none', borderRadius:14, padding:'10px 13px',
        display:'flex', flexDirection:'column', justifyContent:'space-between', alignItems: alignRight ? 'flex-end' : 'flex-start' }}>
      <TeamBadge code={t.code} size={26} logo={t.logo}/>
      <span key={counts[team]} style={{ ...NUM, fontSize:20, fontWeight:800, color:'#fff', lineHeight:1, letterSpacing:-0.5, animation:'cheerPop 0.25s ease' }}>{counts[team].toLocaleString()}</span>
      {floats.filter(f => f.team === team).map(f => (
        <span key={f.id} style={{ position:'absolute', bottom:30, [alignRight ? 'right' : 'left']:16, ...NUM, fontSize:15, fontWeight:800, color:'#fff', pointerEvents:'none', animation:'cheerFloat 0.7s ease-out forwards' }}>+1</span>
      ))}
    </button>
  );

  return (
    <div style={{ marginTop:20 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:10 }}>
        <div style={{ fontSize:12, color:'var(--text3)', fontWeight:600 }}>팀 응원</div>
        <div style={{ fontSize:11, color:'var(--text5)' }}>탭해서 응원 · {total.toLocaleString()}</div>
      </div>
      <div style={{ position:'relative', display:'flex', gap:6, height:74 }}>
        {renderSide('home', match.home, false)}
        {renderSide('away', match.away, true)}
        <div style={{ position:'absolute', left:`${hPct}%`, top:'50%', transform:'translate(-50%,-50%)', zIndex:3,
          background:'rgba(10,10,12,0.82)', backdropFilter:'blur(6px)', WebkitBackdropFilter:'blur(6px)',
          border:'0.5px solid rgba(255,255,255,0.14)', borderRadius:11, padding:'4px 10px', fontSize:11, fontWeight:800,
          letterSpacing:0.3, color:statusColor, whiteSpace:'nowrap', transition:'left 0.45s cubic-bezier(.4,0,.2,1)',
          display:'flex', alignItems:'center', gap:4 }}>
          {isLive && <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--acc)', display:'inline-block' }}/>}
          {statusText}
        </div>
      </div>
    </div>
  );
}

  const [incidentsLoading, setIncidentsLoading] = React.useState(false);
  const [mlbSummary, setMlbSummary] = React.useState(null);
  const [mlbLoading, setMlbLoading] = React.useState(false);

  const isSoccerMatch = !((match.sport||'').includes('MLB') || (match.sport||'').includes('⚾'));
  const isMLBMatch = !isSoccerMatch;

  // MLB summary covers events + stats + lineups in one shot
  React.useEffect(() => {
    if (!isMLBMatch || mlbSummary || !(tab === 'events' || tab === 'stats' || tab === 'lineups')) return;
    if (!(isFinished || isLive)) return;
    setMlbLoading(true);
    fetch(`https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/summary?event=${match.id}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => { setMlbSummary(data); setMlbLoading(false); })
      .catch(() => { setMlbLoading(false); });
  }, [tab, match.id, isFinished, isLive, isMLBMatch]);

  // Transform API-Football detail responses → Sofascore-shape that the existing
  // renderers below already expect. This keeps the rendering JSX untouched.
  const transformAfEvents = (afResp) => {
    if (!Array.isArray(afResp)) return null;
    const incidents = afResp.map(e => {
      const isHome = e.team?.name === match.home.name;
      const base = { time: e.time?.elapsed, addedTime: e.time?.extra ?? undefined, isHome };
      if (e.type === 'Goal') {
        let cls = 'normal';
        if (e.detail === 'Own Goal') cls = 'ownGoal';
        else if (e.detail === 'Penalty') cls = 'penalty';
        else if (e.detail === 'Missed Penalty') cls = 'missedPenalty';
        return { ...base, incidentType: 'goal', incidentClass: cls,
          player: { name: e.player?.name }, assist1: e.assist?.name ? { name: e.assist.name } : null };
      }
      if (e.type === 'Card') {
        let cls = 'yellow';
        if (e.detail === 'Red Card') cls = 'red';
        else if (e.detail === 'Second Yellow card') cls = 'yellowRed';
        return { ...base, incidentType: 'card', incidentClass: cls,
          player: { name: e.player?.name }, reason: e.comments || '' };
      }
      if (e.type === 'subst') {
        // API-Football: player = coming OFF (OUT), assist = coming ON (IN)
        return { ...base, incidentType: 'substitution',
          playerIn: { name: e.assist?.name }, playerOut: { name: e.player?.name } };
      }
      if (e.type === 'Var') {
        return { ...base, incidentType: 'varDecision', text: e.detail || '' };
      }
      return null;
    }).filter(Boolean);
    return { incidents };
  };

  const transformAfLineups = (afLineupsResp, afPlayersResp) => {
    if (!Array.isArray(afLineupsResp) || afLineupsResp.length === 0) return null;
    const ratingMap = new Map();
    (afPlayersResp || []).forEach(team => {
      (team.players || []).forEach(entry => {
        const id = entry.player?.id;
        const r = (entry.statistics || [{}])[0]?.games?.rating;
        if (id != null && r != null) ratingMap.set(id, r);
      });
    });
    const mapTeam = (afTeam) => {
      if (!afTeam) return null;
      const mapPlayer = (e, sub) => ({
        player: { name: e.player?.name, jerseyNumber: e.player?.number, id: e.player?.id },
        substitute: sub,
        statistics: ratingMap.has(e.player?.id) ? { rating: ratingMap.get(e.player.id) } : {},
      });
      return {
        formation: afTeam.formation,
        players: [
          ...(afTeam.startXI || []).map(e => mapPlayer(e, false)),
          ...(afTeam.substitutes || []).map(e => mapPlayer(e, true)),
        ],
      };
    };
    const home = afLineupsResp.find(t => t.team?.name === match.home.name) || afLineupsResp[0];
    const away = afLineupsResp.find(t => t.team?.name === match.away.name) || afLineupsResp[1];
    return { home: mapTeam(home), away: mapTeam(away) };
  };

  const transformAfStats = (afResp) => {
    if (!Array.isArray(afResp) || afResp.length === 0) return null;
    const home = afResp.find(t => t.team?.name === match.home.name) || afResp[0];
    const away = afResp.find(t => t.team?.name === match.away.name) || afResp[1];
    const homeMap = new Map();
    (home?.statistics || []).forEach(s => homeMap.set(s.type, s.value));
    const awayMap = new Map();
    (away?.statistics || []).forEach(s => awayMap.set(s.type, s.value));
    // Translate API-Football stat names to the Sofascore-style keys that the
    // renderer's STAT_LABELS already covers (점유율, 슈팅, 패스 등).
    const TYPE_MAP = {
      'Ball Possession':'Ball possession', 'Total Shots':'Total shots',
      'Shots on Goal':'Shots on target', 'Shots off Goal':'Shots off target',
      'Blocked Shots':'Blocked shots', 'Fouls':'Fouls', 'Corner Kicks':'Corner kicks',
      'Offsides':'Offsides', 'Yellow Cards':'Yellow cards', 'Red Cards':'Red cards',
      'Goalkeeper Saves':'Goalkeeper saves', 'Total passes':'Passes',
      'Passes accurate':'Accurate passes', 'expected_goals':'Expected goals',
    };
    const order = Object.keys(TYPE_MAP);
    const items = order.filter(k => homeMap.has(k) || awayMap.has(k)).map(k => ({
      name: TYPE_MAP[k],
      home: homeMap.get(k) ?? '',
      away: awayMap.get(k) ?? '',
    }));
    return { statistics: [{ period: 'ALL', groups: [{ groupName: 'Match overview', statisticsItems: items }] }] };
  };

  React.useEffect(() => {
    if (tab !== 'events' || incidentsData || !(isFinished || isLive)) return;
    if (!isSoccerMatch) return;
    setIncidentsLoading(true);
    fetch(`${API_BASE}/api/apifootball?path=fixtures/events&fixture=${match.id}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => { setIncidentsData(transformAfEvents(data?.response)); setIncidentsLoading(false); })
      .catch(() => { setIncidentsLoading(false); });
  }, [tab, match.id, isFinished, isLive]);

  React.useEffect(() => {
    if (tab !== 'lineups' || lineupsData || !(isFinished || isLive)) return;
    if (!isSoccerMatch) return;
    setLineupsLoading(true);
    Promise.all([
      fetch(`${API_BASE}/api/apifootball?path=fixtures/lineups&fixture=${match.id}`).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`${API_BASE}/api/apifootball?path=fixtures/players&fixture=${match.id}`).then(r => r.ok ? r.json() : null).catch(() => null),
    ]).then(([lineupsJson, playersJson]) => {
      setLineupsData(transformAfLineups(lineupsJson?.response, playersJson?.response));
      setLineupsLoading(false);

  }, [tab, match.id, isFinished, isLive]);

  React.useEffect(() => {
    if (tab !== 'stats' || statsData || !(isFinished || isLive)) return;
    if (!isSoccerMatch) return;
    setStatsLoading(true);
    fetch(`${API_BASE}/api/apifootball?path=fixtures/statistics&fixture=${match.id}`)

  }, [tab, match.id, isFinished, isLive]);
  const typeColor = { goal:'var(--acc)', yellow:'#f5c518', red:'#e03030', assist:'var(--text2)' };

  // Countdown for upcoming matches

    if (!isLive && !isFinished && match.fullDate) {
      const updateCountdown = () => {
        const now = new Date();

        if (diff > 0) {
          const hours = Math.floor(diff / (1000 * 60 * 60));

              s = s.replace(/\bto deep center\b/gi, ' 중앙 깊은 곳으로');
              s = s.replace(/\bto shallow left\b/gi, ' 좌측 얕은 곳으로');
              s = s.replace(/\bto shallow right\b/gi, ' 우측 얕은 곳으로');
              s = s.replace(/\bto left center\b/gi, ' 좌중간으로');
              s = s.replace(/\bto right center\b/gi, ' 우중간으로');

            const koreans = (match.koreanPlayers || [match.koreanPlayer]).filter(Boolean);

            const koreanTokens = [];

              const canonical = ALL_PLAYERS.find(p => p.name === kp.name)?.nameEn || kp.nameEn || '';
              canonical.split(/[\s-]+/).filter(t => t.length >= 2).forEach(t => koreanTokens.push(t));
            });
            // De-dupe and filter very common words
            const COMMON = new Set(['Lee','Kim']); // intentionally keep — Kim/Lee are valid for our players
            const uniqueTokens = [...new Set(koreanTokens)];
            const isKoreanPlay = (text) => uniqueTokens.some(t => text && text.includes(t));

      {tab === 'events' && !isMLBMatch && (

            }
            const incidents = (incidentsData?.incidents || []).filter(inc => {
              const t = inc.incidentType;
              return t === 'goal' || t === 'card' || t === 'substitution' || t === 'varDecision' || t === 'inGamePenalty' || t === 'period' || t === 'injuryTime';
            }).slice().reverse(); // newest first

              return <div style={{ textAlign:'center', padding:'40px 0', color:'var(--text5)', fontSize:14 }}>아직 주요 이벤트가 없습니다</div>;
            }
            const koreanNamesEn = (match.koreanPlayers || [match.koreanPlayer]).map(kp => kp?.nameEn).filter(Boolean);
            const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z\s]/g,'').trim();
            const nameMatchesKorean = (n) => {
              const a = norm(n);
              if (!a) return false;
              return koreanNamesEn.some(en => {
                const b = norm(en);
                if (!b) return false;
                if (a === b || a.includes(b) || b.includes(a)) return true;
                const at = a.split(/\s+/), bt = b.split(/\s+/);
                return at.some(t => bt.includes(t) && t.length >= 3);
              });
            };
            const formatTime = (inc) => {
              if (typeof inc.time !== 'number') return '';
              const t = inc.time;
              const at = inc.addedTime ? `+${inc.addedTime}` : '';
              return `${t}${at}'`;
            };
            const VAR_LABELS = {
              goalAwarded:'골 인정', goalNotAwarded:'골 취소', penaltyAwarded:'PK 선언', penaltyNotAwarded:'PK 취소',
              cardUpgrade:'카드 상향', cardDowngrade:'카드 하향', noCard:'카드 취소'
            };
            const PERIOD_LABELS = { '1H':'전반 시작', 'HT':'전반 종료', '2H':'후반 시작', 'FT':'경기 종료', 'AET':'연장 종료', 'AP':'승부차기 종료' };

                if (inc.player?.name) involvedNames.push(inc.player.name);
                if (inc.assist1?.name) involvedNames.push(inc.assist1.name);

                const cls = inc.incidentClass;
                icon = cls === 'red' ? '🟥' : cls === 'yellowRed' ? '🟥' : '🟨';
                title = inc.player?.name || inc.playerName || '';
                detail = cls === 'yellowRed' ? '경고누적 퇴장' : (inc.reason || (cls === 'red' ? '퇴장' : '경고'));
                if (inc.player?.name) involvedNames.push(inc.player.name);
              } else if (inc.incidentType === 'substitution') {
                icon = '🔄';
                title = inc.playerIn?.name || '';
                detail = `↑ IN  /  ${inc.playerOut?.name || ''} ↓ OUT`;
                if (inc.playerIn?.name) involvedNames.push(inc.playerIn.name);
                if (inc.playerOut?.name) involvedNames.push(inc.playerOut.name);
              } else if (inc.incidentType === 'varDecision') {
                icon = '🎥';
                title = `VAR · ${VAR_LABELS[inc.incidentClass] || inc.incidentClass || ''}`;
                detail = inc.player?.name || '';
                if (inc.player?.name) involvedNames.push(inc.player.name);
              } else if (inc.incidentType === 'inGamePenalty') {
                icon = '🟡';
                title = 'PK 선언';
                detail = inc.player?.name || '';
                if (inc.player?.name) involvedNames.push(inc.player.name);

                inc.incidentType === 'goal' ||
                inc.incidentType === 'varDecision' ||
                inc.incidentType === 'inGamePenalty' ||
                (inc.incidentType === 'card' && (inc.incidentClass === 'red' || inc.incidentClass === 'yellowRed'))
              );

              const accentColor = isKoreanEvent ? 'var(--acc)' : isHighlight ? PUR : null;
              const accentBg = isKoreanEvent ? 'rgba(245,196,0,0.12)' : isHighlight ? PUR_BG : 'var(--surface)';

              return (
                <div key={i} style={{
                  display:'flex', alignItems:'flex-start', gap:10, marginBottom:8, padding:'10px 12px',

                  <div style={{ flex:1, minWidth:0 }}>

                      {teamLogo
                        ? <img src={teamLogo} alt={teamCode} style={{ width:14, height:14, objectFit:'contain', flexShrink:0 }}/>

                  </div>
                  <div style={{ fontSize:18, flexShrink:0 }}>{icon}</div>
                </div>
              );
            };
            return incidents.map(renderInc);
          })()}

          <TeamCheerMeter match={match} isLive={isLive} isFinished={isFinished}/>
        </div>
      )}

      {/* Stats */}
      {tab === 'stats' && isMLBMatch && (() => {

          const item = (cat.stats || []).find(x => x.name === name || x.abbreviation === name);

            ['earnedRuns', '자책점'], ['walks', '볼넷'], ['strikeouts', '탈삼진'],
            ['homeRuns', '피홈런'], ['ERA', 'ERA'], ['WHIP', 'WHIP'],
          ]],

        const renderRow = ([key, label]) => {
