              statusDetail: st.shortDetail || st.detail || '',
              koreaIsHome,
              home: side(home),
              away: side(away),
              // Fields the shared match-detail screen reads. The synthetic
              // koreanPlayer (isNationalTeam) lets WC matches flow through the
              // detail view without a per-player record; the detail guards on it.
              sport: '⚽ 월드컵',
              competition: 'FIFA 월드컵',
              venue: comp.venue?.fullName || '',
              events: [],
              koreanPlayer: { name: '대한민국', nameEn: 'South Korea', team: koreaCode, number: null, position: '대표팀', isNationalTeam: true, event: '' },
            };
          })
          .sort((a, b) => new Date(a.fullDate) - new Date(b.fullDate));
        if (!cancelled) setWorldCupMatches(rows);
      } catch (e) { console.warn('World Cup fetch failed:', e?.message || e); }
    };
    fetchWC();
    const iv = setInterval(fetchWC, 60000);
    return () => { cancelled = true; clearInterval(iv); };
  }, []);

  // Adaptive polling: 20s near kickoff (so confirmed lineups land within seconds),
  // 60s otherwise. Recomputed each tick by reading the latest liveMatches via ref.
  const liveMatchesRef = React.useRef(liveMatches);
  React.useEffect(() => { liveMatchesRef.current = liveMatches; }, [liveMatches]);

  React.useEffect(() => {
    let cancelled = false;
    let timeoutId;
    const computeNextDelay = () => {
      const hasImminent = (liveMatchesRef.current || []).some(m => {
        if (m.live || m.time === 'LIVE') return true;
        if (!m.fullDate) return false;
        const til = new Date(m.fullDate).getTime() - Date.now();
        return til > -10 * 60 * 1000 && til <= 90 * 60 * 1000;
      });
      return hasImminent ? 20000 : 60000;
    };
    const tick = async () => {
      if (cancelled) return;
      await fetchLiveMatches();
      if (cancelled) return;
      timeoutId = setTimeout(tick, computeNextDelay());
    };
    tick();
    return () => { cancelled = true; clearTimeout(timeoutId); };
  }, [fetchLiveMatches]);

  // Generate notifications from match data
  React.useEffect(() => {
    const newNotifs = [];
    const now = new Date();

    liveMatches.forEach(match => {
      if (!match.koreanPlayer) return;

      const matchTime = match.fullDate ? new Date(match.fullDate) : null;
      const timeDiff = matchTime ? now - matchTime : 0;

      // Calculate time ago
      const getTimeAgo = (ms) => {
        const minutes = Math.floor(ms / 60000);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        if (minutes < 1) return '방금';
        if (minutes < 60) return `${minutes}분 전`;
        if (hours < 24) return `${hours}시간 전`;
        return `${days}일 전`;
      };

      // 1. Lineup confirmed (within 2 hours before kickoff)
      if (matchTime && !match.live && timeDiff < 0 && timeDiff > -2 * 3600000) {
        const allKoreans = match.koreanPlayers || [match.koreanPlayer];
        allKoreans.forEach(kp => {
          if (!kp?.lineupConfirmed) return;
          if (kp.event === '선발 출전') {
            newNotifs.push({
              id: `lineup-start-${match.id}-${kp.name}`,
              time: getTimeAgo(-timeDiff),
              icon: '📋',
              title: `${kp.name} 선발 출전 확정`,
              body: `${match.home.name} vs ${match.away.name} · ${match.krTime || match.time}`,
              type: 'lineup_start',
              live: false,
              timestamp: matchTime.getTime() - 3600000
            });
          } else if (kp.event === '벤치 대기') {
            newNotifs.push({
              id: `lineup-bench-${match.id}-${kp.name}`,
              time: getTimeAgo(-timeDiff),
              icon: '🪑',
              title: `${kp.name} 벤치 대기`,
              body: `${match.home.name} vs ${match.away.name} · ${match.krTime || match.time}`,
              type: 'lineup_bench',
              live: false,
              timestamp: matchTime.getTime() - 3600000
            });
          } else if (kp.event === '미출전') {
            newNotifs.push({
              id: `lineup-out-${match.id}-${kp.name}`,
              time: getTimeAgo(-timeDiff),
              icon: '✚',
              title: `${kp.name} 명단 제외`,
              body: `${match.home.name} vs ${match.away.name} · ${match.krTime || match.time}`,
              type: 'lineup_out',
              live: false,
              timestamp: matchTime.getTime() - 3600000
            });
          }
        });
      }

      // 2. Live match events
      if (match.live && match.events) {
        match.events.forEach(ev => {
          const koreanPlayerName = match.koreanPlayer.name;

          // Goals
          if (ev.type === 'goal' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            newNotifs.push({
              id: `goal-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '⚽',
              title: `${koreanPlayerName} 골!`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: 'goal',
              live: true,
              timestamp: now.getTime()
            });
          }

          // Assists
          if (ev.type === 'assist' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            newNotifs.push({
              id: `assist-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '🅰️',
              title: `${koreanPlayerName} 어시스트`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: 'assist',
              live: true,
              timestamp: now.getTime()
            });
          }

          // Yellow card
          if (ev.type === 'yellow' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            newNotifs.push({
              id: `yellow-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '🟨',
              title: `${koreanPlayerName} 경고`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: 'yellow',
              live: true,
              timestamp: now.getTime()
            });
          }

          // Red card
          if (ev.type === 'red' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            newNotifs.push({
              id: `red-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '🟥',
              title: `${koreanPlayerName} 퇴장`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: 'red',
              live: true,
              timestamp: now.getTime()
            });
          }

          // Substitution
          if (ev.type === 'substitution' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            const isSubIn = ev.text?.includes('교체 투입') || ev.detail?.includes('투입');
            newNotifs.push({
              id: `sub-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '🔄',
              title: `${koreanPlayerName} ${isSubIn ? '교체 출전' : '교체 아웃'}`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: isSubIn ? 'sub_in' : 'sub_out',
              live: true,
              timestamp: now.getTime()
            });
          }
        });
      }
    });

    // Sort by timestamp (most recent first) and remove duplicates
    const uniqueNotifs = Array.from(new Map(newNotifs.map(n => [n.id, n])).values())
      .sort((a, b) => b.timestamp - a.timestamp)
      .slice(0, 50); // Keep last 50 notifications

    setNotifications(uniqueNotifs);
  }, [liveMatches]);

  const transformSofascoreEvent = (event) => {
    // Skip women's / youth competitions (check tournament name only, not category)
    const tourneyName = (event.tournament?.name || '').toLowerCase();
    const homeTeamRaw = (event.homeTeam?.name || '').toLowerCase();
    const awayTeamRaw = (event.awayTeam?.name || '').toLowerCase();
    const WOMEN_MARKERS = ['women', 'frauen', 'féminin', 'femenin', 'dames', 'ladies', ' w ', '(w)'];
    if (WOMEN_MARKERS.some(k => tourneyName.includes(k) || homeTeamRaw.includes(k) || awayTeamRaw.includes(k))) return null;

    const homeTeamName = event.homeTeam?.name || '';
    const awayTeamName = event.awayTeam?.name || '';
    const homeShort = event.homeTeam?.shortName || event.homeTeam?.nameCode || homeTeamName.slice(0,3).toUpperCase();
    const awayShort = event.awayTeam?.shortName || event.awayTeam?.nameCode || awayTeamName.slice(0,3).toUpperCase();

    // Match team name against KOREAN_PLAYERS (try full name, short name, nameCode)
    let koreanPlayer = null;
    let koreanPlayerAway = null;
    const tryHome = [homeTeamName, homeShort, event.homeTeam?.nameCode].filter(Boolean);
    const tryAway = [awayTeamName, awayShort, event.awayTeam?.nameCode].filter(Boolean);
    for (const v of tryHome) {
      if (KOREAN_PLAYERS[v]) { koreanPlayer = { ...KOREAN_PLAYERS[v], team: homeShort }; break; }
    }
    for (const v of tryAway) {
      if (KOREAN_PLAYERS[v]) { koreanPlayerAway = { ...KOREAN_PLAYERS[v], team: awayShort }; break; }
    }
    // If no home Korean, treat away as primary
    if (!koreanPlayer && koreanPlayerAway) { koreanPlayer = koreanPlayerAway; koreanPlayerAway = null; }
    if (!koreanPlayer) return null;
    const isKoreanDerby = !!(koreanPlayerAway);
    const koreanPlayers = isKoreanDerby ? [koreanPlayer, koreanPlayerAway] : [koreanPlayer];

    const statusType = event.status?.type;
    const isFinished = statusType === 'finished';
    const matchDate = new Date(event.startTimestamp * 1000);
    const isTimedOut = statusType === 'inprogress' && (Date.now() - matchDate.getTime()) > 160 * 60 * 1000;
    const isLive = statusType === 'inprogress' && !isTimedOut;
    const status = isLive ? 'STATUS_IN_PROGRESS' : (isFinished || isTimedOut) ? 'STATUS_FINAL' : 'notstarted';

    // Store period timing for real-time minute computation in UI
    // Sofascore status.description = "1st Half" / "2nd Half" / "Halftime" etc.
    const desc = (event.status?.description || '').toLowerCase();
    const sfPeriod = event.time?.period ?? (
      (desc.includes('2nd') || desc.includes('extra') || desc.includes('penalt')) ? 2 : 1
    );
    const periodStartTs = event.time?.currentPeriodStartTimestamp ?? event.time?.currentPeriodStart ?? null;

    // Initial minute estimate
    let minute = '';
    if (isLive) {
      if (periodStartTs) {
        const minsInPeriod = Math.floor((Date.now()/1000 - periodStartTs) / 60);
        minute = String(Math.max(0, minsInPeriod + (sfPeriod >= 2 ? 45 : 0)));
      } else if (event.time?.played != null) {
        minute = String(event.time.played + (sfPeriod >= 2 ? 45 : 0));
      }
    }

    let timeDisplay = '';
    if (isLive) timeDisplay = 'LIVE';
    else if (!isFinished && !isTimedOut) {
      timeDisplay = formatHHMM(matchDate);
    }

    const homeLogo = `https://api.sofascore.com/api/v1/team/${event.homeTeam?.id}/image`;
    const awayLogo = `https://api.sofascore.com/api/v1/team/${event.awayTeam?.id}/image`;
    const tournamentName = event.tournament?.name || '';
    const TOURNEY_ABBR = {
      'Premier League':'EPL','Bundesliga':'GER','Ligue 1':'L1','Serie A':'ITA',
      'Scottish Premiership':'SPL','Süper Lig':'TUR','Eredivisie':'NED',
      'Belgian Pro League':'BEL','MLS':'MLS','Superliga':'DEN','La Liga':'ESP',
    };
    const leagueAbbr = TOURNEY_ABBR[tournamentName] || tournamentName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,4);

    return {
      id: String(event.id),
      source: 'sofascore',
      live: isLive,
      minute,
      sport: `⚽ ${leagueAbbr}`,
      leagueKey: '',
      home: { name: homeTeamName, code: homeShort, score: (isLive || isFinished || isTimedOut) ? (event.homeScore?.current ?? 0) : null, logo: homeLogo },
      away: { name: awayTeamName, code: awayShort, score: (isLive || isFinished || isTimedOut) ? (event.awayScore?.current ?? 0) : null, logo: awayLogo },
      koreanPlayer: { ...koreanPlayer, event: (isFinished || isTimedOut) ? '미출전' : '출전 예상', minutesPlayed: 0, matchGoals: 0, matchAssists: 0 },
      koreanPlayers: koreanPlayers.map(kp => ({ ...kp, event: (isFinished || isTimedOut) ? '미출전' : '출전 예상', minutesPlayed: 0, matchGoals: 0, matchAssists: 0 })),
      isKoreanDerby,
      competition: tournamentName,
      competitionLogo: null,
      venue: event.venue?.city?.name || '',
      time: timeDisplay,
      fullDate: matchDate.toISOString(),
      krTime: formatKRTime(matchDate.toISOString()),
      lineupConfirmed: isLive || isFinished,
      events: [],
      stats: null,
      status,
      isTimedOut,
      periodStartTs,
      sfPeriod,
    };
  };

  // ── API-Football fixture transformer ─────────────────────────────────
  // Maps a fixture object from api-sports.io to our standard match shape.
  const transformApiFootballFixture = (fx) => {
    if (!fx?.fixture || !fx?.teams) return null;
    const tourneyName = (fx.league?.name || '').toLowerCase();
    const homeTeamRaw = (fx.teams.home?.name || '').toLowerCase();
    const awayTeamRaw = (fx.teams.away?.name || '').toLowerCase();
    const WOMEN_MARKERS = ['women', ' w ', '(w)', 'frauen', 'féminin', 'femenin', 'dames', 'ladies'];
    if (WOMEN_MARKERS.some(k => tourneyName.includes(k) || homeTeamRaw.includes(k) || awayTeamRaw.includes(k))) return null;
    // Skip youth / reserve / II teams
    const YOUTH_MARKERS = [' u17', ' u18', ' u19', ' u20', ' u21', ' u23', 'youth', 'reserve', ' ii ', ' ii$'];
    const homeAwayCombined = `${homeTeamRaw} ${awayTeamRaw}`;
    if (YOUTH_MARKERS.some(k => new RegExp(k).test(homeAwayCombined))) return null;

    const homeTeamName = fx.teams.home?.name || '';
    const awayTeamName = fx.teams.away?.name || '';
    const homeShort = homeTeamName.replace(/[^A-Za-z0-9]/g,'').slice(0, 3).toUpperCase() || homeTeamName.slice(0,3).toUpperCase();
    const awayShort = awayTeamName.replace(/[^A-Za-z0-9]/g,'').slice(0, 3).toUpperCase() || awayTeamName.slice(0,3).toUpperCase();

    // Match against KOREAN_PLAYERS map. Use ONLY the full team name to avoid
    // false positives like Wolfsberg→WOL→황희찬 from the 3-letter slice.
    const homeKoreanInfo = KOREAN_PLAYERS[homeTeamName] || null;
    const awayKoreanInfo = KOREAN_PLAYERS[awayTeamName] || null;
    if (!homeKoreanInfo && !awayKoreanInfo) return null;

    // Use player's canonical team abbrev from ALL_PLAYERS for both card display
    // and home.code/away.code comparisons (which key off Korean player's team).
    let homeCode = homeShort, awayCode = awayShort;
    if (homeKoreanInfo) {
      const info = ALL_PLAYERS.find(p => p.name === homeKoreanInfo.name);
      if (info?.team) homeCode = info.team;
    }
    if (awayKoreanInfo) {
      const info = ALL_PLAYERS.find(p => p.name === awayKoreanInfo.name);
      if (info?.team) awayCode = info.team;
    }
    let koreanPlayer = homeKoreanInfo ? { ...homeKoreanInfo, team: homeCode } : null;
    let koreanPlayerAway = awayKoreanInfo ? { ...awayKoreanInfo, team: awayCode } : null;
    if (!koreanPlayer && koreanPlayerAway) { koreanPlayer = koreanPlayerAway; koreanPlayerAway = null; }
    const isKoreanDerby = !!koreanPlayerAway;
    const koreanPlayers = isKoreanDerby ? [koreanPlayer, koreanPlayerAway] : [koreanPlayer];

    // API-Football status codes
    const sShort = fx.fixture.status?.short || 'NS';
    const LIVE_CODES = new Set(['1H','HT','2H','ET','BT','P','INT','LIVE']);
    const FINAL_CODES = new Set(['FT','AET','PEN']);
    const isLive = LIVE_CODES.has(sShort);
    const isFinished = FINAL_CODES.has(sShort);

    const matchDate = new Date(fx.fixture.date);
    const isTimedOut = isLive && (Date.now() - matchDate.getTime()) > 160 * 60 * 1000;
    const liveAfterTimeout = isLive && !isTimedOut;
    const status = liveAfterTimeout ? 'STATUS_IN_PROGRESS' : (isFinished || isTimedOut) ? 'STATUS_FINAL' : 'notstarted';

    const elapsed = fx.fixture.status?.elapsed;
    let minute = '';
    if (liveAfterTimeout && elapsed != null) minute = String(elapsed);
    const periodStartTs = null; // not provided by API-football; we'll just show elapsed

    let timeDisplay = '';
    if (liveAfterTimeout) timeDisplay = 'LIVE';
    else if (!isFinished && !isTimedOut) timeDisplay = formatHHMM(matchDate);

    const tournamentName = fx.league?.name || '';
    const TOURNEY_ABBR = {
      'Premier League':'EPL','Bundesliga':'GER','Ligue 1':'L1','Serie A':'ITA',
      'Premiership':'SPL','Süper Lig':'TUR','Eredivisie':'NED',
      'Jupiler Pro League':'BEL','Major League Soccer':'MLS','Superliga':'DEN','La Liga':'ESP',
      'Championship':'CHA','Serbian SuperLiga':'SRB','UEFA Champions League':'UCL',
      'UEFA Europa League':'UEL','UEFA Conference League':'UECL',
    };
    const leagueAbbr = TOURNEY_ABBR[tournamentName] || tournamentName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,4);

    return {
      id: String(fx.fixture.id),
      source: 'apifootball',
      live: liveAfterTimeout,
      minute,
      sport: `⚽ ${leagueAbbr}`,
      leagueKey: '',
      home: { name: homeTeamName, code: homeCode, score: (liveAfterTimeout || isFinished || isTimedOut) ? (fx.goals?.home ?? 0) : null, logo: fx.teams.home?.logo || null },
      away: { name: awayTeamName, code: awayCode, score: (liveAfterTimeout || isFinished || isTimedOut) ? (fx.goals?.away ?? 0) : null, logo: fx.teams.away?.logo || null },
      koreanPlayer: { ...koreanPlayer, event: (isFinished || isTimedOut) ? '미출전' : '출전 예상', minutesPlayed: 0, matchGoals: 0, matchAssists: 0 },
      koreanPlayers: koreanPlayers.map(kp => ({ ...kp, event: (isFinished || isTimedOut) ? '미출전' : '출전 예상', minutesPlayed: 0, matchGoals: 0, matchAssists: 0 })),
      isKoreanDerby,
      competition: tournamentName,
      competitionLogo: fx.league?.logo || null,
      venue: fx.fixture.venue?.city || '',
      time: timeDisplay,
      fullDate: matchDate.toISOString(),
      krTime: formatKRTime(matchDate.toISOString()),
      lineupConfirmed: liveAfterTimeout || isFinished,
      events: [],
      stats: null,
      status,
      isTimedOut,
      periodStartTs,
      sfPeriod: 1,
    };
  };

  const transformESPNEvent = (event, sport, league = '') => {
    const comp = event.competitions[0];
    const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
    const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];
    const status = event.status.type.name;
    // If match started more than 160 min ago, ESPN API may lag — treat as not live
    const matchStartMs = event.date ? new Date(event.date).getTime() : 0;
    const isTimedOut = matchStartMs > 0 && (Date.now() - matchStartMs) > 160 * 60 * 1000;
    // Check multiple live status codes
    const isLive = !isTimedOut && (
                   status === 'STATUS_IN_PROGRESS' ||
                   status === 'STATUS_FIRST_HALF' ||
                   status === 'STATUS_SECOND_HALF' ||
                   status === 'STATUS_HALFTIME' ||
                   status === 'STATUS_EXTRA_TIME' ||
                   status === 'STATUS_OVERTIME');

    // Check for Korean players
    let koreanPlayer = null;
    let lineupConfirmed = false;
    let events = [];
    const homeTeam = home.team.displayName;
    const awayTeam = away.team.displayName;
    const homeAbbr = home.team.abbreviation;
    const awayAbbr = away.team.abbreviation;

    // Try multiple variations to match Korean players
    const homeVariations = [homeTeam, homeAbbr, home.team.name, home.team.shortDisplayName].filter(Boolean);
    const awayVariations = [awayTeam, awayAbbr, away.team.name, away.team.shortDisplayName].filter(Boolean);


    for (const variation of homeVariations) {
      if (KOREAN_PLAYERS[variation]) {
        koreanPlayer = { ...KOREAN_PLAYERS[variation], team: homeAbbr };
        break;
      }
    }

    if (!koreanPlayer) {
      for (const variation of awayVariations) {
        if (KOREAN_PLAYERS[variation]) {
          koreanPlayer = { ...KOREAN_PLAYERS[variation], team: awayAbbr };
          break;
        }
      }
    }

    // Check lineup confirmation only 1 hour before match start
    const matchDate = new Date(event.date);
    const now = new Date();
    const oneHourBeforeMatch = new Date(matchDate.getTime() - 60 * 60 * 1000);

    // Only check lineup if within 1 hour of match start or match has started
    if (now >= oneHourBeforeMatch || isLive) {
      if (comp.situation?.lastPlay || comp.details || home.linescores) {
        lineupConfirmed = true;
      }
    }

    // Extract events (goals, cards, etc.) from the match
    if (comp.details) {
      const details = comp.details;
      if (details.redCards) {
        details.redCards.forEach(card => {
          events.push({ type: 'red', player: card.athlete?.displayName, min: card.clock?.displayValue, team: card.team?.abbreviation });
        });
      }
      if (details.yellowCards) {
        details.yellowCards.forEach(card => {
          events.push({ type: 'yellow', player: card.athlete?.displayName, min: card.clock?.displayValue, team: card.team?.abbreviation });
        });
      }
    }

    // Check for Korean player in match events (goals, assists)
    if (koreanPlayer && comp.situation?.lastPlay) {
      const lastPlay = comp.situation.lastPlay;
      if (lastPlay.text && lastPlay.text.includes(koreanPlayer.name)) {
        if (lastPlay.scoringPlay) {
          events.push({ type: 'goal', player: koreanPlayer.name, min: lastPlay.clock?.displayValue, team: koreanPlayer.team });
        }
      }
    }

    let timeDisplay = '';
    if (!isLive && event.date) {
      timeDisplay = formatHHMM(event.date);
    } else if (isLive) {
      timeDisplay = 'LIVE';
    }

    // Determine Korean player event status and extract stats
    let playerEventText = '출전 예상';
    let playerStats = { goals: undefined, assists: undefined, rating: undefined, minutesPlayed: undefined };

    if (koreanPlayer) {
      // Try to find Korean player in rosters/statistics
      const homeRoster = home.athletes || home.roster || [];
      const awayRoster = away.athletes || away.roster || [];
      const allAthletes = [...homeRoster, ...awayRoster];

      const koreanAthlete = allAthletes.find(athlete => {
        const name = (athlete.athlete?.displayName || athlete.displayName || '').toLowerCase().replace(/[-\s]/g, '');
        const nameEn = (koreanPlayer.nameEn || '').toLowerCase().replace(/[-\s]/g, '');
        const lastName = (koreanPlayer.nameEn || '').split(' ').pop().toLowerCase();
        return nameEn && (name.includes(nameEn) || nameEn.includes(name) || name.includes(lastName));
      });

      let didPlay = false;

      if (koreanAthlete) {
        const athleteStats = koreanAthlete.statistics || koreanAthlete.stats || [];

        // For soccer: Extract season stats from athlete.statistics
        if (sport === 'soccer') {
          const goals = athleteStats.find(s =>
            s.name === 'goals' ||
            s.abbreviation === 'G' ||
            s.displayName === 'Goals'
          );
          if (goals) playerStats.goals = parseInt(goals.displayValue || goals.value) || 0;

          const assists = athleteStats.find(s =>
            s.name === 'assists' ||
            s.abbreviation === 'A' ||
            s.displayName === 'Assists'
          );
          if (assists) playerStats.assists = parseInt(assists.displayValue || assists.value) || 0;

          const rating = athleteStats.find(s =>
            s.name === 'rating' ||
            s.name === 'playerRating' ||
            s.displayName === 'Rating'
          );
          if (rating) playerStats.rating = parseFloat(rating.displayValue || rating.value).toFixed(1);

          const minutes = athleteStats.find(s =>
            s.name === 'minutesPlayed' ||
            s.abbreviation === 'MIN' ||
            s.displayName === 'Minutes Played'
          );
          if (minutes) {
            playerStats.minutesPlayed = parseInt(minutes.displayValue || minutes.value) || 0;
            didPlay = playerStats.minutesPlayed > 0;
          }
        }

        // For MLB: Extract batting stats — presence of at-bat stats means player batted
        if (sport === 'mlb') {
          const atBats = athleteStats.find(s => s.abbreviation === 'AB' || s.name === 'atBats');
          const hits = athleteStats.find(s => s.abbreviation === 'H' || s.name === 'hits');
          if (hits !== undefined) {
            playerStats.hits = parseInt(hits?.displayValue || hits?.value) || 0;
            didPlay = true;
          }
          if (atBats !== undefined) didPlay = true;

          const avg = athleteStats.find(s => s.abbreviation === 'AVG' || s.name === 'avg');
          if (avg) playerStats.avg = parseFloat(avg.displayValue || avg.value).toFixed(3);

          const hr = athleteStats.find(s => s.abbreviation === 'HR' || s.name === 'homeRuns');
          if (hr) playerStats.homeRuns = parseInt(hr.displayValue || hr.value) || 0;

          const rbi = athleteStats.find(s => s.abbreviation === 'RBI' || s.name === 'RBIs');
          if (rbi) playerStats.rbi = parseInt(rbi.displayValue || rbi.value) || 0;
        }
      }

      // Set event text
      const isFinished = isTimedOut || status === 'STATUS_FINAL' || status === 'STATUS_FULL_TIME' || status === 'STATUS_END_PERIOD' || status === 'STATUS_FINAL_PEN';
      if (isLive) {
        const isStarter = koreanAthlete?.starter === true;
        const hasMinutes = playerStats.minutesPlayed && playerStats.minutesPlayed > 0;
        if (isStarter || hasMinutes || didPlay) {
          playerEventText = '출전 중';
        } else if (koreanAthlete) {
          playerEventText = '벤치';
        } else {
          playerEventText = '출전 예상';
        }
      } else if (isFinished) {
        if (!koreanAthlete || !didPlay) {
          playerEventText = '미출전';
        } else if (playerStats.minutesPlayed > 0) {
          playerEventText = `${playerStats.minutesPlayed}분 출전`;
        } else {
          playerEventText = '출전 완료';
        }
        // 이벤트(골/도움)가 있으면 실제 출전 — '미출전' 덮어쓰기
        if (koreanPlayer) {
          const hasEvent = events.some(e => e.player === koreanPlayer.name);
          if (hasEvent && playerEventText === '미출전') {
            playerEventText = '출전 완료';
          }
        }
      } else if (lineupConfirmed) {
        playerEventText = '선발 출전';
      } else {
        playerEventText = '출전 예상';
      }
    }

    // Get current minute for live matches
    let minute = '';
    if (isLive && event.status?.displayClock) {
      minute = event.status.displayClock;
    }

    // For MLB, derive inning label like "9회초 / 7회말"
    let inning = '';
    if (sport === 'mlb' && isLive) {
      const period = event.status?.period;
      const shortDetail = event.status?.type?.shortDetail || '';
      if (period) {
        let half = '';
        if (/^Top/i.test(shortDetail)) half = '초';
        else if (/^(Bot|Bottom)/i.test(shortDetail)) half = '말';
        else if (/^Mid/i.test(shortDetail)) half = '중간';
        else if (/^End/i.test(shortDetail)) half = '종료';
        inning = half ? `${period}회${half}` : `${period}회`;
      }
    }

    // Extract team logos from ESPN API
    const homeLogo = home.team?.logo || home.team?.logos?.[0]?.href || null;
    const awayLogo = away.team?.logo || away.team?.logos?.[0]?.href || null;

    return {
      id: event.id,
      live: isLive,
      minute,
      inning,
      sport: sport === 'mlb' ? '⚾ MLB' : `⚽ ${league.toUpperCase()}`,
      leagueKey: league,
      home: { name: homeTeam, code: home.team.abbreviation, score: parseInt(home.score) || 0, logo: homeLogo },
      away: { name: awayTeam, code: away.team.abbreviation, score: parseInt(away.score) || 0, logo: awayLogo },
      koreanPlayer: koreanPlayer ? { ...koreanPlayer, event: playerEventText, ...playerStats } : null,
      competition: event.competitions[0].league?.name || '',
      competitionLogo: event.competitions[0].league?.logos?.[0]?.href || null,
      venue: event.competitions[0].venue?.fullName || '',
      time: timeDisplay,
      fullDate: event.date,
      krTime: formatKRTime(event.date),
      lineupConfirmed,
      events,
      stats: null,
      status: status,
      isTimedOut,
    };
  };

  const [showTweaks, setShowTweaks] = React.useState(false);

  const updateTweaks = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    localStorage.setItem('jumo_tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  React.useEffect(() => {
    window.__jumoSetTweaks = setShowTweaks;
  }, [setShowTweaks]);

  const goMatch = (m) => { setSelectedMatch(m); setScreen('match'); };
  const goPlayer = (p) => { setSelectedPlayer(p); setScreen('player'); };
  const goAddPlayer = () => setScreen('addplayer');
  const [lastNotifViewedAt, setLastNotifViewedAt] = React.useState(() => {
    const v = localStorage.getItem('jumo_lastNotifViewedAt');
    return v ? parseInt(v, 10) : 0;
  });
  const unreadCount = React.useMemo(
    () => notifications.filter(n => (n.timestamp || 0) > lastNotifViewedAt).length,
    [notifications, lastNotifViewedAt]
  );
  const goNotif = () => {
    setScreen('notif');
    const now = Date.now();
    setLastNotifViewedAt(now);
    localStorage.setItem('jumo_lastNotifViewedAt', String(now));
  };
  const [closing, setClosing] = React.useState(false);
  const goBack = () => {
    if (closing) return;
    setClosing(true); // slide the detail out to the right, revealing main behind
    setTimeout(() => { setScreen('main'); setClosing(false); }, 330);
  };

  const [tabScrollKeys, setTabScrollKeys] = React.useState({ home:0, schedule:0, players:0, news:0, more:0 });
  const handleTab = React.useCallback((t) => {
    // Keep the native glass tab bar's highlight in sync.
    try { window.webkit?.messageHandlers?.tabbar?.postMessage(t); } catch {}
    if (t === tab && screen === 'main') {
      setTabScrollKeys(k => ({ ...k, [t]: k[t] + 1 }));
      return;
    }
    React.startTransition(() => {
      setTab(t);
      setScreen('main');
    });
  }, [tab, screen]);

  // Bridge for the native iOS Liquid Glass tab bar (MainViewController.swift):
  // native calls __nativeTab(id) on tap, and __enableNativeTabBar() to tell the
  // web app to hide its own CSS tab bar.
  React.useEffect(() => {
    window.__nativeTab = (id) => handleTab(id);
    window.__enableNativeTabBar = () => { setNativeTabBar(true); return true; };
    // Status-bar tap (native) → smooth-scroll the active screen's scroller to top.
    window.__scrollTop = () => {
      try {
        let target = null, best = -1;
        document.querySelectorAll('.scrollbar-hide').forEach(el => {
          if (el.offsetParent === null) return;
          const oy = getComputedStyle(el).overflowY;
          if ((oy === 'auto' || oy === 'scroll') && el.scrollTop > 0 && el.clientHeight > best) { best = el.clientHeight; target = el; }
        });
        if (target) target.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (e) {}
    };
    return () => { try { delete window.__nativeTab; delete window.__enableNativeTabBar; delete window.__scrollTop; } catch {} };
  }, [handleTab]);

  // Left-edge swipe (native) → go back when on a detail screen.
  React.useEffect(() => {
    window.__back = () => {
      if (screen !== 'main') { goBack(); return true; }
      if (tab === 'more' && moreSub) { setMoreSub(null); return true; }
      return false;
    };
    return () => { try { delete window.__back; } catch {} };
  }, [screen, tab, moreSub]);

  // Native Liquid Glass notification bell (top-right): show only on home/main,
  // mirror the unread count, and expose the tap target.
  React.useEffect(() => {
    try { window.webkit?.messageHandlers?.bell?.postMessage({ show: tab === 'home' && screen === 'main', unread: unreadCount }); } catch {}
  }, [tab, screen, unreadCount, nativeTabBar]);
  React.useEffect(() => { window.__jumoNotif = goNotif; });

  // Native detail-screen toolbar (glass back + follow): drive visibility/state.
  React.useEffect(() => { window.__nativeChrome = nativeTabBar; }, [nativeTabBar]);
  React.useEffect(() => {
    try {
      window.webkit?.messageHandlers?.detailbar?.postMessage({
        back: ['match', 'player', 'notif', 'addplayer'].includes(screen)
          || (tab === 'more' && screen === 'main' && !!moreSub),
        followShow: screen === 'player' && !!selectedPlayer,
        followOn: !!(selectedPlayer && followed.has(selectedPlayer.id)),
      });
    } catch {}
  }, [screen, selectedPlayer, followed, nativeTabBar, tab, moreSub]);
  React.useEffect(() => {
    window.__jumoFollow = () => {
      if (!selectedPlayer) return;
      const on = followed.has(selectedPlayer.id);
      if (on && !window.confirm(`${selectedPlayer.name} 선수를 팔로우 해제하시겠어요?`)) return;
      toggleFollow(selectedPlayer.id);
    };
  });

  const HomeComponent = [HomeV1, HomeV2, HomeV3][tweaks.homeVariant] || HomeV1;

  const homeVariantNames = ['카드 스택', '에디토리얼', '컴팩트'];

  const filteredLiveMatches = React.useMemo(
    () => liveMatches.filter(m => isMatchAllowed(m, sportFeeds)),
    [liveMatches, sportFeeds]
  );

  return (
    <ToastCtx.Provider value={showToast}>
    <div style={{ '--acc': tweaks.accentColor, fontFamily:"'Noto Sans KR', system-ui, sans-serif", WebkitFontSmoothing:'antialiased' }}>
      <IOSDevice dark={true} width={deviceDimensions.width} height={deviceDimensions.height}>
        <div style={{ display:'flex', flexDirection:'column', height:'100%', background:'var(--bg)', paddingBottom: nativeTabBar ? '0px' : (IS_IOS26_PLUS ? 'calc(74px + env(safe-area-inset-bottom))' : '70px'), position:'relative' }}>
          {toast && (
            <div key={toast.id} style={{ position:'fixed', left:'50%', bottom:'calc(78px + env(safe-area-inset-bottom))', transform:'translateX(-50%)', zIndex:200, background:'rgba(0,0,0,0.85)', color:'#fff', padding:'10px 18px', borderRadius:22, fontSize:13, fontWeight:600, letterSpacing:-0.2, whiteSpace:'nowrap', boxShadow:'0 6px 24px rgba(0,0,0,0.35)', backdropFilter:'blur(10px)', WebkitBackdropFilter:'blur(10px)', animation:'toastIn 0.22s ease-out', pointerEvents:'none' }}>
              {toast.message}
            </div>
          )}
          {(screen === 'main' || closing) && (
            <>
              <div style={{ display: tab === 'home' ? 'contents' : 'none' }}><HomeComponent onMatch={goMatch} onPlayer={goPlayer} onNotif={goNotif} tweaks={tweaks} liveApiMatches={filteredLiveMatches} worldCupMatches={worldCupMatches} isLoading={isInitialLoad && apiLoading} scrollTopKey={tabScrollKeys.home} onRefresh={fetchLiveMatches} unreadCount={unreadCount} nativeTabBar={nativeTabBar}/></div>
              <div style={{ display: tab === 'schedule' ? 'contents' : 'none' }}><ScheduleScreen onMatch={goMatch} liveApiMatches={filteredLiveMatches} isLoading={isInitialLoad && apiLoading} onRefresh={fetchLiveMatches} isActive={tab === 'schedule'} scrollTopKey={tabScrollKeys.schedule}/></div>
              <div style={{ display: tab === 'players' ? 'contents' : 'none' }}><PlayersScreen onPlayer={goPlayer} onAdd={goAddPlayer} followed={followed} statsCache={playerStatsCache} isLoading={isInitialLoad && apiLoading} onRefresh={fetchLiveMatches} scrollTopKey={tabScrollKeys.players} liveApiMatches={filteredLiveMatches} sportFeeds={sportFeeds}/></div>
              <div style={{ display: tab === 'news' ? 'contents' : 'none' }}><NewsScreen sportFeeds={sportFeeds} scrollTopKey={tabScrollKeys.news}/></div>
              <div style={{ display: tab === 'more' ? 'contents' : 'none' }}><MoreScreen sportFeeds={sportFeeds} onToggleSportFeed={toggleSportFeed} profile={profile} onUpdateProfile={updateProfile} sub={moreSub} setSub={setMoreSub}/></div>
            </>
          )}
          {screen !== 'main' && (
          <div className={closing ? 'screen-slide-out' : ''} style={{ position:'absolute', inset:0, zIndex:50, background:'var(--bg)', display:'flex', flexDirection:'column' }}>
          {screen === 'match' && selectedMatch && (
            <LiveDetailScreen match={selectedMatch} onBack={goBack} liveApiMatches={liveMatches} onPlayer={goPlayer}/>
          )}
          {screen === 'player' && selectedPlayer && (
            <PlayerScreen player={selectedPlayer} onBack={goBack} onMatch={goMatch} liveApiMatches={liveMatches} statsCache={playerStatsCache} followedSet={followed} onToggleFollow={toggleFollow}/>
          )}
          {screen === 'addplayer' && (
            <AddPlayerScreen followed={followed} onToggle={toggleFollow} onBack={goBack}/>
          )}
          {screen === 'notif' && (
            <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide screen-slide-in">
              <div style={{ padding:'12px 20px 8px', display:'flex', alignItems:'center', gap:10 }}>
                <button onClick={goBack} style={{ ...LG.base, ...LG.circle, color:'rgba(255,255,255,0.85)', visibility: nativeTabBar ? 'hidden' : 'visible' }}>
                  <svg width="10" height="17" viewBox="0 0 10 17" fill="none"><path d="M8.5 1.5L1.5 8.5l7 7" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
                <div style={{ fontSize:22, fontWeight:700, color:'var(--text)', letterSpacing:-0.5 }}>알림</div>
              </div>
              <NotifScreen notifications={notifications}/>
            </div>
          )}
          </div>
          )}
          {!nativeTabBar && <TabBar active={tab} onTab={handleTab}/>}
        </div>
      </IOSDevice>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{ position:'fixed', bottom:24, right:24, background:'var(--card)', border:'0.5px solid var(--btn-bg)', borderRadius:20, padding:'20px', width:260, boxShadow:'0 20px 60px rgba(0,0,0,0.6)', zIndex:9999, animation:'slideUp 0.2s ease' }}>
          <div style={{ fontSize:13, fontWeight:700, color:'var(--text2)', letterSpacing:1.5, textTransform:'uppercase', marginBottom:16 }}>Tweaks</div>

          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, color:'var(--text3)', marginBottom:8, fontWeight:600 }}>홈 스타일</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {homeVariantNames.map((name, i) => (
                <button key={i} onClick={() => updateTweaks('homeVariant', i)} style={{ background: tweaks.homeVariant===i ? 'var(--acc)' : 'var(--border)', border:'none', borderRadius:10, padding:'10px 14px', color: tweaks.homeVariant===i ? '#000' : 'var(--text-60)', fontSize:13, fontWeight:600, cursor:'pointer', textAlign:'left' }}>
                  {i===0 ? '1️⃣' : i===1 ? '2️⃣' : '3️⃣'} {name}
                </button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, color:'var(--text3)', marginBottom:8, fontWeight:600 }}>강조 색상</div>
            <div style={{ display:'flex', gap:8 }}>
              {['#e03030','#0071e3','#2cc96b','#f5a623','#9b59b6'].map(c => (
                <button key={c} onClick={() => updateTweaks('accentColor', c)} style={{ width:32, height:32, borderRadius:'50%', background:c, border: tweaks.accentColor===c ? '2.5px solid #fff' : '2.5px solid transparent', cursor:'pointer' }}/>
              ))}
            </div>
          </div>

          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
            <span style={{ fontSize:13, color:'var(--text-60)', fontWeight:600 }}>선수 사진 플레이스홀더</span>
            <button onClick={() => updateTweaks('showPlayerPhoto', !tweaks.showPlayerPhoto)} style={{ width:40, height:24, borderRadius:12, background: tweaks.showPlayerPhoto ? 'var(--acc)' : 'var(--text6)', border:'none', cursor:'pointer', position:'relative', transition:'background 0.2s' }}>
              <div style={{ position:'absolute', top:2, left: tweaks.showPlayerPhoto ? 18 : 2, width:20, height:20, borderRadius:'50%', background:'#fff', transition:'left 0.2s' }}/>
            </button>
          </div>
        </div>
      )}
    </div>
    </ToastCtx.Provider>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="color:red;padding:20px;font-family:monospace;font-size:12px;white-space:pre-wrap">렌더링 에러:\n' + e.message + '\n\n' + e.stack + '</div>';
}
</script>
<div id="root"></div>
</body>
</html>
