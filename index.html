// ─── HELPER: Dynamic date generator ──────────────────────────
function getRelativeDate(hoursFromNow) {
  const date = new Date();
  date.setHours(date.getHours() + hoursFromNow);
  return date.toISOString();
}

function formatKRTime(date) {
  const d = new Date(date);
  const hours = d.getHours();
  const minutes = String(d.getMinutes()).padStart(2, '0');
  const period = hours < 12 ? '오전' : '오후';
  const displayHours = hours > 12 ? hours - 12 : (hours === 0 ? 12 : hours);

  const now = new Date();
  const isToday = d.getDate() === now.getDate() && d.getMonth() === now.getMonth();
  const dayLabel = isToday ? '오늘' : '내일';

  return `${dayLabel} ${period} ${displayHours}:${minutes} KST`;
}

function formatShortTime(date) {
  const d = new Date(date);
  const now = new Date();
  const hours = String(d.getHours()).padStart(2, '0');
  const minutes = String(d.getMinutes()).padStart(2, '0');

  const isToday = d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();

  if (isToday) {
    return `${hours}:${minutes}`;
  } else {
    return `내일 ${hours}:${minutes}`;
  }
}

// ─── COMPONENT: Today Match Card ─────────────────────────────
function TodayMatchCard({ m, onMatch, tweaks }) {
  const player = ALL_PLAYERS.find(p => p.name === m.koreanPlayer?.name);
  const isLive = m.live || m.time === 'LIVE';
  const isFinished = m.status === 'STATUS_FINAL' ||
                     m.status === 'STATUS_FULL_TIME' ||
                     m.status === 'final' ||
                     m.status === 'STATUS_END_PERIOD' ||
                     m.status === 'STATUS_FINAL_PEN';

  // Countdown calculation
  const [countdown, setCountdown] = React.useState('');

  React.useEffect(() => {
    if (!isLive && m.fullDate) {
      const updateCountdown = () => {
        const now = new Date();
        const matchDate = new Date(m.fullDate);
        const diff = matchDate - now;

        if (diff > 0) {
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          setCountdown(`${hours}시간 ${minutes}분 ${seconds}초 뒤 시작`);
        } else {
          setCountdown('곧 시작');
        }
      };

      updateCountdown();
      const interval = setInterval(updateCountdown, 1000);
      return () => clearInterval(interval);
    }
  }, [isLive, m.fullDate]);

  // Format time display
  let timeLabel = '';
  let timeValue = m.time || '예정';
  if (!isLive && m.fullDate) {
    const date = new Date(m.fullDate);
    const now = new Date();
    const hours = date.getHours();
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const isToday = date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();

    if (isToday) {
      timeLabel = hours < 12 ? '오전' : '오후';
    } else {
      timeLabel = '내일';
    }

    const displayHours = hours > 12 ? hours - 12 : (hours === 0 ? 12 : hours);
    timeValue = `${String(displayHours).padStart(2, '0')}:${minutes}`;
  }

  return (
    <div onClick={() => onMatch(m)} style={{
      flexShrink:0, width:'calc(100vw - 44px)', maxWidth:280, borderRadius:20, overflow:'hidden', position:'relative',
      cursor:'pointer', background:'var(--card)', border:'0.5px solid var(--border)'
    }}>
      <div style={{ position:'relative', zIndex:2, padding:'16px' }}>
        {/* Korean player section - TOP */}
        <div style={{ display:'flex', alignItems:'flex-start', gap:10, marginBottom:16, paddingBottom:14, borderBottom:'0.5px solid var(--border)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, flex:1, minWidth:0 }}>
            {tweaks.showPlayerPhoto && player && (
              <div style={{
                width:48, height:48, borderRadius:'50%', overflow:'hidden',
                background:'#fff', flexShrink:0,
                boxShadow:'0 2px 6px rgba(0,0,0,0.15)'
              }}>
                <PlayerPhoto player={player} style={{
                  width:'100%', height:'100%'
                }}/>
              </div>
            )}
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:15, fontWeight:700, color:'var(--text)', marginBottom:3 }}>
                🇰🇷 {m.koreanPlayer?.name}
              </div>
              <div style={{ fontSize:11, color:'var(--text3)' }}>
                {m.koreanPlayer?.team} #{m.koreanPlayer?.number}
              </div>
            </div>
          </div>

          {/* Event info - TOP RIGHT */}
          {m.koreanPlayer?.event && (
            <div style={{
              background: isLive ? 'rgba(230,48,48,0.1)' : 'var(--btn-bg)',
              borderRadius:6, padding:'5px 8px', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center'
            }}>
              <span style={{ fontSize:10, fontWeight:600, color: isLive ? 'var(--acc)' : 'var(--text2)', whiteSpace:'nowrap', lineHeight:1 }}>
                {m.koreanPlayer.event}
              </span>
            </div>
          )}
        </div>

        {/* Time Section or Result Section */}
        {isFinished ? (
          // FINISHED MATCH - Show score and player performance
          (() => {
            const koreanTeam = m.koreanPlayer?.team;
            const isHomeTeam = koreanTeam === m.home.code;
            const koreanScore = isHomeTeam ? m.home.score : m.away.score;
            const opponentScore = isHomeTeam ? m.away.score : m.home.score;
            const isWin = koreanScore > opponentScore;
            const isDraw = koreanScore === opponentScore;
            const opponentTeam = isHomeTeam ? m.away : m.home;

            const kp = m.koreanPlayer;
            const isMLB = (m.sport||'').includes('MLB') || (m.sport||'').includes('⚾');
            const matchGoals = m.events?.filter(e => e.type==='goal' && e.player===kp.name).length || 0;
            const matchAssists = m.events?.filter(e => e.type==='assist' && e.player===kp.name).length || 0;
            // 골/도움이 있으면 무조건 출전한 것
            const didPlay = kp.event !== '미출전' || matchGoals > 0 || matchAssists > 0;

            // Build stat pills
            const statPills = [];
            if (!isMLB && didPlay) {
              if (kp.minutesPlayed >= 90) statPills.push({ label:'풀타임', accent:false });
              else if (kp.minutesPlayed > 0) statPills.push({ label:`${kp.minutesPlayed}분`, accent:false });
              if (matchGoals > 0) statPills.push({ label:`⚽ ${matchGoals}골`, accent:true });
              if (matchAssists > 0) statPills.push({ label:`🅰️ ${matchAssists}도움`, accent:true });
              if (kp.rating) statPills.push({ label:`★ ${kp.rating}`, accent:false });
            } else if (isMLB && didPlay) {
              if (kp.hits !== undefined) statPills.push({ label:`${kp.hits}안타`, accent: kp.hits > 0 });
              if (kp.homeRuns > 0) statPills.push({ label:`${kp.homeRuns}홈런`, accent:true });
              if (kp.rbi > 0) statPills.push({ label:`${kp.rbi}타점`, accent:false });
              if (kp.avg) statPills.push({ label:`타율 ${kp.avg}`, accent:false });
            }

            return (
              <>
                {/* Player performance summary */}
                <div style={{ marginBottom:14 }}>
                  {didPlay ? (
                    statPills.length > 0 ? (
                      <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
                        {statPills.map((s, i) => (
                          <span key={i} style={{
                            fontSize:11, fontWeight:700, padding:'4px 9px', borderRadius:8,
                            display:'inline-flex', alignItems:'center', lineHeight:1,
                            background: s.accent ? 'rgba(245,196,0,0.15)' : 'var(--btn-bg)',
                            color: s.accent ? 'var(--acc)' : 'var(--text2)',
                            border: s.accent ? '0.5px solid rgba(245,196,0,0.3)' : '0.5px solid var(--border)',
                          }}>{s.label}</span>
                        ))}
                      </div>
                    ) : (
                      <span style={{ fontSize:13, color:'var(--text3)', fontWeight:600 }}>출전 완료</span>
                    )
                  ) : (
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:'var(--text4)' }}>미출전</span>
                      <span style={{ fontSize:11, color:'var(--text5)' }}>· 엔트리 제외 또는 부상</span>
                    </div>
                  )}
                </div>

                {/* Teams with scores */}
                <div style={{ marginBottom:12 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
                    <TeamBadge code={m.home.code} size={20} logo={m.home.logo}/>
                    <span style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>{m.home.name}</span>
                    <span style={{ ...NUM, fontSize:22, fontWeight:800, color:'var(--text)', marginLeft:'auto' }}>{m.home.score}</span>

// ─── TODAY MATCHES CAROUSEL ──────────────────────────────────
function TodayMatchesCarousel({ matches, now, startOfToday, endOfToday, twelveHoursLater, onMatch, tweaks }) {
  const scrollRef = React.useRef(null);

  // Filter and sort today's matches
  const todayMatches = matches
    .filter(m => {
      if (!m.koreanPlayer) return false;
      if (!m.fullDate) return false;
      const matchDate = new Date(m.fullDate);
      const isFinished = m.status === 'STATUS_FINAL' || m.status === 'STATUS_FULL_TIME' || m.status === 'final' || m.status === 'STATUS_END_PERIOD' || m.status === 'STATUS_FINAL_PEN';
      const isToday = matchDate >= startOfToday && matchDate <= endOfToday;
      const isUpcoming = matchDate > now && matchDate <= twelveHoursLater;

      // Include: finished matches from today OR upcoming matches (within 12 hours)
      return (isFinished && isToday) || isUpcoming;
    })
    .sort((a, b) => {
      const dateA = new Date(a.fullDate);
      const dateB = new Date(b.fullDate);
      return dateA - dateB; // Sort chronologically
    });

  // Auto-scroll to first future match on mount
  React.useEffect(() => {
    if (!scrollRef.current || todayMatches.length === 0) return;

    const firstFutureIndex = todayMatches.findIndex(m => {
      if (m.live || m.time === 'LIVE') return true;
      const matchDate = new Date(m.fullDate);
      return matchDate >= now;
    });

    const cardWidth = 292; // 280px card + 12px gap

    if (firstFutureIndex > 0) {
      // Scroll to first future match, keeping 16px left padding
      const scrollPosition = (firstFutureIndex * cardWidth);
      setTimeout(() => {
        scrollRef.current?.scrollTo({ left: scrollPosition, behavior: 'smooth' });
      }, 100);
    } else if (firstFutureIndex === 0) {
      // First card is the future match, keep at 16px (default padding position)
      setTimeout(() => {
        scrollRef.current?.scrollTo({ left: 0, behavior: 'instant' });
      }, 100);
    }
  }, [todayMatches.length]);

  return (
    <div ref={scrollRef} style={{ display:'flex', gap:12, paddingLeft:16, paddingRight:16, paddingTop:8, paddingBottom:20, overflowX:'auto', scrollSnapType:'x mandatory', scrollPaddingLeft:16 }} className="scrollbar-hide">
      {todayMatches.map(m => (
        <div key={m.id} style={{ scrollSnapAlign:'center', flexShrink:0 }}>
          <TodayMatchCard m={m} onMatch={onMatch} tweaks={tweaks}/>
        </div>
      ))}
    </div>
  );
}

// ─── SCREEN: HOME V2 — Editorial ─────────────────────────────
function HomeV2({ onMatch, onPlayer, onNotif, tweaks, liveApiMatches = [], isLoading = false }) {
  // State for real-time countdown updates
  const [currentTime, setCurrentTime] = React.useState(new Date());
  const [hlBgImg, setHlBgImg] = React.useState(null);

  // Update current time every second for countdown
  React.useEffect(() => {
    const interval = setInterval(() => {
      setCurrentTime(new Date());
    }, 1000);
    return () => clearInterval(interval);
  }, []);

  // Combine static and API matches
  const allMatches = [...MATCHES, ...liveApiMatches];
  const liveMatches = allMatches.filter(m => m.live || m.time === 'LIVE');

  // Filter matches for today (including past results)
  const now = currentTime;
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
  const endOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  const twelveHoursLater = new Date(now.getTime() + 12 * 60 * 60 * 1000);

  const isFinalStatus = (status) => ['STATUS_FINAL','STATUS_FULL_TIME','final','STATUS_END_PERIOD','STATUS_FINAL_PEN'].includes(status);

  const upcoming = allMatches
    .filter(m => {
      if (m.live || m.time === 'LIVE') return false;
      if (!m.fullDate) return false; // Only show matches with valid dates
      const matchDate = new Date(m.fullDate);
      return matchDate >= now && matchDate <= twelveHoursLater;
    })
    .sort((a, b) => new Date(a.fullDate) - new Date(b.fullDate)); // Sort by soonest first

  const finishedWithKorean = allMatches
    .filter(m => isFinalStatus(m.status) && m.koreanPlayer && m.koreanPlayer.event !== '미출전')
    .sort((a, b) => new Date(b.fullDate || 0) - new Date(a.fullDate || 0));

  const finishedTodayWithKorean = allMatches
    .filter(m => {
      if (!isFinalStatus(m.status) || !m.koreanPlayer || !m.fullDate) return false;
      if (m.koreanPlayer.event === '미출전') return false;
      const matchDate = new Date(m.fullDate);
      return matchDate >= startOfToday && matchDate <= now;
    })
    .sort((a, b) => new Date(b.fullDate || 0) - new Date(a.fullDate || 0));

  const upcomingTodayWithKorean = allMatches
    .filter(m => {
      if (m.live || m.time === 'LIVE' || !m.koreanPlayer || !m.fullDate) return false;
      if (isFinalStatus(m.status)) return false;
      const matchDate = new Date(m.fullDate);
      return matchDate > now && matchDate <= endOfToday;
    })
    .sort((a, b) => new Date(a.fullDate || 0) - new Date(b.fullDate || 0));

  // Determine highlight match: live > closest to now (finished vs upcoming)
  const getHighlightMatch = () => {
    // Priority 1: Live match with Korean player
    const liveWithKorean = allMatches.find(m => (m.live || m.time === 'LIVE') && m.koreanPlayer);
    if (liveWithKorean) return { match: liveWithKorean, priority: 1 };

    // Most recent finished match with Korean player
    const recentFinished = allMatches
      .filter(m => isFinalStatus(m.status) && m.koreanPlayer && m.koreanPlayer.event !== '미출전' && m.fullDate)
      .sort((a, b) => new Date(b.fullDate) - new Date(a.fullDate))[0];

    // Next upcoming match with Korean player
    const nextUpcoming = allMatches
      .filter(m => m.koreanPlayer && m.fullDate && !isFinalStatus(m.status) && !(m.live || m.time === 'LIVE') && new Date(m.fullDate) > now)
      .sort((a, b) => new Date(a.fullDate) - new Date(b.fullDate))[0];

    if (recentFinished && nextUpcoming) {
      const finishedAgo = now - new Date(recentFinished.fullDate);
      const upcomingIn = new Date(nextUpcoming.fullDate) - now;
      return finishedAgo <= upcomingIn
        ? { match: recentFinished, priority: 4 }
        : { match: nextUpcoming, priority: 5 };
    }
    if (recentFinished) return { match: recentFinished, priority: 4 };
    if (nextUpcoming) return { match: nextUpcoming, priority: 5 };

    return null;
  };

  const highlightData = getHighlightMatch();
  const highlightMatch = highlightData?.match;
  const highlightPlayer = highlightMatch ? ALL_PLAYERS.find(p => p.name === highlightMatch.koreanPlayer?.name) : null;
  const heroPlayer = highlightPlayer;
  // Generate highlight text based on priority
  const getHighlightText = () => {
    if (!highlightMatch || !highlightData) return { status: '', main: '한국 선수 경기를 확인하세요', sub: '' };

    const m = highlightMatch;
    const isLive = m.live || m.time === 'LIVE';

    switch (highlightData.priority) {
      case 1: // Live match (HIGHEST PRIORITY)
        // Check if there's a goal/assist event
        const lastEvent = m.events?.[m.events.length - 1];
        const hasGoalEvent = lastEvent && (lastEvent.type === 'goal' || lastEvent.type === 'assist');

        if (hasGoalEvent) {
          return {
            status: `LIVE NOW · ${m.minute || ''}\'`,
            main: `${m.koreanPlayer.name}\n${lastEvent.type === 'goal' ? '⚽ 골' : '🅰️ 어시스트'} — ${m.home.score}:${m.away.score}`,
            sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
          };
        } else {
          return {
            status: `LIVE NOW · ${m.minute || ''}\'`,
            main: `${m.koreanPlayer.name} 출전 중\n${m.home.score}:${m.away.score}`,
            sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
          };
        }
      case 4: // Finished match
        return { status: '경기 종료', main: '', sub: '' };
      case 5: // Upcoming
        const statusText5 = m.lineupConfirmed ? '선발 출전' : '출전 예상';
        return {
          status: m.krTime || m.time,
          main: `${m.koreanPlayer.name}\n${statusText5}`,
          sub: `${m.home.name} vs ${m.away.name} · ${m.competition}`
        };
    }
  };

  const highlightText = getHighlightText();

  // Build finished match headline helper
  const buildFinishedHeadline = (m) => {
    if (!m?.koreanPlayer) return { main: '', sub: '' };
    const kp = m.koreanPlayer;
    const name = kp.name;
    const matchGoals = m.events?.filter(e => e.type === 'goal' && e.player === name).length || 0;
    const matchAssists = m.events?.filter(e => e.type === 'assist' && e.player === name).length || 0;
    const mins = kp.minutesPlayed;
    const isMLB = (m.sport||'').includes('MLB') || (m.sport||'').includes('⚾');

    let main = name;
    if (isMLB) {
      const parts = [];
      if (kp.hits > 0) parts.push(`${kp.hits}안타`);
      if (kp.homeRuns > 0) parts.push(`${kp.homeRuns}홈런`);
      if (kp.rbi > 0) parts.push(`${kp.rbi}타점`);
      main = parts.length > 0 ? `${name} ${parts.join(' ')}` : `${name} 출전`;
    } else {
      const parts = [];
      if (matchGoals > 0) parts.push(`${matchGoals}골`);
      if (matchAssists > 0) parts.push(`${matchAssists}도움`);
      main = parts.length > 0 ? `${name} ${parts.join(' ')}` : `${name} ${mins >= 90 ? '풀타임 활약' : mins > 0 ? `${mins}분 출전` : '출전'}`;
    }

    const homeWin = m.home.score > m.away.score;
    const draw = m.home.score === m.away.score;
    const resultText = draw ? '무승부' : homeWin ? `${m.home.name} 승` : `${m.away.name} 승`;
    const scoreText = `${m.home.score}-${m.away.score}`;
    const minsText = !isMLB && mins >= 90 ? '선발 풀타임' : !isMLB && mins > 0 ? `${mins}분 출전` : '';
    const sub = [minsText, `${m.home.name} ${scoreText} ${m.away.name}`, resultText].filter(Boolean).join(' · ');

    return { main, sub };
  };

  const isFinishedHighlight = highlightData?.priority === 4;
  const finishedHeadline = isFinishedHighlight ? buildFinishedHeadline(highlightMatch) : null;

  // Fetch news background image — MUST be before any early return (Rules of Hooks)
  React.useEffect(() => {
    const playerName = highlightMatch?.koreanPlayer?.name;
    if (!playerName) { setHlBgImg(null); return; }

    let cancelled = false;
    setHlBgImg(null);
    fetch(`http://localhost:8002/naver-news?query=${encodeURIComponent(playerName)}&display=6&sort=date`)
      .then(r => r.json())
      .then(async data => {
        for (const item of (data.items || [])) {
          const url = item.originallink || item.link;
          try {
            const imgRes = await fetch(`http://localhost:8002/news-image?url=${encodeURIComponent(url)}`);
            const imgData = await imgRes.json();

              if (isFinished) {

                const koreanScore = isHomeTeam ? m.home.score : m.away.score;
                const opponentScore = isHomeTeam ? m.away.score : m.home.score;
                const isWin = koreanScore > opponentScore;
                const isDraw = koreanScore === opponentScore;

                return (
                  <div key={m.id} onClick={() => onMatch(m)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 0', cursor:'pointer', borderBottom:'0.5px solid var(--border)' }}>

                      <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.home.score}</span>
                      <span style={{ fontSize:14, color:'var(--text5)' }}>-</span>
                      <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.away.score}</span>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0 }}>
                      <TeamBadge code={m.away.code} size={24} logo={m.away.logo}/>
                      <span style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>{m.away.name}</span>
                    </div>
                  </div>
                );
              } else {
                // UPCOMING MATCH DISPLAY
                let timeDisplay = '—';
                let dayLabel = '';

                if (m.fullDate) {
                  const date = new Date(m.fullDate);
                  const hours = String(date.getHours()).padStart(2, '0');
                  const minutes = String(date.getMinutes()).padStart(2, '0');
                  const isToday = date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();

                  // Check if tomorrow
                  const tomorrow = new Date(now);
                  tomorrow.setDate(tomorrow.getDate() + 1);
                  const isTomorrow = date.getDate() === tomorrow.getDate() && date.getMonth() === tomorrow.getMonth() && date.getFullYear() === tomorrow.getFullYear();

                  timeDisplay = `${hours}:${minutes}`;

                  if (isToday) {
                    dayLabel = '오늘';
                  } else if (isTomorrow) {
                    dayLabel = '내일';
                  } else {
                    // Show date in MM/DD format
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    dayLabel = `${month}/${day}`;
                  }
                }

                return (
                  <div key={m.id} onClick={() => onMatch(m)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 0', cursor:'pointer', borderBottom:'0.5px solid var(--border)' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, justifyContent:'flex-end', minWidth:0 }}>
                      <span style={{ fontSize:14, fontWeight:600, color:'var(--text)', textAlign:'right' }}>{m.home.name}</span>
                      <TeamBadge code={m.home.code} size={24} logo={m.home.logo}/>
                    </div>
                    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2, flexShrink:0, padding:'0 16px' }}>
                      <span style={{ fontSize:10, color:'var(--text5)' }}>{dayLabel}</span>
                      <span style={{ ...NUM, fontSize:13, fontWeight:700, color:'var(--text3)' }}>{timeDisplay}</span>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0 }}>
                      <TeamBadge code={m.away.code} size={24} logo={m.away.logo}/>
                      <span style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>{m.away.name}</span>
                    </div>
                  </div>
                );
              }
            })}
          </div>
        );
      })()}

      <div style={{ height:24 }}/>
    </div>
  );
}

  React.useEffect(() => {
    if (!isLive && !isFinished && match.fullDate) {
      const updateCountdown = () => {
        const now = new Date();
        const matchDate = new Date(match.fullDate);
        const diff = matchDate - now;

        if (diff > 0) {
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          setCountdown(`${hours}시간 ${minutes}분 ${seconds}초 뒤 시작`);
        } else {
          setCountdown('곧 시작');
        }
      };

      updateCountdown();
      const interval = setInterval(updateCountdown, 1000);
      return () => clearInterval(interval);
    }

                <>
                  <div style={{ ...NUM, fontSize:52, fontWeight:800, color:'var(--text)', letterSpacing:-3, lineHeight:1 }}>{match.home.score}<span style={{ color:'var(--text4)', fontWeight:400 }}>:</span>{match.away.score}</div>
                  <div style={{ ...NUM, fontSize:14, color:'var(--text3)', marginTop:4, fontWeight:600 }}>{match.minute}'</div>
                </>
              ) : isFinished ? (
                <>
                  <div style={{ ...NUM, fontSize:52, fontWeight:800, color:'var(--text)', letterSpacing:-3, lineHeight:1 }}>{match.home.score}<span style={{ color:'var(--text4)', fontWeight:400 }}>:</span>{match.away.score}</div>
                  <div style={{ fontSize:12, color:'var(--text4)', marginTop:4, fontWeight:600 }}>종료</div>
                </>
              ) : (
                <>
                  <div style={{ fontSize:20, fontWeight:700, color:'var(--text)', letterSpacing:-0.3 }}>
                    {timeLabel} {timeValue}
                  </div>
                  {countdown && (
                    <div style={{
                      background:'rgba(255,217,61,0.15)', borderRadius:6, padding:'4px 8px',
                      border:'0.5px solid rgba(255,217,61,0.3)', display:'inline-flex', alignItems:'center', justifyContent:'center', marginTop:6
                    }}>
                      <span style={{ fontSize:10, fontWeight:600, color:'#FFD93D', whiteSpace:'nowrap', lineHeight:1 }}>
                        {countdown}
                      </span>
                    </div>
                  )}
                </>
              )}
            </div>
            <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
              <TeamBadge code={match.away.code} size={44} logo={match.away.logo}/>
              <span style={{ fontSize:12, fontWeight:600, color:'var(--text2)', textAlign:'center' }}>{match.away.name}</span>
            </div>
          </div>
          {/* Korean player highlight */}
          <div style={{ background:'var(--ticker-bg)', borderRadius:10, padding:'10px 14px', border:'0.5px solid rgba(230,48,48,0.25)', display:'flex', alignItems:'center', gap:10 }}>
            <span style={{ fontSize:18 }}>🇰🇷</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text)' }}>{match.koreanPlayer.name} <span style={{ ...NUM, color:'var(--text4)', fontWeight:400 }}>#{match.koreanPlayer.number}</span></div>
              <div style={{ fontSize:11, color:'var(--text3)', fontWeight:500, marginTop:1 }}>{match.koreanPlayer.team}</div>
            </div>
            {player && (
              <div style={{ width:44, height:44, borderRadius:'50%', overflow:'hidden', flexShrink:0, border:'2px solid var(--acc)', background:'var(--surface)' }}>
                <PlayerPhoto player={player} style={{ width:'100%', height:'100%' }} tint="var(--surface)"/>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', borderBottom:'0.5px solid var(--border)', background:'var(--bg)', position:'sticky', top:0, zIndex:10 }}>
        {['events','stats','lineups'].map(t => (
          <button key={t} onClick={() => setTab(t)} style={{ flex:1, background:'none', border:'none', padding:'12px 0', fontSize:13, fontWeight:600, color: tab===t ? '#fff' : 'var(--text4)', cursor:'pointer', borderBottom: tab===t ? '2px solid var(--acc)' : '2px solid transparent', transition:'all 0.15s', letterSpacing:0.3 }}>
            {{events:'이벤트', stats:'통계', lineups:'라인업'}[t]}
          </button>
        ))}
      </div>

      {/* Events */}
      {tab === 'events' && (
        <div style={{ padding:'16px' }}>
          {isLive && (
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16, padding:'10px 14px', background:'rgba(230,48,48,0.08)', borderRadius:10, border:'0.5px solid rgba(230,48,48,0.2)' }}>
              <LiveDot/>
              <span style={{ fontSize:12, color:'var(--text-60)' }}>실시간 업데이트 중</span>
            </div>
          )}
          {(() => {
            // Filter events: goals and Korean player related events (substitution, cards, goals, assists)
            const koreanPlayerName = match.koreanPlayer.name;
            const filteredEvents = match.events.filter(ev => {
              // Always show goals
              if (ev.type === 'goal') return true;
              // Show events that mention the Korean player
              if (ev.text && ev.text.includes(koreanPlayerName)) return true;
              if (ev.detail && ev.detail.includes(koreanPlayerName)) return true;
              // Show cards and substitutions involving Korean player
              if ((ev.type === 'yellow' || ev.type === 'red' || ev.type === 'substitution') &&
                  (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) return true;
              return false;
            });

            if (filteredEvents.length === 0) {
              return <div style={{ textAlign:'center', padding:'40px 0', color:'var(--text5)', fontSize:14 }}>아직 주요 이벤트가 없습니다</div>;
            }

            return [...filteredEvents].reverse().map((ev, i) => (
              <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:12, marginBottom:14, padding:'10px 12px', background:'var(--surface)', borderRadius:10, border:'0.5px solid var(--border2)' }}>
                <div style={{ ...NUM, width:28, textAlign:'center', fontSize:13, fontWeight:700, color:'var(--text3)', flexShrink:0, paddingTop:1 }}>{ev.min}'</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:700, color: ev.type==='goal' ? '#fff' : 'var(--text-70)' }}>{ev.text}</div>
                  <div style={{ fontSize:11, color:'var(--text4)', marginTop:2 }}>{ev.detail}</div>
                </div>
                <div style={{ fontSize:18 }}>
                  {{goal:'⚽', yellow:'🟨', red:'🟥', assist:'🅰️', substitution:'🔄'}[ev.type] || '•'}
                </div>
              </div>
            ));
          })()}

          {/* Reactions */}
          <div style={{ marginTop:20, padding:'14px', background:'var(--surface)', borderRadius:14, border:'0.5px solid var(--border2)' }}>
            <div style={{ fontSize:12, color:'var(--text3)', marginBottom:10, fontWeight:600 }}>응원 리액션</div>
            <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
              {[['🔥','2.4k'],['👏','1.8k'],['💪','934'],['❤️','723'],['😮','412']].map(([em,ct]) => (
                <button key={em} style={{ background:'var(--border)', border:'0.5px solid rgba(255,255,255,0.1)', borderRadius:20, padding:'8px 14px', cursor:'pointer', display:'flex', alignItems:'center', gap:6, transition:'all 0.1s' }}>
                  <span style={{ fontSize:16 }}>{em}</span>
                  <span style={{ fontSize:12, color:'var(--text2)', fontWeight:600 }}>{ct}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Stats */}
      {tab === 'stats' && match.stats && (
        <div style={{ padding:'16px' }}>
          {[['슈팅', match.stats.shots], ['점유율 %', match.stats.possession], ['패스', match.stats.passes]].map(([label, vals]) => (
            <div key={label} style={{ marginBottom:16 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                <span style={{ ...NUM, fontSize:14, fontWeight:700, color:'var(--text)' }}>{vals[0]}</span>
                <span style={{ fontSize:12, color:'var(--text3)', fontWeight:600 }}>{label}</span>
                <span style={{ ...NUM, fontSize:14, fontWeight:700, color:'var(--text2)' }}>{vals[1]}</span>
              </div>
              <div style={{ height:6, background:'var(--border)', borderRadius:3, overflow:'hidden' }}>
                <div style={{ width:`${vals[0]/(vals[0]+vals[1])*100}%`, height:'100%', background:'var(--acc)', borderRadius:3, transition:'width 0.8s ease' }}/>
              </div>
            </div>
          ))}
        </div>
      )}
      {tab === 'stats' && !match.stats && (
        <div style={{ textAlign:'center', padding:'40px 0', color:'var(--text5)', fontSize:14 }}>경기 시작 후 통계가 표시됩니다</div>
      )}
      {tab === 'lineups' && (
        <div style={{ textAlign:'center', padding:'40px 0', color:'var(--text5)', fontSize:14 }}>라인업 정보가 준비 중입니다</div>
      )}

      <div style={{ height:24 }}/>
    </div>
  );
}

// ─── SCREEN: PLAYER PROFILE ───────────────────────────────────
function PlayerScreen({ player, onBack, onMatch, liveApiMatches = [], statsCache = {} }) {
  const [tab, setTab] = React.useState('overview');
  const [followed, setFollowed] = React.useState(true);
  const [liveStats, setLiveStats] = React.useState(() => statsCache[player.id] || null);
  const [statsLoading, setStatsLoading] = React.useState(!statsCache[player.id]);
  const extra = PLAYER_EXTRA[player.id] || DEFAULT_EXTRA;

  // Fetch real stats on mount
  React.useEffect(() => {
    let cancelled = false;
    setStatsLoading(true);

    const fetchStats = async () => {
      try {
        if (player.sport === '야구' && player.mlbId) {
          const res = await fetch(`http://localhost:8002/mlb-stats?id=${player.mlbId}`);
          const data = await res.json();
          const stat = data?.stats?.[0]?.splits?.[0]?.stat;
          if (stat && !cancelled) {
            setLiveStats({
              matches: stat.gamesPlayed || 0,
              hits: stat.hits || 0,
              homeRuns: stat.homeRuns || 0,
              rbi: stat.rbi || 0,
              avg: stat.avg || '.000',
              obp: stat.obp || '.000',
              ops: stat.ops || '.000',
            });
          }
        } else if (player.sport === '축구' && player.espnLeague && player.espnId) {
          const res = await fetch(`http://localhost:8002/espn-player-stats?league=${player.espnLeague}&id=${player.espnId}`);
          const data = await res.json();
          const cats = data?.splits?.categories || [];
          if (cats.length > 0 && !cancelled) {
            const allStats = cats.flatMap(c => c.stats || []);
            const get = (...names) => {
              for (const n of names) {
                const s = allStats.find(s => s.name === n);
                if (s) return parseFloat(s.value) || 0;
              }
              return 0;
            };
            setLiveStats({
              matches:       get('appearances'),
              starts:        get('starts'),
              goals:         get('totalGoals'),
              assists:       get('goalAssists'),
              yellowCards:   get('yellowCards'),
              redCards:      get('redCards'),
              minutes:       get('minutes'),
              shotsTotal:    get('totalShots'),
              shotsOn:       get('shotsOnTarget'),
              keyPasses:     get('shotAssists'),
              tackles:       get('totalTackles'),
              interceptions: get('interceptions'),
            });
          }
        }
      } catch(e) {}
      if (!cancelled) setStatsLoading(false);
    };

    fetchStats();
    return () => { cancelled = true; };
  }, [player.id]);

  // Recent matches from live API data
  const recentLiveMatches = React.useMemo(() => {
    return liveApiMatches
      .filter(m => m.koreanPlayer?.name === player.name && (
        m.status === 'STATUS_FINAL' || m.status === 'STATUS_FULL_TIME' ||
        m.status === 'final' || m.status === 'STATUS_END_PERIOD' || m.status === 'STATUS_FINAL_PEN'
      ))
      .sort((a, b) => new Date(b.fullDate || 0) - new Date(a.fullDate || 0))
      .slice(0, 5)
      .map(m => {
        const kp = m.koreanPlayer;
        const isHome = kp.team === m.home.code;
        const myScore = isHome ? m.home.score : m.away.score;
        const theirScore = isHome ? m.away.score : m.home.score;
        const opp = isHome ? m.away.name : m.home.name;
        const result = myScore > theirScore ? 'W' : myScore < theirScore ? 'L' : 'D';
        const goals = (m.events||[]).filter(e => e.type?.startsWith('goal') && e.player === player.name).length;
        const assists = (m.events||[]).filter(e => e.type === 'assist' && e.player === player.name).length;
        const contrib = player.sport === '야구'
          ? (kp.hits > 0 ? `${kp.hits}안타` : '-')
          : [goals > 0 && `${goals}골`, assists > 0 && `${assists}도움`].filter(Boolean).join(' ') || '-';
        const d = new Date(m.fullDate);
        const date = `${d.getMonth()+1}.${d.getDate()}`;
        return { opp, result, score:`${myScore}-${theirScore}`, contrib, date };
      });
  }, [liveApiMatches, player.name]);

  const resultColor = { W:'#2cc96d', D:'rgba(255,193,7,0.9)', L:'var(--acc)' };
  const resultLabel = { W:'승', D:'무', L:'패' };

  const goals   = liveStats?.goals   ?? player.goals;
  const assists = liveStats?.assists ?? player.assists;
  const matches = liveStats?.matches ?? player.matches;
  const rating  = liveStats?.rating  ?? player.rating.toFixed(1);

  const statRows = player.sport === '축구' ? [
    ['골', goals], ['어시스트', assists], ['출전', matches], ['평점', rating],
  ] : player.sport === '야구' && liveStats ? [
    ['출전', liveStats.matches], ['안타', liveStats.hits], ['홈런', liveStats.homeRuns], ['타율', liveStats.avg],
  ] : player.sport === '야구' ? [
    ['출전', player.matches], ['나이', player.age],
  ] : [
    ['출전', player.matches], ['나이', player.age],
  ];

  return (
    <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
      {/* Hero */}
      <div style={{ position:'relative', height:320, overflow:'hidden' }}>
        <PlayerPhoto player={player} style={{ position:'absolute', inset:0 }}/>
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, var(--bg) 100%)' }}/>
        <div style={{ position:'absolute', top:12, left:20, right:20, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <BackBtn onBack={onBack}/>
          <button onClick={() => setFollowed(f=>!f)} style={{ display:'flex', alignItems:'center', gap:6, background: followed ? 'var(--acc)' : 'rgba(0,0,0,0.35)', backdropFilter:'blur(10px)', border: followed ? 'none' : '0.5px solid rgba(255,255,255,0.2)', borderRadius:20, padding:'7px 14px', color: followed ? '#000' : '#fff', fontSize:13, fontWeight:700, cursor:'pointer', transition:'all 0.2s' }}>
            {followed
              ? <><svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="#000" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>팔로우 중</>
              : <>+ 팔로우</>}
          </button>
        </div>
        <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'0 20px 20px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
            <span style={{ fontSize:11, color:'var(--acc)', fontWeight:700, letterSpacing:1.2, textTransform:'uppercase', background:'rgba(230,48,48,0.15)', borderRadius:6, padding:'3px 8px' }}>{player.sport}</span>
            <span style={{ fontSize:11, color:'rgba(255,255,255,0.5)', fontWeight:600 }}>{player.position}</span>
          </div>
          <div style={{ fontSize:36, fontWeight:900, color:'#fff', letterSpacing:-1.5, lineHeight:1, marginBottom:6, textShadow:'0 2px 12px rgba(0,0,0,0.5)' }}>
            <span style={{ ...NUM, color:'rgba(255,255,255,0.3)', fontSize:20, marginRight:6 }}>#{player.number}</span>
            {player.name}
          </div>
          <div style={{ fontSize:12, color:'rgba(255,255,255,0.55)' }}>{player.nameEn} · {player.team} · {player.league}</div>
        </div>
      </div>

      {/* Key stats strip */}
      <div style={{ display:'flex', margin:'0 16px 14px', background:'var(--surface)', borderRadius:16, border:'0.5px solid var(--border)' }}>
        {statRows.map(([label, val], i, arr) => (
          <div key={label} style={{ flex:1, textAlign:'center', padding:'14px 0', borderRight: i < arr.length-1 ? '0.5px solid var(--border)' : 'none' }}>
            <div style={{ ...NUM, fontSize:24, fontWeight:800, color:'var(--text)', letterSpacing:-0.5, lineHeight:1 }}>{val}</div>
            <div style={{ fontSize:10, color:'var(--text4)', marginTop:3, fontWeight:600, letterSpacing:0.3 }}>{label}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', borderBottom:'0.5px solid var(--border)', background:'var(--bg)', position:'sticky', top:0, zIndex:10 }}>
        {[['overview','요약'], ['stats','스탯'], ['info','정보']].map(([t, label]) => (
          <button key={t} onClick={() => setTab(t)} style={{ flex:1, background:'none', border:'none', padding:'12px 0', fontSize:13, fontWeight:600, color: tab===t ? 'var(--acc)' : 'var(--text4)', cursor:'pointer', borderBottom: tab===t ? '2px solid var(--acc)' : '2px solid transparent', transition:'all 0.15s' }}>
            {label}
          </button>
        ))}
      </div>

      {/* Overview tab */}
      {tab === 'overview' && (
        <div style={{ padding:'16px' }}>
          {player.sport === '축구' && (
            <>
              <div style={{ background:'var(--surface)', borderRadius:16, padding:'16px', border:'0.5px solid var(--border)', marginBottom:12 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, color:'var(--text)', marginBottom:2 }}>최근 7경기 폼</div>
                    <div style={{ fontSize:11, color:'var(--text4)' }}>평균 {(extra.form.reduce((a,b)=>a+b,0)/extra.form.length).toFixed(1)} / 10</div>
                  </div>
                  <div style={{ ...NUM, fontSize:26, fontWeight:800, color:'var(--acc)' }}>{extra.form[extra.form.length-1].toFixed(1)}</div>
                </div>
                <FormBar vals={extra.form}/>
              </div>
              <div style={{ background:'var(--surface)', borderRadius:16, padding:'16px', border:'0.5px solid var(--border)', marginBottom:12 }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:'var(--text)' }}>최근 경기 결과</div>
                  {recentLiveMatches.length > 0 && <span style={{ fontSize:10, color:'var(--acc)', fontWeight:700 }}>LIVE</span>}
                </div>
                {(recentLiveMatches.length > 0 ? recentLiveMatches : extra.recentMatches).map((m, i, arr) => (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:10, marginBottom: i < arr.length-1 ? 12 : 0, paddingBottom: i < arr.length-1 ? 12 : 0, borderBottom: i < arr.length-1 ? '0.5px solid var(--border2)' : 'none' }}>
                    <div style={{ width:30, height:30, borderRadius:8, background: m.result==='W'?'rgba(44,201,109,0.12)':m.result==='D'?'rgba(255,193,7,0.12)':'rgba(230,48,48,0.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      <span style={{ fontSize:12, fontWeight:800, color:resultColor[m.result] }}>{resultLabel[m.result]}</span>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:'var(--text)', marginBottom:1 }}>vs {m.opp}</div>
                      <div style={{ fontSize:11, color:'var(--text4)' }}>{m.date} · {m.score}</div>
                    </div>
                    <span style={{ fontSize:14 }}>{m.contrib}</span>
                  </div>
                ))}
              </div>
              <CareerTimeline extra={extra}/>
            </>
          )}
          {player.sport !== '축구' && (
            <div style={{ background:'var(--surface)', borderRadius:14, padding:'14px 16px', border:'0.5px solid var(--border)', marginBottom:12 }}>
              <div style={{ fontSize:11, color:'var(--text4)', fontWeight:700, letterSpacing:1, textTransform:'uppercase', marginBottom:12 }}>프로필</div>
              {[['생년월일', player.birth],['나이', `${player.age}세`],['포지션', player.position],['신장', player.height],['클럽', player.team],['리그', player.league]].map(([k,v]) => (
                <div key={k} style={{ display:'flex', justifyContent:'space-between', paddingBottom:8, marginBottom:8, borderBottom:'0.5px solid var(--border2)' }}>
                  <span style={{ fontSize:13, color:'var(--text3)' }}>{k}</span>
                  <span style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>{v}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Stats tab */}
      {tab === 'stats' && (
        <div style={{ padding:'16px' }}>
          {statsLoading ? (
            <div style={{ display:'flex', justifyContent:'center', padding:'48px 0' }}>
              <div style={{ width:28, height:28, borderRadius:'50%', border:'3px solid var(--border)', borderTopColor:'var(--acc)', animation:'spin 0.8s linear infinite' }}/>
            </div>
          ) : player.sport === '축구' && liveStats ? (
            <div style={{ background:'var(--surface)', borderRadius:16, padding:'16px', border:'0.5px solid var(--border)' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
                <div style={{ fontSize:13, fontWeight:700, color:'var(--text)' }}>2025 시즌 스탯</div>
                <span style={{ fontSize:10, color:'var(--acc)', fontWeight:700 }}>LIVE</span>
              </div>
              {[
                ['출전', liveStats.matches, '경기'],
                ['골', liveStats.goals, '골'],
                ['어시스트', liveStats.assists, '개'],
                ['평점', liveStats.rating, '/ 10'],
                ['슈팅', liveStats.shotsTotal, '개'],
                ['유효슈팅', liveStats.shotsOn, '개'],
                ['키패스', liveStats.keyPasses, '개'],
                ['드리블 성공', liveStats.dribbles, '회'],
                ['태클', liveStats.tackles, '회'],
                ['경고', liveStats.yellowCards, '회'],
              ].map(([label, val, unit]) => (
                <div key={label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:10, marginBottom:10, borderBottom:'0.5px solid var(--border2)' }}>
                  <span style={{ fontSize:13, color:'var(--text3)' }}>{label}</span>
                  <span style={{ fontSize:14, fontWeight:700, color:'var(--text)' }}>{val} <span style={{ fontSize:11, color:'var(--text4)', fontWeight:400 }}>{unit}</span></span>
                </div>
              ))}
            </div>
          ) : player.sport === '야구' && liveStats ? (
            <div style={{ background:'var(--surface)', borderRadius:16, padding:'16px', border:'0.5px solid var(--border)' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
                <div style={{ fontSize:13, fontWeight:700, color:'var(--text)' }}>2025 시즌 스탯</div>
                <span style={{ fontSize:10, color:'var(--acc)', fontWeight:700 }}>LIVE</span>
              </div>
              {[
                ['출전', liveStats.matches, '경기'],
                ['안타', liveStats.hits, '개'],
                ['홈런', liveStats.homeRuns, '개'],
                ['타점', liveStats.rbi, '점'],
                ['타율', liveStats.avg, ''],
                ['출루율', liveStats.obp, ''],
                ['OPS', liveStats.ops, ''],

// ─── SCREEN: SCHEDULE ─────────────────────────────────────────
function ScheduleScreen({ onMatch, liveApiMatches = [], isLoading = false }) {
  const days = ['일','월','화','수','목','금','토'];
  const now = new Date();

  // Generate dates: today ±7 days
  const datesList = [];
  for (let i = -7; i <= 7; i++) {
    const date = new Date(now);
    date.setDate(date.getDate() + i);
    datesList.push(date);
  }

  const [selDate, setSelDate] = React.useState(now.toDateString());
  const stripRef = React.useRef(null);
  const todayRef = React.useRef(null);

  // Scroll today's cell to center on mount
  React.useEffect(() => {
    if (stripRef.current && todayRef.current) {
      const strip = stripRef.current;
      const cell = todayRef.current;
      const offset = cell.offsetLeft - (strip.clientWidth / 2) + (cell.offsetWidth / 2);
      strip.scrollLeft = offset;
    }
  }, []);

  // Filter matches for selected date and within ±7 days range
  const sevenDaysAgo = new Date(now);
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  sevenDaysAgo.setHours(0, 0, 0, 0);

  const sevenDaysLater = new Date(now);
  sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
  sevenDaysLater.setHours(23, 59, 59, 999);

  const allMatches = liveApiMatches.filter(m => {
    if (!m.fullDate || !m.koreanPlayer) return false;
    const matchDate = new Date(m.fullDate);
    return matchDate >= sevenDaysAgo && matchDate <= sevenDaysLater;
  });

  const selectedDateMatches = allMatches.filter(m => {
    const matchDate = new Date(m.fullDate);
    return matchDate.toDateString() === selDate;
  });

  // Get label for date
  const getDateLabel = (date) => {
    const diff = Math.round((new Date(date.getFullYear(), date.getMonth(), date.getDate()) - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / (1000 * 60 * 60 * 24));
    if (diff === 0) return '오늘';
    if (diff === -1) return '어제';
    if (diff === 1) return '내일';
    return diff < 0 ? `${-diff}일전` : `${diff}일후`;
  };

  return (
    <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
      <div style={{ padding:'16px 20px 8px', fontSize:22, fontWeight:700, color:'var(--text)', letterSpacing:-0.5 }}>일정</div>

      {/* Date strip */}
      <div ref={stripRef} style={{ display:'flex', gap:6, padding:'8px 16px 12px', overflowX:'auto' }} className="scrollbar-hide">
        {datesList.map(date => {
          const dayIdx = date.getDay();
          const dateStr = date.toDateString();
          const isSel = dateStr === selDate;
          const isToday = dateStr === now.toDateString();
          const label = getDateLabel(date);

          return (
            <div key={dateStr} ref={isToday ? todayRef : null} onClick={() => setSelDate(dateStr)} style={{ flexShrink:0, minWidth:64, height:72, borderRadius:12, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:3, cursor:'pointer', background: isSel ? 'var(--acc)' : isToday ? 'rgba(245,196,0,0.12)' : 'var(--border2)', border: isToday && !isSel ? '0.5px solid rgba(245,196,0,0.4)' : '0.5px solid transparent', padding:'8px 6px' }}>
              <span style={{ fontSize:9, color: isSel ? 'rgba(0,0,0,0.6)' : 'var(--text5)', fontWeight:600, letterSpacing:0.3 }}>{label}</span>
              <span style={{ ...NUM, fontSize:22, fontWeight:800, color: isSel ? '#000' : isToday ? 'var(--acc)' : 'var(--text-70)', lineHeight:1 }}>{date.getDate()}</span>
              <span style={{ fontSize:10, color: isSel ? 'rgba(0,0,0,0.5)' : 'var(--text4)', fontWeight:600 }}>{days[dayIdx]}</span>
            </div>
          );
        })}
      </div>

      {/* Match list */}
      <div style={{ padding:'0 16px' }}>
        {isLoading ? (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'80px 20px', gap:16 }}>
            <div style={{ width:36, height:36, borderRadius:'50%', border:'3px solid var(--border)', borderTopColor:'var(--acc)', animation:'spin 0.8s linear infinite' }}/>
            <div style={{ fontSize:13, color:'var(--text4)', fontWeight:600 }}>일정을 불러오는 중입니다...</div>
          </div>
        ) : selectedDateMatches.length === 0 ? (
          <div style={{ textAlign:'center', padding:'60px 20px', color:'var(--text4)' }}>
            <div style={{ fontSize:48, marginBottom:16 }}>📅</div>
            <div style={{ fontSize:15, fontWeight:600, marginBottom:6 }}>경기가 없습니다</div>
            <div style={{ fontSize:13 }}>다른 날짜를 선택해보세요</div>
          </div>
        ) : (
          selectedDateMatches.map(m => {
            const isFinished = m.status === 'STATUS_FINAL' || m.status === 'STATUS_FULL_TIME' || m.status === 'final' || m.status === 'STATUS_END_PERIOD' || m.status === 'STATUS_FINAL_PEN';
            const kp = m.koreanPlayer;
            const leagueName = m.competition || m.sport || '';
            const labelParts = [kp.name];
            if (isFinished || m.live) {
              const ev = kp.event || '';
              if (ev) labelParts.push(ev);
              const goals = (m.events||[]).filter(e=>e.type==='goal'&&e.player===kp.name).length;
              const assists = (m.events||[]).filter(e=>e.type==='assist'&&e.player===kp.name).length;
              if (goals > 0) labelParts.push(`${goals}골`);
              if (assists > 0) labelParts.push(`${assists}도움`);
            }

            const koreanTeam = kp.team;
            const homeIsKorean = koreanTeam === m.home.code;
            const awayIsKorean = koreanTeam === m.away.code;

            return (
              <React.Fragment key={m.id}>
                {/* Label above card */}
                <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:5, paddingLeft:2 }}>
                  {m.competitionLogo
                    ? <img src={m.competitionLogo} style={{ width:12, height:12, objectFit:'contain', opacity:0.55, flexShrink:0 }} alt=""/>
                    : <span style={{ fontSize:10, flexShrink:0 }}>{m.sport?.includes('MLB')||m.sport?.includes('⚾') ? '⚾' : '⚽'}</span>
                  }
                  <span style={{ fontSize:11, color:'var(--text4)' }}>{leagueName.replace(/^[⚽⚾🏀🎾]\s*/,'')}</span>
                  <span style={{ fontSize:11, color:'var(--text5)' }}>/</span>
                  <span style={{ fontSize:11, color:'var(--acc)', fontWeight:700 }}>{labelParts[0]}</span>
                  {labelParts.length > 1 && (
                    <span style={{ fontSize:11, color:'var(--text)', fontWeight:500 }}>{' · ' + labelParts.slice(1).join(' · ')}</span>
                  )}
                  {isFinished && <span style={{ marginLeft:'auto', fontSize:10, fontWeight:600, color:'var(--text4)', flexShrink:0 }}>종료</span>}
                </div>
                <div onClick={() => onMatch(m)} style={{ marginBottom:14, background:'var(--surface)', borderRadius:14, padding:'12px 16px', cursor:'pointer', border: m.live ? '0.5px solid rgba(230,48,48,0.25)' : '0.5px solid var(--border2)' }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                    {/* Home */}
                    <div style={{ display:'flex', alignItems:'center', gap:6, flex:1, justifyContent:'flex-end' }}>
                      <span style={{ fontSize:13, fontWeight:600, color: homeIsKorean ? 'var(--acc)' : 'var(--text)', textAlign:'right', lineHeight:1.3 }}>{m.home.name}</span>
                      <TeamBadge code={m.home.code} size={24} logo={m.home.logo}/>
                    </div>
                    {/* Center: score or time */}
                    <div style={{ width:64, flexShrink:0, textAlign:'center' }}>
                      {m.live ? (
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:1 }}>
                          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                            <LiveDot/>
                            <span style={{ ...NUM, fontSize:15, fontWeight:800, color:'var(--text)' }}>{m.home.score}-{m.away.score}</span>
                          </div>
                          <span style={{ fontSize:9, fontWeight:700, color:'var(--acc)' }}>{m.minute}'</span>
                        </div>
                      ) : isFinished ? (
                        <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.home.score}-{m.away.score}</span>
                      ) : (
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:1 }}>
                          <span style={{ ...NUM, fontSize:14, fontWeight:700, color:'var(--text-60)' }}>{m.time||'예정'}</span>
                          <span style={{ fontSize:9, color:'var(--text5)' }}>KST</span>
                        </div>
                      )}
                    </div>
                    {/* Away */}
                    <div style={{ display:'flex', alignItems:'center', gap:6, flex:1 }}>
                      <TeamBadge code={m.away.code} size={24} logo={m.away.logo}/>
                      <span style={{ fontSize:13, fontWeight:600, color: awayIsKorean ? 'var(--acc)' : 'var(--text)', lineHeight:1.3 }}>{m.away.name}</span>
                    </div>
                  </div>
                </div>
              </React.Fragment>
            );
          })
        )}
      </div>
      <div style={{ height:24 }}/>
    </div>
  );
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 60) return '방금';
  if (diff < 3600) return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  return Math.floor(diff/86400) + '일 전';
}

}

  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);

  const MATCH_KEYWORDS = ['골','득점','어시스트','선발','출전','해트트릭','스코어','승리','패배','무승부','결승골','동점골','멀티골','풀타임','선제골','교체','활약','경기 결과','경기 일정','다음 경기','홈경기','원정경기','vs ','대 '];
  const EXCLUDE_KEYWORDS = ['부고','연봉','협회','가이드라인','노동','라커룸','칼럼','장인상','별세','타계','사망','인터뷰','은퇴','이적설','몸값','연봉협상','스타랭킹','순위표'];
  const PLAYER_NAMES = NEWS_PLAYERS.map(p => p.label);
  const SOCCER_PLAYERS = ['손흥민','이강인','김민재','황희찬','조규성','양현준','오현규'];
  const MLB_PLAYERS = ['김하성','이정후','김혜성','류현진'];

  const enabledSportTypes = React.useMemo(() => {
    const set = new Set();
    if (sportFeeds?.soccer) set.add('soccer');
    if (sportFeeds?.baseball) set.add('baseball');
    if (sportFeeds?.badminton) {
      set.add('other');
    }
    return set;
  }, [sportFeeds]);

  const detectCategory = (article) => {
    const haystack = `${article.title} ${article.description} ${article.source || ''}`;
    if (SOCCER_PLAYERS.some(name => haystack.includes(name))) return { category:'해외축구', sportType:'soccer' };
    if (MLB_PLAYERS.some(name => haystack.includes(name))) return { category:'MLB', sportType:'baseball' };
    return { category:'기타', sportType:'other' };
  };

  React.useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setError(null);
    setArticles([]);

    const fetchAllPlayerNews = async () => {
      try {
        const responses = await Promise.all(
          NEWS_PLAYERS.map(player =>
            fetch(`http://localhost:8002/naver-news?query=${encodeURIComponent(player.query)}`)
              .then(r => r.json())
              .then(data => (data.items || []).map(item => ({
                title: stripHtml(item.title),
                link: item.originallink || item.link,
                naverLink: item.link,
                pubDate: item.pubDate,
                description: stripHtml(item.description),
                player: player.label,
                source: (() => {
                  try { return new URL(item.originallink || item.link).hostname; }
                  catch { return ''; }
                })(),
              })))
              .catch(() => [])
          )
        );

        const merged = responses.flat();
        const filtered = merged.filter(item => {
          const haystack = `${item.title} ${item.description}`;
          if (EXCLUDE_KEYWORDS.some(kw => haystack.includes(kw))) return false;
          if (!PLAYER_NAMES.some(name => haystack.includes(name))) return false;
          return MATCH_KEYWORDS.some(kw => haystack.includes(kw));
        });

        const unique = Array.from(
          new Map(filtered.map(item => [`${item.title}|${item.link}`, item])).values()
        ).sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

        if (!cancelled) {
          setArticles(unique.slice(0, 40).map(item => {
            const meta = detectCategory(item);
            return { ...item, category: meta.category, sportType: meta.sportType };
          }));
        }
      } catch {
        if (!cancelled) setError('프록시 서버에 연결할 수 없습니다');
      } finally {
        if (!cancelled) setLoading(false);
      }
    };

    fetchAllPlayerNews();
    return () => { cancelled = true; };
  }, []);

  const allowedArticles = articles.filter(a => enabledSportTypes.has(a.sportType));
  const visibleArticles = category === '전체'
    ? allowedArticles
    : allowedArticles.filter(a => a.category === category);

  const enabledCategories = React.useMemo(() => {
    const categories = ['전체'];
    if (sportFeeds?.soccer) categories.push('해외축구');
    if (sportFeeds?.baseball) categories.push('MLB');
    if (sportFeeds?.badminton) {
      categories.push('기타');
    }
    return categories;
  }, [sportFeeds]);

  React.useEffect(() => {
    if (!enabledCategories.includes(category)) {
      setCategory('전체');
    }
  }, [enabledCategories, category]);

  return (
    <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
      <div style={{ padding:'16px 20px 12px', fontSize:22, fontWeight:700, color:'var(--text)', letterSpacing:-0.5 }}>뉴스</div>

      <div style={{ display:'flex', gap:8, overflowX:'auto', padding:'0 16px 14px' }} className="scrollbar-hide">
        {NEWS_CATEGORIES.filter(c => enabledCategories.includes(c)).map(c => (
          <button
            key={c}
            onClick={() => setCategory(c)}
            style={{
              flexShrink:0,
              background: category === c ? 'var(--acc)' : 'var(--border)',
              border:'none',
              borderRadius:20,
              padding:'7px 16px',
              fontSize:13,
              fontWeight:600,
              color: category === c ? '#000' : 'var(--text2)',
              cursor:'pointer',
              whiteSpace:'nowrap',
            }}
          >
            {c}
          </button>
        ))}
      </div>

      {/* Articles */}
      <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:12 }}>
        {loading && Array.from({length:5}).map((_, i) => (
          <div key={i} style={{ background:'var(--surface)', borderRadius:18, overflow:'hidden', border:'0.5px solid var(--border2)', display:'flex', height:130 }}>
            <div style={{ width:120, flexShrink:0, background:'var(--border)' }}/>
            <div style={{ flex:1, padding:'18px 16px' }}>
              <div style={{ height:14, borderRadius:7, background:'var(--border)', marginBottom:10, width:'90%' }}/>
              <div style={{ height:14, borderRadius:7, background:'var(--border)', marginBottom:10, width:'70%' }}/>
              <div style={{ height:12, borderRadius:6, background:'var(--border)', marginBottom:14, width:'50%' }}/>
              <div style={{ height:11, borderRadius:5, background:'var(--border)', width:'35%' }}/>
            </div>
          </div>
        ))}

        {!loading && error && (
          <div style={{ textAlign:'center', padding:'48px 20px', color:'var(--text4)' }}>
            <div style={{ fontSize:40, marginBottom:12 }}>📡</div>
            <div style={{ fontSize:14, fontWeight:600, marginBottom:4 }}>{error}</div>
            <div style={{ fontSize:12 }}>잠시 후 다시 시도해주세요</div>
          </div>
        )}

        {!loading && !error && visibleArticles.length === 0 && (
          <div style={{ textAlign:'center', padding:'48px 20px', color:'var(--text4)' }}>
            <div style={{ fontSize:40, marginBottom:12 }}>📰</div>
            <div style={{ fontSize:14, fontWeight:600 }}>뉴스가 없습니다</div>
          </div>
        )}

        {visibleArticles.map((a, i) => {
          const fallbackPlayer = detectPlayerName(`${a.title} ${a.description}`) || a.player || null;
          const source = (() => { try { return new URL(a.link).hostname.replace('www.','').replace('m.','').split('.')[0]; } catch { return ''; } })();
          return (
            <a key={i} href={a.naverLink || a.link} target="_blank" rel="noopener noreferrer" style={{ textDecoration:'none' }}>
              <div style={{ background:'var(--surface)', borderRadius:18, border:'0.5px solid var(--border2)', display:'flex', overflow:'hidden', minHeight:130 }}>
                <div style={{ width:120, flexShrink:0, position:'relative', overflow:'hidden' }}>
                  <NewsImage url={a.link} fallbackPlayer={fallbackPlayer}/>
                </div>
                <div style={{ flex:1, padding:'16px 16px', display:'flex', flexDirection:'column', justifyContent:'space-between', minWidth:0 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:'var(--text)', lineHeight:1.5, display:'-webkit-box', WebkitLineClamp:3, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
                    {a.title}
                  </div>
                  {a.description && (
                    <div style={{ fontSize:12, color:'var(--text4)', lineHeight:1.4, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden', marginTop:6 }}>
                      {a.description}
                    </div>
                  )}
                  <div style={{ display:'flex', gap:5, alignItems:'center', marginTop:8 }}>
                    {source && <span style={{ fontSize:11, color:'var(--acc)', fontWeight:700 }}>{source}</span>}
                    {source && <span style={{ fontSize:10, color:'var(--text5)' }}>·</span>}
                    <span style={{ fontSize:11, color:'var(--text4)' }}>{timeAgo(a.pubDate)}</span>
                  </div>
                </div>
              </div>
            </a>
          );
        })}
        <div style={{ height:20 }}/>
      </div>
    </div>
  );
}
