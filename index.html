        const groups = all?.groups || [];
        if (groups.length === 0) {
          return <div style={{ textAlign:'center', padding:'40px 0', color:'var(--text5)', fontSize:14 }}>통계가 없습니다</div>;
        }
        const STAT_LABELS = {
          'Ball possession':'점유율',
          'Expected goals':'기대득점 (xG)',
          'Big chances':'결정적 기회',
          'Big chances scored':'결정적 기회 골',
          'Big chances missed':'결정적 기회 놓침',
          'Total shots':'전체 슈팅',
          'Shots on target':'유효 슈팅',
          'Shots off target':'유효 외 슈팅',
          'Blocked shots':'블록된 슈팅',
          'Corner kicks':'코너킥',
          'Offsides':'오프사이드',
          'Fouls':'파울',
          'Yellow cards':'옐로우카드',
          'Red cards':'레드카드',
          'Free kicks':'프리킥',
          'Throw-ins':'스로인',
          'Goal kicks':'골킥',
          'Passes':'전체 패스',
          'Accurate passes':'정확한 패스',
          'Long balls':'롱볼',
          'Crosses':'크로스',
          'Dribbles':'드리블',
          'Possession lost':'볼 소유 상실',
          'Duels won':'경합 승리',
          'Aerials won':'공중볼 승리',
          'Tackles':'태클',
          'Interceptions':'인터셉트',
          'Clearances':'클리어',
          'Goalkeeper saves':'선방',
          'Total saves':'선방',
          'Group':'그룹',
        };
        const GROUP_LABELS = {
          'Match overview':'개요',
          'Shots':'슈팅',
          'Attack':'공격',
          'Passes':'패스',
          'Duels':'경합',
          'Defending':'수비',
          'Goalkeeping':'골키퍼',
        };
        const koreanIsAway = match.koreanPlayer?.team === match.away.code && match.koreanPlayer?.team !== match.home.code;
        const renderRow = (it, i) => {
          const label = STAT_LABELS[it.name] || it.name;
          const homeStr = String(it.home ?? '');
          const awayStr = String(it.away ?? '');
          const homeVal = parseFloat(homeStr);
          const awayVal = parseFloat(awayStr);
          const total = (isFinite(homeVal) ? homeVal : 0) + (isFinite(awayVal) ? awayVal : 0);
          const homePct = total > 0 ? (homeVal / total) * 100 : 50;
          const awayPct = total > 0 ? (awayVal / total) * 100 : 50;
          return (
            <div key={i} style={{ marginBottom:14 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
                <span style={{ ...NUM, fontSize:13, fontWeight:700, color: koreanIsAway ? 'var(--text2)' : 'var(--acc)', minWidth:50 }}>{homeStr}</span>
                <span style={{ fontSize:11, color:'var(--text3)', fontWeight:600 }}>{label}</span>
                <span style={{ ...NUM, fontSize:13, fontWeight:700, color: koreanIsAway ? 'var(--acc)' : 'var(--text2)', minWidth:50, textAlign:'right' }}>{awayStr}</span>
              </div>
              <div style={{ display:'flex', height:5, gap:2, background:'transparent' }}>
                {koreanIsAway ? (
                  <>
                    <div style={{ flex:1, height:'100%', background:'var(--border)', borderRadius:3 }}/>
                    <div style={{ width:`${awayPct}%`, height:'100%', background:'var(--acc)', borderRadius:3, transition:'width 0.6s ease' }}/>
                  </>
                ) : (
                  <>
                    <div style={{ width:`${homePct}%`, height:'100%', background:'var(--acc)', borderRadius:3, transition:'width 0.6s ease' }}/>
                    <div style={{ flex:1, height:'100%', background:'var(--border)', borderRadius:3 }}/>
                  </>
                )}
              </div>
            </div>
          );
        };
        return (
          <div style={{ padding:'16px' }}>
            {groups.map((g, gi) => (
              <div key={gi} style={{ marginBottom:18 }}>
                <div style={{ fontSize:11, fontWeight:700, color:'var(--text4)', letterSpacing:1, textTransform:'uppercase', marginBottom:10 }}>{GROUP_LABELS[g.groupName] || g.groupName}</div>
                {(g.statisticsItems || []).map(renderRow)}
              </div>
            ))}
          </div>
        );
      })()}
      {tab === 'lineups' && isMLBMatch && (() => {
        if (mlbLoading) return <div style={{ display:'flex', justifyContent:'center', padding:'48px 0' }}><div style={{ width:24, height:24, borderRadius:'50%', border:'2.5px solid var(--border)', borderTopColor:'var(--acc)', animation:'spin 0.8s linear infinite' }}/></div>;
        const teams = mlbSummary?.boxscore?.players || [];
        if (teams.length < 2) return <div style={{ textAlign:'center', padding:'40px 0', color:'var(--text5)', fontSize:14 }}>라인업 정보가 없습니다</div>;
        const koreanName = match.koreanPlayer?.nameEn || '';
        const norm = s => (s||'').toLowerCase().replace(/[-\s.']/g,'');
        const targetVariants = [norm(koreanName)];
        const parts = koreanName.toLowerCase().split(/[\s-]+/).filter(Boolean);
        if (parts.length >= 2) {
          targetVariants.push(norm(parts.slice(1).join('') + parts[0]));
          targetVariants.push(norm([parts[parts.length-1], ...parts.slice(0,-1)].join('')));
        }
        const isKorean = (n) => { const x = norm(n); return targetVariants.some(t => x === t || x.includes(t) || t.includes(x)); };
        const renderColumn = (matchTeam, teamData) => {
          if (!teamData) return null;
          const battingCat = (teamData.statistics || []).find(s => s.type === 'batting');
          const athletes = battingCat?.athletes || [];
          // Starters by batting order
          const lineup = athletes.filter(a => a.starter).sort((a,b) => (a.batOrder||99) - (b.batOrder||99));
          const bench = athletes.filter(a => !a.starter);
          const renderEntry = (a, i) => {
            const name = a.athlete?.displayName || '';
            const pos = a.position?.abbreviation || '';
            const korean = isKorean(name);
            const keys = battingCat?.keys || [];
            const stats = a.stats || [];
            const get = (k) => {
              const idx = keys.indexOf(k);
              return idx >= 0 ? stats[idx] : '';
            };
            const rawHA = get('hits-atBats');
            const h = get('hits'), ab = get('atBats');
            const summary = (rawHA ? String(rawHA).replace('-', '/') : (h && ab ? `${h}/${ab}` : ''));
            return (
              <div key={i} onClick={korean ? () => goKoreanPlayer(match.koreanPlayer) : undefined} style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 8px', borderRadius:8, background: korean ? 'rgba(245,196,0,0.12)' : 'transparent', border: korean ? '0.5px solid rgba(245,196,0,0.3)' : '0.5px solid transparent', marginBottom:4, cursor: korean && onPlayer ? 'pointer' : 'default' }}>
                <span style={{ ...NUM, fontSize:11, fontWeight:700, color:'var(--text4)', width:24, textAlign:'center', flexShrink:0 }}>{pos}</span>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, fontWeight: korean ? 700 : 600, color: korean ? 'var(--acc)' : 'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {korean ? `🇰🇷 ${name}` : name}
                  </div>
                </div>
                {summary && summary !== '/' && (
                  <span style={{ ...NUM, fontSize:10, fontWeight:700, color:'var(--text3)', flexShrink:0 }}>{summary}</span>
                )}
              </div>
            );
          };
          return (
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }}>
                <TeamBadge code={matchTeam.code} size={20} logo={matchTeam.logo}/>
                <span style={{ fontSize:12, fontWeight:700, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{matchTeam.name}</span>
              </div>
              {lineup.map(renderEntry)}
              {bench.length > 0 && (
                <>
                  <div style={{ fontSize:10, fontWeight:700, color:'var(--text4)', letterSpacing:1, marginTop:12, marginBottom:6, paddingLeft:8 }}>BENCH</div>
                  {bench.slice(0, 8).map(renderEntry)}
                </>
              )}
            </div>
          );
        };
        const homeTeamData = teams.find(t => t.team?.id) ? teams[teams.findIndex(t => t.displayOrder === 0)] || teams[0] : teams[0];
        const awayTeamData = teams.find(t => t.team?.id) ? teams[teams.findIndex(t => t.displayOrder === 1)] || teams[1] : teams[1];
        // ESPN MLB: home is typically displayOrder 0, away 1, but check `homeAway` if available via boxscore.teams instead
        const bsTeams = mlbSummary?.boxscore?.teams || [];
        const homeId = bsTeams.find(t => t.homeAway === 'home')?.team?.id;
        const homeData = teams.find(t => t.team?.id === homeId) || teams[0];
        const awayData = teams.find(t => t.team?.id !== homeId) || teams[1];
        return (
          <div style={{ padding:'14px 12px', display:'flex', gap:10, alignItems:'flex-start' }}>
            {renderColumn(match.home, homeData)}
            <div style={{ width:'0.5px', alignSelf:'stretch', background:'var(--border)', flexShrink:0 }}/>
            {renderColumn(match.away, awayData)}
          </div>
        );
      })()}
      {tab === 'lineups' && !isMLBMatch && (() => {
        if (lineupsLoading) {
          return <div style={{ display:'flex', justifyContent:'center', padding:'48px 0' }}><div style={{ width:24, height:24, borderRadius:'50%', border:'2.5px solid var(--border)', borderTopColor:'var(--acc)', animation:'spin 0.8s linear infinite' }}/></div>;
        }
        const homePlayers = lineupsData?.home?.players || [];
        const awayPlayers = lineupsData?.away?.players || [];
        if (homePlayers.length === 0 && awayPlayers.length === 0) {
          return <div style={{ textAlign:'center', padding:'40px 0', color:'var(--text5)', fontSize:14 }}>라인업 정보가 없습니다</div>;
        }
        const koreanName = match.koreanPlayer?.nameEn || '';
        const renderColumn = (team, teamData, players) => {
          const starters = players.filter(p => p.substitute === false);
          const subs = players.filter(p => p.substitute === true);
          const formation = teamData?.formation;
          const renderPlayer = (entry, i) => {
            const p = entry.player || {};
            const num = p.jerseyNumber || '';
            const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z\s]/g,'').trim();
            const a = norm(p.name), b = norm(koreanName);
            const isKorean = !!(a && b && (a === b || a.includes(b) || b.includes(a) || a.split(/\s+/).some(t => b.split(/\s+/).includes(t) && t.length >= 3)));
            const rating = entry.statistics?.rating;
            return (
              <div key={i} onClick={isKorean ? () => goKoreanPlayer(match.koreanPlayer) : undefined} style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 8px', borderRadius:8, background: isKorean ? 'rgba(245,196,0,0.12)' : 'transparent', border: isKorean ? '0.5px solid rgba(245,196,0,0.3)' : '0.5px solid transparent', marginBottom:4, cursor: isKorean && onPlayer ? 'pointer' : 'default' }}>
                <span style={{ ...NUM, fontSize:11, fontWeight:700, color:'var(--text4)', width:20, textAlign:'center', flexShrink:0 }}>{num}</span>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, fontWeight: isKorean ? 700 : 600, color: isKorean ? 'var(--acc)' : 'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {isKorean ? `🇰🇷 ${p.name}` : p.name}
                  </div>
                </div>
                {rating != null && (
                  <span style={{ ...NUM, fontSize:10, fontWeight:700, color:'var(--acc)', background:'rgba(245,196,0,0.15)', border:'0.5px solid rgba(245,196,0,0.3)', borderRadius:6, padding:'2px 6px', flexShrink:0 }}>
                    {parseFloat(rating).toFixed(1)}
                  </span>
                )}
              </div>
            );
          };
          return (
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }}>
                <TeamBadge code={team.code} size={20} logo={team.logo}/>
                <span style={{ fontSize:12, fontWeight:700, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{team.name}</span>
                {formation && <span style={{ ...NUM, fontSize:10, color:'var(--text4)', flexShrink:0 }}>{formation}</span>}
              </div>
              {starters.map(renderPlayer)}
              {subs.length > 0 && (
                <>
                  <div style={{ fontSize:10, fontWeight:700, color:'var(--text4)', letterSpacing:1, marginTop:12, marginBottom:6, paddingLeft:8 }}>SUBS</div>
                  {subs.map(renderPlayer)}
                </>
              )}
            </div>
          );
        };
        return (
          <div style={{ padding:'14px 12px', display:'flex', gap:10, alignItems:'flex-start' }}>
            {renderColumn(match.home, lineupsData?.home, homePlayers)}
            <div style={{ width:'0.5px', alignSelf:'stretch', background:'var(--border)', flexShrink:0 }}/>
            {renderColumn(match.away, lineupsData?.away, awayPlayers)}
          </div>
        );
      })()}

      <div style={{ height:'calc(96px + env(safe-area-inset-bottom))' }}/>
    </div>
  );
}

// ─── SCREEN: PLAYER PROFILE ───────────────────────────────────
function PlayerScreen({ player, onBack, onMatch, liveApiMatches = [], statsCache = {}, followedSet, onToggleFollow }) {
  const [tab, setTab] = React.useState('overview');
  const followed = followedSet ? followedSet.has(player.id) : true;
  const handleFollowClick = () => {
    if (followed) {
      // Confirm before unfollowing
      if (window.confirm(`${player.name} 선수를 팔로우 해제하시겠어요?`)) {
        onToggleFollow?.(player.id);
        onBack?.();
      }
    } else {
      onToggleFollow?.(player.id);
    }
  };
  const [liveStats, setLiveStats] = React.useState(() => statsCache[player.id] || null);
  const [statsLoading, setStatsLoading] = React.useState(!statsCache[player.id]);
  const extra = PLAYER_EXTRA[player.id] || DEFAULT_EXTRA;

  // Fetch real stats on mount
  React.useEffect(() => {
    let cancelled = false;
    setStatsLoading(true);

    const fetchStats = async () => {
      try {
        if (player.sport === '야구' && player.mlbId) {
          const res = await fetch(`${API_BASE}/api/mlb-stats?id=${player.mlbId}`);
          const data = await res.json();
          const stat = data?.stats?.[0]?.splits?.[0]?.stat;
          if (stat && !cancelled) {
            setLiveStats({
              matches: stat.gamesPlayed || 0,
              hits: stat.hits || 0,
              homeRuns: stat.homeRuns || 0,
              rbi: stat.rbi || 0,
              avg: stat.avg || '.000',
              obp: stat.obp || '.000',
              ops: stat.ops || '.000',
            });
          }
        } else if (player.sport === '축구' && player.espnLeague && player.espnId) {
          const res = await fetch(`${API_BASE}/api/espn-player-stats?league=${player.espnLeague}&id=${player.espnId}`);
          const data = await res.json();
          const cats = data?.splits?.categories || [];
          if (cats.length > 0 && !cancelled) {
            const allStats = cats.flatMap(c => c.stats || []);
            const get = (...names) => {
              for (const n of names) {
                const s = allStats.find(s => s.name === n);
                if (s) return parseFloat(s.value) || 0;
              }
              return 0;
            };
            setLiveStats({
              matches:       get('appearances'),
              starts:        get('starts'),
              goals:         get('totalGoals'),
              assists:       get('goalAssists'),
              yellowCards:   get('yellowCards'),
              redCards:      get('redCards'),
              minutes:       get('minutes'),
              shotsTotal:    get('totalShots'),
              shotsOn:       get('shotsOnTarget'),
              keyPasses:     get('shotAssists'),
              tackles:       get('totalTackles'),
              interceptions: get('interceptions'),
            });
          }
        }
      } catch(e) {}
      if (!cancelled) setStatsLoading(false);
    };

    fetchStats();
    return () => { cancelled = true; };
  }, [player.id]);

  // Helper: does this match include the current player among its Korean players?
  const matchHasPlayer = (m) => (m.koreanPlayers || [m.koreanPlayer]).some(kp => kp?.name === player.name);
  const playerKpInMatch = (m) => (m.koreanPlayers || [m.koreanPlayer]).find(kp => kp?.name === player.name) || m.koreanPlayer;

  // Recent matches from live API data
  const recentLiveMatches = React.useMemo(() => {
    return liveApiMatches
      .filter(m => matchHasPlayer(m) && (
        m.status === 'STATUS_FINAL' || m.status === 'STATUS_FULL_TIME' ||
        m.status === 'final' || m.status === 'STATUS_END_PERIOD' || m.status === 'STATUS_FINAL_PEN'
      ))
      .sort((a, b) => new Date(b.fullDate || 0) - new Date(a.fullDate || 0))
      .slice(0, 5)
      .map(m => {
        const kp = playerKpInMatch(m);
        const isHome = kp.team === m.home.code;
        const myScore = isHome ? m.home.score : m.away.score;
        const theirScore = isHome ? m.away.score : m.home.score;
        const opp = isHome ? m.away.name : m.home.name;
        const result = myScore > theirScore ? 'W' : myScore < theirScore ? 'L' : 'D';
        const goals = (m.events||[]).filter(e => e.type?.startsWith('goal') && e.player === player.name).length;
        const assists = (m.events||[]).filter(e => e.type === 'assist' && e.player === player.name).length;
        const contrib = player.sport === '야구'
          ? (() => {
              const ab = kp.atBats || 0, h = kp.hits || 0, hr = kp.homeRuns || 0, rbi = kp.rbi || 0, sb = kp.stolenBases || 0;
              const parts = [];
              if (ab > 0 || h > 0) parts.push(`${ab}타수 ${h}안타`);
              if (hr > 0) parts.push(`${hr}HR`);
              if (rbi > 0) parts.push(`${rbi}타점`);
              if (sb > 0) parts.push(`${sb}도루`);
              return parts.join(' ') || '-';
            })()
          : [goals > 0 && `${goals}골`, assists > 0 && `${assists}도움`].filter(Boolean).join(' ') || '-';
        const d = new Date(m.fullDate);
        const date = `${d.getMonth()+1}.${d.getDate()}`;
        return { opp, result, score:`${myScore}-${theirScore}`, contrib, date };
      });
  }, [liveApiMatches, player.name]);

  const resultColor = { W:'#2cc96d', D:'rgba(255,193,7,0.9)', L:'var(--acc)' };
  const resultLabel = { W:'승', D:'무', L:'패' };

  // Next upcoming match for this player
  const upcomingMatch = React.useMemo(() => {
    const now = Date.now();
    return liveApiMatches
      .filter(m => matchHasPlayer(m) && !m.live && m.fullDate && new Date(m.fullDate).getTime() > now)
      .sort((a, b) => new Date(a.fullDate) - new Date(b.fullDate))[0];
  }, [liveApiMatches, player.name]);

  const goals   = player.sport === '야구' ? (liveStats?.goals   ?? player.goals  ) : player.goals;
  const assists = player.sport === '야구' ? (liveStats?.assists ?? player.assists) : player.assists;
  const matches = player.sport === '야구' ? (liveStats?.matches ?? player.matches) : player.matches;
  const rating  = liveStats?.rating  ?? player.rating.toFixed(1);

  const statRows = player.sport === '축구' ? [
    ['골', goals], ['어시스트', assists], ['출전', matches], ['평점', rating],
  ] : player.sport === '야구' && liveStats ? [
    ['출전', liveStats.matches], ['안타', liveStats.hits], ['홈런', liveStats.homeRuns], ['타율', liveStats.avg],
  ] : player.sport === '야구' ? [
    ['출전', player.matches], ['나이', player.age],
  ] : player.sport === '배드민턴' ? [
    ['경기', player.matches], ['승', player.wins ?? 0], ['승률', `${player.winRate ?? 0}%`],
  ] : [
    ['출전', player.matches], ['나이', player.age],
  ];

  return (
    <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide screen-slide-in">
      {/* Hero */}
      <div style={{ position:'relative', height:320, overflow:'hidden' }}>
        {(() => {
          const LANDSCAPE = {
            '손흥민':'heungmin.jpg','이강인':'kangin.png','김민재':'minjae.jpeg',
            '조규성':'guesung.jpeg','황희찬':'heechan.jpeg','황인범':'inbeom.png',
            '김하성':'haseong.jpeg','이정후':'junghoo.jpeg','김혜성':'hyesung.jpeg',
            '오현규':'hyeongyu.jpeg','양현준':'hyunjun.jpeg',
            '백승호':'seungho.png','배준호':'junho.jpeg','엄지성':'jisung.jpeg',
            '설영우':'youngwoo.jpeg',
          };
          const file = LANDSCAPE[player.name];
          return file
            ? <img src={`image/landscape/${file}`} alt={player.name} style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'50% 25%' }}/>
            : <PlayerPhoto player={player} style={{ position:'absolute', inset:0 }}/>;
        })()}
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, var(--bg) 100%)' }}/>
        <div style={{ position:'absolute', top:12, left:20, right:20, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <BackBtn onBack={onBack} nativeHandled/>
          {!(typeof window !== 'undefined' && window.__nativeChrome) && (
          <button onClick={handleFollowClick} style={{ display:'flex', alignItems:'center', gap:6, background: followed ? 'var(--acc)' : 'rgba(0,0,0,0.35)', backdropFilter:'blur(10px)', border: followed ? 'none' : '0.5px solid rgba(255,255,255,0.2)', borderRadius:20, padding:'7px 14px', color: followed ? '#000' : '#fff', fontSize:13, fontWeight:700, cursor:'pointer', transition:'all 0.2s' }}>
            {followed
              ? <><svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="#000" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>팔로우 중</>
              : <>+ 팔로우</>}
          </button>
          )}
        </div>
        <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'0 20px 20px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
            <span style={{ fontSize:11, color:'var(--acc)', fontWeight:700, letterSpacing:1.2, textTransform:'uppercase', background:'rgba(230,48,48,0.15)', borderRadius:6, padding:'3px 8px' }}>{player.sport}</span>
            <span style={{ fontSize:11, color:'rgba(255,255,255,0.5)', fontWeight:600 }}>{player.position}</span>
          </div>
          <div style={{ fontSize:36, fontWeight:900, color:'#fff', letterSpacing:-1.5, lineHeight:1, marginBottom:6, textShadow:'0 2px 12px rgba(0,0,0,0.5)' }}>
            <span style={{ ...NUM, color:'rgba(255,255,255,0.3)', fontSize:20, marginRight:6 }}>#{player.number}</span>
            {player.name}
          </div>

                  const c = m.contrib || '';

                    opp: m.opp,

                    ab: ab ? parseInt(ab) : 0,

                const totalAB = parsed.reduce((s,g) => s + g.ab, 0);

// ─── SCREEN: SCHEDULE ─────────────────────────────────────────
function ScheduleScreen({ onMatch, liveApiMatches = [], isLoading = false, onRefresh, isActive = false, scrollTopKey = 0 }) {
  const days = ['일','월','화','수','목','금','토'];
  const now = new Date();

  // Generate dates: today ±7 days
  const datesList = [];
  for (let i = -7; i <= 7; i++) {
    const date = new Date(now);
    date.setDate(date.getDate() + i);
    datesList.push(date);
  }

  const [selDate, setSelDate] = React.useState(now.toDateString());
  const stripRef = React.useRef(null);
  const todayRef = React.useRef(null);

  // Pull-to-refresh state
  const [pullY, setPullY] = React.useState(0);
  const [refreshing, setRefreshing] = React.useState(false);
  const touchStartY = React.useRef(0);
  const scrollRef = React.useRef(null);
  const PULL_THRESHOLD = 64;

  const handleTouchStart = (e) => {
    touchStartY.current = e.touches[0].clientY;
  };
  const handleTouchMove = (e) => {
    if (refreshing) return;
    const scrollTop = scrollRef.current?.scrollTop || 0;
    if (scrollTop > 0) return;
    const dy = e.touches[0].clientY - touchStartY.current;
    if (dy > 0) setPullY(Math.min(dy * 0.45, PULL_THRESHOLD + 16));
  };
  const handleTouchEnd = async () => {
    if (pullY >= PULL_THRESHOLD && onRefresh && !refreshing) {
      setRefreshing(true);
      setPullY(PULL_THRESHOLD);
      // Safety: cap PTR spinner duration so it never sticks.
      const ptrSafety = setTimeout(() => setRefreshing(false), 12000);
      try { await onRefresh(); } catch (e) { console.warn('PTR refresh error:', e); }
      clearTimeout(ptrSafety);
      setRefreshing(false);
    }
    setPullY(0);
  };

  // Scroll today's cell to center whenever tab becomes active
  React.useEffect(() => {
    if (!isActive) return;
    const strip = stripRef.current;
    const cell = todayRef.current;
    if (!strip || !cell) return;
    const offset = cell.offsetLeft - (strip.clientWidth / 2) + (cell.offsetWidth / 2);
    strip.scrollLeft = offset;
  }, [isActive]);

  // Scroll to top when tab tapped
  React.useEffect(() => { if (scrollTopKey > 0) scrollRef.current?.scrollTo({ top: 0, behavior: 'smooth' }); }, [scrollTopKey]);

  // Filter matches for selected date and within ±7 days range
  const sevenDaysAgo = new Date(now);
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  sevenDaysAgo.setHours(0, 0, 0, 0);

  const sevenDaysLater = new Date(now);
  sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
  sevenDaysLater.setHours(23, 59, 59, 999);

  const allMatches = liveApiMatches.filter(m => {
    if (!m.fullDate || !m.koreanPlayer) return false;
    const matchDate = new Date(m.fullDate);
    return matchDate >= sevenDaysAgo && matchDate <= sevenDaysLater;
  });

  const selectedDateMatches = allMatches
    .filter(m => {
      const matchDate = new Date(m.fullDate);
      return matchDate.toDateString() === selDate;
    })
    .sort((a, b) => new Date(a.fullDate) - new Date(b.fullDate));

  // Get label for date
  const getDateLabel = (date) => {
    const diff = Math.round((new Date(date.getFullYear(), date.getMonth(), date.getDate()) - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / (1000 * 60 * 60 * 24));
    if (diff === 0) return '오늘';
    if (diff === -1) return '어제';
    if (diff === 1) return '내일';
    return diff < 0 ? `${-diff}일전` : `${diff}일후`;
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, height:'100%', background:'var(--bg)', minHeight:0 }}>
      {/* Fixed top nav (title + date strip) */}
      <div style={{ flexShrink:0, background:'var(--bg)' }}>
        <div style={{ padding:'16px 20px 8px', fontSize:22, fontWeight:700, color:'var(--text)', letterSpacing:-0.5 }}>일정</div>
        <div ref={stripRef} style={{ display:'flex', gap:6, padding:'8px 16px 12px', overflowX:'auto' }} className="scrollbar-hide">
          {datesList.map(date => {
            const dayIdx = date.getDay();
            const dateStr = date.toDateString();
            const isSel = dateStr === selDate;
            const isToday = dateStr === now.toDateString();
            const label = getDateLabel(date);
            return (
              <div key={dateStr} ref={isToday ? todayRef : null} onClick={() => setSelDate(dateStr)} style={{ flexShrink:0, minWidth:64, height:72, borderRadius:12, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:3, cursor:'pointer', background: isSel ? 'var(--acc)' : isToday ? 'rgba(245,196,0,0.12)' : 'var(--border2)', border: isToday && !isSel ? '0.5px solid rgba(245,196,0,0.4)' : '0.5px solid transparent', padding:'8px 6px' }}>
                <span style={{ fontSize:9, color: isSel ? 'rgba(0,0,0,0.6)' : 'var(--text5)', fontWeight:600, letterSpacing:0.3 }}>{label}</span>
                <span style={{ ...NUM, fontSize:22, fontWeight:800, color: isSel ? '#000' : isToday ? 'var(--acc)' : 'var(--text-70)', lineHeight:1 }}>{date.getDate()}</span>
                <span style={{ fontSize:10, color: isSel ? 'rgba(0,0,0,0.5)' : 'var(--text4)', fontWeight:600 }}>{days[dayIdx]}</span>
              </div>
            );
          })}
        </div>
      </div>
      {/* Scrollable content with pull-to-refresh */}
      <div ref={scrollRef} onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} style={{ flex:1, overflow:'auto', background:'var(--bg)', minHeight:0 }} className="scrollbar-hide">
      {/* Pull-to-refresh indicator */}
      <div style={{ overflow:'hidden', height: pullY, transition: pullY === 0 ? 'height 0.25s ease' : 'none', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, opacity: Math.min(pullY / PULL_THRESHOLD, 1) }}>
          <div style={{ width:18, height:18, border:'2.5px solid var(--acc)', borderTopColor:'transparent', borderRadius:'50%', animation: refreshing ? 'spin 0.7s linear infinite' : (pullY >= PULL_THRESHOLD ? 'spin 0.7s linear infinite' : 'none'), transform: !refreshing && pullY < PULL_THRESHOLD ? `rotate(${pullY * 4}deg)` : undefined }}/>
          <span style={{ fontSize:12, color:'var(--text3)', fontWeight:600 }}>{refreshing ? '새로고침 중...' : pullY >= PULL_THRESHOLD ? '놓아서 새로고침' : '당겨서 새로고침'}</span>
        </div>
      </div>


      {/* Match list */}
      <div style={{ padding:'0 16px' }}>
        {isLoading ? (
          <div style={{ paddingTop:8 }}>
            {Array.from({length:9}).map((_,i) => <SkeletonScheduleItem key={i}/>)}
          </div>
        ) : selectedDateMatches.length === 0 ? (
          <div style={{ textAlign:'center', padding:'60px 20px', color:'var(--text4)' }}>
            <div style={{ fontSize:48, marginBottom:16 }}>📅</div>
            <div style={{ fontSize:15, fontWeight:600, marginBottom:6 }}>경기가 없습니다</div>
            <div style={{ fontSize:13 }}>다른 날짜를 선택해보세요</div>
          </div>
        ) : (
          selectedDateMatches.map(m => {
            const isFinished = m.status === 'STATUS_FINAL' || m.status === 'STATUS_FULL_TIME' || m.status === 'final' || m.status === 'STATUS_END_PERIOD' || m.status === 'STATUS_FINAL_PEN';
            const kp = m.koreanPlayer;
            const rawLeague = (m.competition || m.sport || '').replace(/^[⚽⚾🏀🎾]\s*/,'');
            const leagueName = (() => {
              const s = rawLeague;
              if (/챔피언스|Champions League/i.test(s)) return 'UCL';
              if (/유로파|Europa League/i.test(s)) return 'UEL';
              if (/컨퍼런스|Conference/i.test(s)) return 'UECL';
              if (/Premier League/i.test(s)) return '프리미어리그';
              if (/La Liga|Primera Division/i.test(s)) return '라리가';
              if (/Bundesliga/i.test(s)) return '분데스리가';
              if (/Serie A/i.test(s)) return '세리에 A';
              if (/Ligue 1/i.test(s)) return '리그앙';
              if (/Major League Soccer|^MLS/i.test(s)) return 'MLS';
              if (/Major League Baseball/i.test(s)) return 'MLB';
              if (s.length > 10) return s.slice(0, 9) + '…';
              return s;
            })();
            const koreans = m.koreanPlayers || [kp];
            const koreanNames = koreans.map(k => k.name).join(' · ');
            const labelParts = [];
            if (isFinished || m.live) {
              // Show events aggregated across all Korean players
              koreans.forEach(k => {
                const goals = (m.events||[]).filter(e=>e.type==='goal'&&e.player===k.name).length;
                const assists = (m.events||[]).filter(e=>e.type==='assist'&&e.player===k.name).length;
                if (goals > 0) labelParts.push(`${k.name} ${goals}골`);
                if (assists > 0) labelParts.push(`${k.name} ${assists}도움`);
              });
              if (labelParts.length === 0 && kp.event) labelParts.push(formatExpectedEvent(kp, liveApiMatches));
            }

            const homeHasKorean = koreans.some(k => k.team === m.home.code);
            const awayHasKorean = koreans.some(k => k.team === m.away.code);
            const homeIsKorean = homeHasKorean;
            const awayIsKorean = awayHasKorean;

            return (
              <React.Fragment key={m.id}>
                {/* Label above card */}
                <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:5, paddingLeft:2, flexWrap:'wrap' }}>
                  {m.competitionLogo
                    ? <img src={m.competitionLogo} style={{ width:12, height:12, objectFit:'contain', opacity:0.55, flexShrink:0 }} alt=""/>
                    : <span style={{ fontSize:10, flexShrink:0 }}>{m.sport?.includes('MLB')||m.sport?.includes('⚾') ? '⚾' : '⚽'}</span>
                  }
                  <span style={{ fontSize:11, color:'var(--text4)' }}>{leagueName}</span>
                  <span style={{ fontSize:11, color:'var(--text5)' }}>/</span>
                  <span style={{ fontSize:11, color:'var(--acc)', fontWeight:700 }}>{koreanNames}</span>
                  {m.isKoreanDerby && (
                    <span style={{ fontSize:9, fontWeight:800, color:'#000', background:'linear-gradient(90deg, var(--acc), #ff8a3d)', borderRadius:4, padding:'2px 5px', letterSpacing:0.3, lineHeight:1 }}>🇰🇷 더비</span>
                  )}
                  {labelParts.length > 0 && (
                    <span style={{ fontSize:11, color:'var(--text)', fontWeight:500 }}>{' · ' + labelParts.join(' · ')}</span>
                  )}
                  {isFinished && <span style={{ marginLeft:'auto', fontSize:10, fontWeight:600, color:'var(--text4)', flexShrink:0 }}>종료</span>}
                </div>
                <div onClick={() => onMatch(m)} style={{ marginBottom:20, background:'var(--surface)', borderRadius:14, padding:'12px 16px', cursor:'pointer', border: m.live ? '0.5px solid rgba(230,48,48,0.25)' : '0.5px solid var(--border2)' }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                    {/* Home */}
                    <div style={{ display:'flex', alignItems:'center', gap:6, flex:1, justifyContent:'flex-end' }}>
                      <span style={{ fontSize:13, fontWeight:600, color: homeIsKorean ? 'var(--acc)' : 'var(--text)', textAlign:'right', lineHeight:1.3 }}>{m.home.name}</span>
                      <TeamBadge code={m.home.code} size={24} logo={m.home.logo}/>
                    </div>
                    {/* Center: score or time */}
                    <div style={{ width:64, flexShrink:0, textAlign:'center' }}>
                      {m.live ? (
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:1 }}>
                          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                            <LiveDot/>
                            <span style={{ ...NUM, fontSize:15, fontWeight:800, color:'var(--text)' }}>{m.home.score}-{m.away.score}</span>
                          </div>
                          <span style={{ fontSize:9, fontWeight:700, color:'var(--acc)' }}>{liveTimeLabel(m, m.minute)}</span>
                        </div>
                      ) : isFinished ? (
                        <span style={{ ...NUM, fontSize:16, fontWeight:800, color:'var(--text)' }}>{m.home.score}-{m.away.score}</span>
                      ) : (
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:1 }}>
                          <span style={{ ...NUM, fontSize:14, fontWeight:700, color:'var(--text-60)' }}>{m.time||'예정'}</span>
                          <span style={{ fontSize:9, color:'var(--text5)' }}>KST</span>
                        </div>
                      )}
                    </div>
                    {/* Away */}
                    <div style={{ display:'flex', alignItems:'center', gap:6, flex:1 }}>
                      <TeamBadge code={m.away.code} size={24} logo={m.away.logo}/>
                      <span style={{ fontSize:13, fontWeight:600, color: awayIsKorean ? 'var(--acc)' : 'var(--text)', lineHeight:1.3 }}>{m.away.name}</span>
                    </div>
                  </div>
                </div>
              </React.Fragment>
            );
          })
        )}
      </div>
      <div style={{ height:'calc(96px + env(safe-area-inset-bottom))' }}/>
      </div>
    </div>
  );
}

// ─── SCREEN: PLAYERS LIST ────────────────────────────────────
function PlayersScreen({ onPlayer, onAdd, followed, statsCache = {}, isLoading = false, onRefresh, scrollTopKey = 0, liveApiMatches = [], sportFeeds }) {
  // Static fallback team logo URLs by player name (used when no recent match cached)
  const TEAM_LOGO_FALLBACK = {
    '손흥민':'https://a.espncdn.com/i/teamlogos/soccer/500/18966.png',
    '이강인':'https://a.espncdn.com/i/teamlogos/soccer/500/160.png',
    '김민재':'https://a.espncdn.com/i/teamlogos/soccer/500/132.png',
    '황희찬':'https://a.espncdn.com/i/teamlogos/soccer/500/380.png',
    '황인범':'https://a.espncdn.com/i/teamlogos/soccer/500/142.png',
    '조규성':'https://a.espncdn.com/i/teamlogos/soccer/500/304.png',
    '오현규':'https://a.espncdn.com/i/teamlogos/soccer/500/113.png',
    '양현준':'https://a.espncdn.com/i/teamlogos/soccer/500/256.png',
    '백승호':'https://a.espncdn.com/i/teamlogos/soccer/500/337.png',
    '배준호':'https://a.espncdn.com/i/teamlogos/soccer/500/336.png',
    '엄지성':'https://a.espncdn.com/i/teamlogos/soccer/500/318.png',
    '설영우':'https://a.espncdn.com/i/teamlogos/soccer/500/2290.png',
    '김하성':'https://a.espncdn.com/i/teamlogos/mlb/500/pit.png',
    '이정후':'https://a.espncdn.com/i/teamlogos/mlb/500/sf.png',
    '김혜성':'https://a.espncdn.com/i/teamlogos/mlb/500/lad.png',
  };
  // Build a map: player name → team logo URL.
  // Prefer API-Football logos (media.api-sports.io) from live/recent matches —
  // they're always up-to-date with current team. Fall back to static URLs only
  // for players not yet found in any recent match.
  const teamLogoByPlayer = React.useMemo(() => {
    const map = {};
    for (const m of liveApiMatches) {
      const allKp = m.koreanPlayers || [m.koreanPlayer];
      for (const kp of allKp) {
        if (!kp || map[kp.name]) continue;
        const koreanIsHome = kp.team === m.home.code;
        const logo = koreanIsHome ? m.home.logo : m.away.logo;
        if (logo) map[kp.name] = logo;
      }
    }
    for (const [name, logo] of Object.entries(TEAM_LOGO_FALLBACK)) {
      if (!map[name]) map[name] = logo;
    }
    return map;
  }, [liveApiMatches]);

  const sports = ['전체', '축구', '야구'];
  const [scrolled, setScrolled] = React.useState(false);
  const [filter, setFilter] = React.useState('전체');
  const followedPlayers = ALL_PLAYERS
    .filter(p => followed.has(p.id))
    .filter(p => isPlayerAllowed(p, sportFeeds));
  const filtered = filter === '전체' ? followedPlayers
    : followedPlayers.filter(p => p.sport === filter);

  const [pullY, setPullY] = React.useState(0);
  const [refreshing, setRefreshing] = React.useState(false);
  const touchStartY = React.useRef(0);
  const scrollRef = React.useRef(null);
  const PULL_THRESHOLD = 64;
  React.useEffect(() => { if (scrollTopKey > 0) scrollRef.current?.scrollTo({ top: 0, behavior: 'smooth' }); }, [scrollTopKey]);

  const handleTouchStart = (e) => { touchStartY.current = e.touches[0].clientY; };
  const handleTouchMove = (e) => {
    if (refreshing) return;
    const scrollTop = scrollRef.current?.scrollTop || 0;
    if (scrollTop > 0) return;
    const dy = e.touches[0].clientY - touchStartY.current;
    if (dy > 0) setPullY(Math.min(dy * 0.45, PULL_THRESHOLD + 16));
  };
  const handleTouchEnd = async () => {
    if (pullY >= PULL_THRESHOLD && onRefresh && !refreshing) {
      setRefreshing(true);
      setPullY(PULL_THRESHOLD);
      // Safety: cap PTR spinner duration so it never sticks.
      const ptrSafety = setTimeout(() => setRefreshing(false), 12000);
      try { await onRefresh(); } catch (e) { console.warn('PTR refresh error:', e); }
      clearTimeout(ptrSafety);
      setRefreshing(false);
    }
    setPullY(0);
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, height:'100%', background:'var(--bg)', minHeight:0 }}>
      {/* Scroll area; the top nav sticks and turns to glass only after scrolling */}
      <div ref={scrollRef} onScroll={e => { const s = e.currentTarget.scrollTop > 4; setScrolled(p => p !== s ? s : p); }} onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} style={{ flex:1, overflow:'auto', background:'var(--bg)', minHeight:0 }} className="scrollbar-hide">
        {/* Sticky top nav — solid black at rest, glass scroll-edge once scrolled */}
        <div style={{ position:'sticky', top:0, zIndex:20, background: scrolled ? 'rgba(11,11,13,0.55)' : 'var(--bg)', backdropFilter: scrolled ? 'saturate(180%) blur(22px)' : 'none', WebkitBackdropFilter: scrolled ? 'saturate(180%) blur(22px)' : 'none', borderBottom: `0.5px solid ${scrolled ? 'var(--border)' : 'transparent'}`, transition: 'background 0.28s ease, backdrop-filter 0.28s ease, border-color 0.28s ease' }}>
          <div style={{ padding:'16px 20px 8px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div style={{ fontSize:22, fontWeight:700, color:'var(--text)', letterSpacing:-0.5 }}>선수</div>
            <button onClick={onAdd} style={{ display:'flex', alignItems:'center', gap:6, background:'var(--acc)', border:'none', borderRadius:20, padding:'8px 16px', color:'#000', fontSize:13, fontWeight:700, cursor:'pointer' }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="#000"/></svg>
              선수 편집
            </button>
          </div>
          <div style={{ display:'flex', gap:8, padding:'0 16px 14px', overflowX:'auto' }} className="scrollbar-hide">
            {sports.map(s => (
              <button key={s} onClick={() => setFilter(s)} style={{ flexShrink:0, background: filter===s ? 'var(--acc)' : 'var(--border)', border:'none', borderRadius:20, padding:'7px 16px', color: filter===s ? '#000' : 'var(--text2)', fontSize:13, fontWeight:600, cursor:'pointer' }}>{s}</button>
            ))}
          </div>
        </div>
      {/* Pull-to-refresh indicator */}
      <div style={{ overflow:'hidden', height: pullY, transition: pullY === 0 ? 'height 0.25s ease' : 'none', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, opacity: Math.min(pullY / PULL_THRESHOLD, 1) }}>
          <div style={{ width:18, height:18, border:'2.5px solid var(--acc)', borderTopColor:'transparent', borderRadius:'50%', animation: refreshing || pullY >= PULL_THRESHOLD ? 'spin 0.7s linear infinite' : 'none', transform: !refreshing && pullY < PULL_THRESHOLD ? `rotate(${pullY * 4}deg)` : undefined }}/>
          <span style={{ fontSize:12, color:'var(--text3)', fontWeight:600 }}>{refreshing ? '새로고침 중...' : pullY >= PULL_THRESHOLD ? '놓아서 새로고침' : '당겨서 새로고침'}</span>
        </div>
      </div>
      <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:10 }}>
        {(() => {
          const renderCard = p => {
            const teamLogo = teamLogoByPlayer[p.name];
            const s = statsCache[p.id];
            const goals   = p.sport === '야구' ? (s?.goals   ?? p.goals  ) : p.goals;
            const assists = p.sport === '야구' ? (s?.assists ?? p.assists) : p.assists;
            const matches = p.sport === '야구' ? (s?.matches ?? p.matches) : p.matches;
            const stats = [];
            if (p.sport === '축구') {
              stats.push({ k:'골',   v:goals,   accent: goals > 0 });
              stats.push({ k:'도움', v:assists, accent: false });
              stats.push({ k:'경기', v:matches, accent: false });
              if (p.rating > 0) stats.push({ k:'평점', v:p.rating.toFixed(1), accent: true });
            } else if (p.sport === '야구' && s) {
              stats.push({ k:'홈런', v:s.homeRuns, accent: s.homeRuns > 0 });
              stats.push({ k:'안타', v:s.hits, accent: false });
              if (s.avg) stats.push({ k:'타율', v:s.avg, accent: true });
            } else if (p.sport === '배드민턴') {
              stats.push({ k:'경기', v:matches, accent: false });
              if (p.wins != null) stats.push({ k:'승', v:p.wins, accent: true });
              if (p.winRate != null) stats.push({ k:'승률', v:`${p.winRate}%`, accent: true });
            } else {
              stats.push({ k:'경기', v:matches, accent: false });
              if (p.rating > 0) stats.push({ k:'평점', v:p.rating.toFixed(1), accent: true });
            }
            return (
              <div key={p.id} onClick={() => onPlayer(p)} style={{ background:'var(--surface)', borderRadius:16, overflow:'hidden', cursor:'pointer', border:'0.5px solid var(--border2)', display:'flex', alignItems:'stretch', height:112 }}>
                <div style={{ width:90, height:112, flexShrink:0, background:'var(--card)', position:'relative', overflow:'hidden' }}>
                  <PlayerPhoto player={p} style={{ position:'absolute', inset:0 }} tint="var(--surface)"/>
                </div>
                <div style={{ flex:1, padding:'12px 14px 6px', display:'flex', flexDirection:'column', justifyContent:'space-between', minWidth:0 }}>
                  {/* Top: name */}
                  <div>
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:7, flexWrap:'wrap' }}>
                      <span style={{ fontSize:16, fontWeight:800, color:'var(--text)', letterSpacing:-0.3 }}>{p.name}</span>
                      <span style={{ fontSize:10, color:'var(--text5)', fontWeight:500 }}>{p.nameEn}</span>
                      {p.injury && <span title={p.injury.label} style={{ fontSize:13, fontWeight:900, color:injuryStyle(p.injury).ic }}>{injuryStyle(p.injury).icon}</span>}
                    </div>
                    <div style={{ fontSize:11, color:'var(--text3)' }}>{p.team} · {p.position}</div>
                  </div>
                  {/* Bottom: team logo on left, stats on right (vertically aligned at number row) */}
                  <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8, marginTop:6 }}>
                    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', flexShrink:0 }}>
                      {teamLogo
                        ? <img src={teamLogo} alt={p.team} style={{ width:22, height:22, objectFit:'contain', marginTop:10 }}/>
                        : <div style={{ width:22, height:22, marginTop:10 }}/>
                      }
                      <div style={{ fontSize:9, marginTop:1, visibility:'hidden' }}>·</div>
                    </div>
                    <div style={{ display:'flex', gap:14, alignItems:'flex-start' }}>
                      {stats.map((st, i) => (
                        <div key={i} style={{ textAlign:'center', display:'flex', flexDirection:'column', alignItems:'center' }}>
                          <div style={{ ...NUM, fontSize:15, fontWeight:800, color: st.accent ? 'var(--acc)' : 'var(--text)', height:22, display:'flex', alignItems:'center' }}>{st.v}</div>
                          <div style={{ fontSize:9, color:'var(--text4)', marginTop:1 }}>{st.k}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            );
          };
          if (isLoading) return Array.from({length:5}).map((_,i) => <SkeletonPlayerCard key={i}/>);
          if (filter !== '전체') return filtered.map(renderCard);
          // Grouped rendering for 전체
          const SPORT_ORDER = ['축구','야구'];
          const SPORT_ICON = { '축구':'⚽', '야구':'⚾', '배드민턴':'🏸' };
          const grouped = {};
          for (const p of filtered) {
            (grouped[p.sport] = grouped[p.sport] || []).push(p);
          }
          return SPORT_ORDER.filter(s => grouped[s]?.length).map(sport => (
            <React.Fragment key={sport}>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:6, marginBottom:-2, paddingLeft:2 }}>
                <span style={{ fontSize:14 }}>{SPORT_ICON[sport]}</span>
                <span style={{ fontSize:11, fontWeight:700, color:'var(--text3)', letterSpacing:1, textTransform:'uppercase' }}>{sport}</span>
                <span style={{ fontSize:10, color:'var(--text5)', fontWeight:600 }}>{grouped[sport].length}명</span>
              </div>
              {grouped[sport].map(renderCard)}
            </React.Fragment>
          ));
        })()}
      </div>
      <div style={{ height:'calc(96px + env(safe-area-inset-bottom))' }}/>
      </div>
    </div>
  );
}

// ─── SCREEN: NOTIFICATIONS ───────────────────────────────────
function NotifScreen({ notifications }) {
  const notifs = notifications;
  return (
    <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
      {notifs.length === 0 ? (
        <div style={{ textAlign:'center', padding:'60px 20px', color:'var(--text4)' }}>
          <div style={{ fontSize:48, marginBottom:16 }}>🔔</div>
          <div style={{ fontSize:15, fontWeight:600, marginBottom:6 }}>알림이 없습니다</div>
          <div style={{ fontSize:13 }}>한국 선수의 특이사항이 생기면 알려드릴게요</div>
        </div>
      ) : (
        <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:8 }}>
          {notifs.map(n => (
          <div key={n.id} style={{ background:'var(--surface)', borderRadius:14, padding:'14px 16px', border: n.live ? '0.5px solid rgba(230,48,48,0.25)' : '0.5px solid var(--border2)', display:'flex', alignItems:'flex-start', gap:12 }}>
            <div style={{ width:40, height:40, borderRadius:12, background: n.live ? 'rgba(230,48,48,0.15)' : 'var(--border)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0 }}>{n.icon}</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8, marginBottom:3 }}>
                <span style={{ fontSize:14, fontWeight:700, color:'var(--text)' }}>{n.title}</span>
                <span style={{ fontSize:11, color:'var(--text4)', flexShrink:0 }}>{n.time}</span>
              </div>
              <div style={{ fontSize:12, color:'var(--text3)', lineHeight:1.4 }}>{n.body}</div>
              {n.live && <div style={{ display:'flex', alignItems:'center', gap:5, marginTop:6 }}><LiveDot/><span style={{ fontSize:11, fontWeight:700, color:'var(--acc)' }}>진행 중</span></div>}
            </div>
          </div>
          ))}
        </div>
      )}
      <div style={{ height:'calc(96px + env(safe-area-inset-bottom))' }}/>
    </div>
  );
}

function detectPlayerName(text) {
  for (const name of Object.keys(NEWS_PLAYER_IMG)) {
    if (text && text.includes(name)) return name;
  }
  return null;
}

function extractSource(description) {
  if (!description) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = description;
  const firstLi = tmp.querySelector('li');
  if (!firstLi) return '';
  const parts = firstLi.textContent.split('　　');
  return parts[1]?.trim() || '';
}

function NewsImage({ url, fallbackPlayer }) {
  const cached = newsImageCache[url];
  const [imgSrc, setImgSrc] = React.useState(cached || null);
  const [loading, setLoading] = React.useState(cached === undefined);

  React.useEffect(() => {
    if (!url) { setLoading(false); return; }
    if (newsImageCache[url] !== undefined) {
      setImgSrc(newsImageCache[url] || null);
      setLoading(false);
      return;
    }
    setLoading(true);
    fetch(`${API_BASE}/api/news-image?url=${encodeURIComponent(url)}`)
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        const raw = d?.image || null;
        const src = raw ? raw.replace(/^http:\/\//, 'https://') : null;
        newsImageCache[url] = src || '';
        setImgSrc(src);
        setLoading(false);
      })
      .catch(() => { newsImageCache[url] = ''; setLoading(false); });
  }, [url]);

  const fallbackSrc = fallbackPlayer ? NEWS_PLAYER_IMG[fallbackPlayer] : null;

  if (loading) {
    return (
      <div className="shimmer" style={{ width:'100%', height:'100%' }}/>
    );
  }

  if (imgSrc) {
    return <img src={imgSrc} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }} onError={e => { e.target.style.display='none'; }}/>;
  }

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--border)' }}>
      {fallbackSrc
        ? <img src={fallbackSrc} alt="" style={{ width:44, height:44, borderRadius:'50%', objectFit:'cover', border:'2px solid var(--border2)' }}/>
        : <svg width="32" height="32" viewBox="0 0 24 24" fill="none" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" strokeWidth="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M3 15l5-4 4 3 3-2.5L21 15" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/></svg>
      }
    </div>
  );
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 60) return '방금';
  if (diff < 3600) return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  return Math.floor(diff/86400) + '일 전';
}

function stripHtml(str) {
  return str ? str.replace(/<[^>]*>/g, '').replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>') : '';
}

function NewsScreen({ sportFeeds, scrollTopKey = 0 }) {
  const NEWS_CATEGORIES = ['전체', '해외축구', 'MLB', '기타'];
  const [scrolled, setScrolled] = React.useState(false);
  const [category, setCategory] = React.useState('전체');
  const [articles, setArticles] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [refetchTrigger, setRefetchTrigger] = React.useState(0);

  const [pullY, setPullY] = React.useState(0);
  const [refreshing, setRefreshing] = React.useState(false);
  const touchStartY = React.useRef(0);
  const scrollRef = React.useRef(null);
  const PULL_THRESHOLD = 64;
  React.useEffect(() => { if (scrollTopKey > 0) scrollRef.current?.scrollTo({ top: 0, behavior: 'smooth' }); }, [scrollTopKey]);

  const handleTouchStart = (e) => { touchStartY.current = e.touches[0].clientY; };
  const handleTouchMove = (e) => {
    if (refreshing) return;
    const scrollTop = scrollRef.current?.scrollTop || 0;
    if (scrollTop > 0) return;
    const dy = e.touches[0].clientY - touchStartY.current;
    if (dy > 0) setPullY(Math.min(dy * 0.45, PULL_THRESHOLD + 16));
  };
  const handleTouchEnd = () => {
    if (pullY >= PULL_THRESHOLD && !refreshing) {
      setRefreshing(true);
      setPullY(PULL_THRESHOLD);
      setRefetchTrigger(t => t + 1);
    } else {
      setPullY(0);
    }
  };

  const MATCH_KEYWORDS = ['골','득점','어시스트','선발','출전','해트트릭','스코어','승리','패배','무승부','결승골','동점골','멀티골','풀타임','선제골','교체','활약','경기 결과','경기 일정','다음 경기','홈경기','원정경기','vs ','대 '];
  const EXCLUDE_KEYWORDS = [
    // 부고·인사
    '부고','별세','타계','사망','추모','조의','조문','장례','빈소','발인','장인상','모친상','부친상',
    // 정치·사회
    '정치','대통령','국회','국정','법원','검찰','경찰서','피의자','구속','구형','선고','대선','총선','시위','집회',
    '윤석열','이재명','한동훈','민주당','국민의힘',
    // 연봉·이적·협회
    '연봉','연봉협상','몸값','이적설','이적료','연봉계약','협회','가이드라인','노동','라커룸',
    // 가십·연예·개인사
    '결혼','이혼','열애','연애','웨딩','데이트','임신','출산','루머','폭로','갑질','논란','가짜뉴스',
    // 형식·기타
    '칼럼','사설','오피니언','기고','속보 종합','광고','협찬','분양','부동산','재테크','주식','코인',
    '스타랭킹','순위표','칼럼','명언','어록','인터뷰','은퇴',
  ];
  const PLAYER_NAMES = NEWS_PLAYERS.map(p => p.label);
  const SOCCER_PLAYERS = ['손흥민','이강인','김민재','황희찬','황인범','조규성','양현준','오현규','백승호','배준호','엄지성'];
  const MLB_PLAYERS = ['김하성','이정후','김혜성','류현진'];

  // Click-bait patterns: when title uses our player's name as a comparison/foil
  // for a foreign player who is the actual subject of the article.
  // Build regex from each player name + common clickbait connectors.
  const CLICKBAIT_PATTERNS = [
    '보다', '보단', '만큼', '같은', '차세대', '후계자', '능가', '잡고',
    '에 제대로', '에게 당', '을 능가', '를 능가', '을 도발', '를 도발',
    '굴욕', '망신', '도발', '영업만', '같이.*뛸', '저격',
  ];
  const isClickbaitForKorean = (title) => {
    if (!title) return false;
    return PLAYER_NAMES.some(name => {
      if (!title.includes(name)) return false;
      return CLICKBAIT_PATTERNS.some(p => {
        const re = new RegExp(name + '[가-힣A-Za-z0-9 ]*' + p);
        return re.test(title);
      });
    });
  };

  const enabledSportTypes = React.useMemo(() => {
    const set = new Set();
    if (sportFeeds?.soccer) set.add('soccer');
    if (sportFeeds?.baseball) set.add('baseball');
    return set;
  }, [sportFeeds]);

  const detectCategory = (article) => {
    const haystack = `${article.title} ${article.description} ${article.source || ''}`;
    if (SOCCER_PLAYERS.some(name => haystack.includes(name))) return { category:'해외축구', sportType:'soccer' };
    if (MLB_PLAYERS.some(name => haystack.includes(name))) return { category:'MLB', sportType:'baseball' };
    return { category:'기타', sportType:'other' };
  };

  React.useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setError(null);
    setArticles([]);

    const fetchAllPlayerNews = async () => {
      try {
        const responses = await Promise.all(
          NEWS_PLAYERS.map(player =>
            fetch(`${API_BASE}/api/naver-news?query=${encodeURIComponent(player.query)}`)
              .then(r => r.json())
              .then(data => (data.items || []).map(item => ({
                title: stripHtml(item.title),
                link: item.originallink || item.link,
                naverLink: item.link,
                pubDate: item.pubDate,
                description: stripHtml(item.description),
                player: player.label,
                source: (() => {
                  try { return new URL(item.originallink || item.link).hostname; }
                  catch { return ''; }
                })(),
              })))
              .catch(() => [])
          )
        );

        // Allowlist of sports-focused outlets (host substrings)
        const SPORTS_HOSTS = [
          'spotvnews', 'xportsnews', 'osen', 'mydaily', 'starnewskorea', 'isplus', 'sportsq',
          'sportsworldi', 'sportsseoul', 'sportschosun', 'mksports', 'sports.news', 'sports.donga',
          'sports.chosun', 'sports.hankyung', 'sports.joongang', 'sports.khan', 'sports.kbsm',
          'sports.naver', 'sports.daum', 'footballist', 'thespike', 'thefootballist',
          'interfootball', 'bestelevenmag', 'soccerline', 'fourfourtwo', 'soccerphile',

          'soccertown', 'soccerassociation', 'football-asian', 'fmkorea',
          'sportalkorea', 'gettyimages', 'tvdaily', 'sportv', 'jtbcgolf',
        ];
        const isSportsHost = (host) => {
          const h = (host || '').toLowerCase();
          return SPORTS_HOSTS.some(k => h.includes(k));
        };

        const merged = responses.flat();
        const filtered = merged.filter(item => {
          if (!isSportsHost(item.source)) return false;
          if (isClickbaitForKorean(item.title)) return false;
          const haystack = `${item.title} ${item.description}`;
          if (EXCLUDE_KEYWORDS.some(kw => haystack.includes(kw))) return false;
          if (!PLAYER_NAMES.some(name => haystack.includes(name))) return false;
          return MATCH_KEYWORDS.some(kw => haystack.includes(kw));
        });

        const unique = Array.from(
          new Map(filtered.map(item => [`${item.title}|${item.link}`, item])).values()
        ).sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

        if (!cancelled) {
          setArticles(unique.slice(0, 40).map(item => {
            const meta = detectCategory(item);
            return { ...item, category: meta.category, sportType: meta.sportType };
          }));
        }
      } catch {
        if (!cancelled) setError('프록시 서버에 연결할 수 없습니다');
      } finally {
        if (!cancelled) {
          setLoading(false);
          setRefreshing(false);
          setPullY(0);
        }
      }
    };

    fetchAllPlayerNews();
    return () => { cancelled = true; };
  }, [refetchTrigger]);

  const allowedArticles = articles.filter(a => enabledSportTypes.has(a.sportType));
  const visibleArticles = category === '전체'
    ? allowedArticles
    : allowedArticles.filter(a => a.category === category);

  const enabledCategories = React.useMemo(() => {
    const categories = ['전체'];
    if (sportFeeds?.soccer) categories.push('해외축구');
    if (sportFeeds?.baseball) categories.push('MLB');
    return categories;

      {/* Scroll area; the top nav sticks and turns to glass only after scrolling */}

      {/* Pull-to-refresh indicator */}
      <div style={{ overflow:'hidden', height: pullY, transition: pullY === 0 ? 'height 0.25s ease' : 'none', display:'flex', alignItems:'center', justifyContent:'center' }}>

          <span style={{ fontSize:12, color:'var(--text3)', fontWeight:600 }}>{refreshing ? '새로고침 중...' : pullY >= PULL_THRESHOLD ? '놓아서 새로고침' : '당겨서 새로고침'}</span>

// ─── SCREEN: MORE (main) ─────────────────────────────────────
function CropScreen({ src, onCancel, onConfirm }) {
  const VIEW = 300;
  const OUT = 256;
  const [imgSize, setImgSize] = React.useState(null);
  const [zoom, setZoom] = React.useState(1);
  const [offset, setOffset] = React.useState({ x:0, y:0 });
  const dragRef = React.useRef(null);

  React.useEffect(() => {
    const im = new Image();
    im.onload = () => setImgSize({ w: im.naturalWidth, h: im.naturalHeight });
    im.src = src;
  }, [src]);

  const baseScale = imgSize ? VIEW / Math.min(imgSize.w, imgSize.h) : 1;
  const effScale = baseScale * zoom;

  const clampOffset = React.useCallback((next, scale = effScale) => {
    if (!imgSize) return next;
    const dispW = imgSize.w * scale;
    const dispH = imgSize.h * scale;
    const maxX = Math.max(0, (dispW - VIEW) / 2);
    const maxY = Math.max(0, (dispH - VIEW) / 2);
    return {
      x: Math.max(-maxX, Math.min(maxX, next.x)),
      y: Math.max(-maxY, Math.min(maxY, next.y)),
    };
  }, [imgSize, effScale]);

  const onPointerDown = (e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    dragRef.current = { startX: e.clientX, startY: e.clientY, ox: offset.x, oy: offset.y };
  };
  const onPointerMove = (e) => {
    if (!dragRef.current) return;
    const { startX, startY, ox, oy } = dragRef.current;
    setOffset(clampOffset({ x: ox + (e.clientX - startX), y: oy + (e.clientY - startY) }));
  };
  const onPointerUp = (e) => {
    dragRef.current = null;
    try { e.currentTarget.releasePointerCapture(e.pointerId); } catch {}
  };

  const onZoomChange = (v) => {
    setZoom(v);
    setOffset(prev => clampOffset(prev, baseScale * v));
  };

  const confirm = () => {
    if (!imgSize) return;
    const visibleSrc = VIEW / effScale;
    const cx = imgSize.w / 2 - offset.x / effScale;
    const cy = imgSize.h / 2 - offset.y / effScale;
    const sx = cx - visibleSrc / 2;
    const sy = cy - visibleSrc / 2;
    const canvas = document.createElement('canvas');
    canvas.width = OUT; canvas.height = OUT;
    const ctx = canvas.getContext('2d');
    const im = new Image();
    im.onload = () => {
      ctx.drawImage(im, sx, sy, visibleSrc, visibleSrc, 0, 0, OUT, OUT);
      onConfirm(canvas.toDataURL('image/jpeg', 0.85));
    };
    im.src = src;
  };

  return (
    <div style={{ position:'absolute', inset:0, background:'var(--bg)', zIndex:200, display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'12px 20px 8px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <button onClick={onCancel} style={{ background:'none', border:'none', color:'var(--text2)', fontSize:15, cursor:'pointer', padding:0 }}>취소</button>
        <div style={{ fontSize:16, fontWeight:700, color:'var(--text)' }}>사진 자르기</div>
        <button onClick={confirm} style={{ background:'none', border:'none', color:'var(--acc)', fontSize:15, fontWeight:700, cursor:'pointer', padding:0 }}>완료</button>
      </div>

      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'20px' }}>
        <div
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerUp}
          style={{ width:VIEW, height:VIEW, position:'relative', overflow:'hidden', borderRadius:8, background:'#000', touchAction:'none', cursor:'grab' }}
        >
          {imgSize && (
            <img
              src={src}
              alt=""
              draggable={false}
              style={{
                position:'absolute',
                left:'50%', top:'50%',
                width: imgSize.w * effScale,
                height: imgSize.h * effScale,
                transform: `translate(calc(-50% + ${offset.x}px), calc(-50% + ${offset.y}px))`,
                userSelect:'none', pointerEvents:'none',
                maxWidth:'none',
              }}
            />
          )}
          {/* circular mask overlay */}
          <div style={{ position:'absolute', inset:0, pointerEvents:'none', boxShadow:`0 0 0 9999px rgba(0,0,0,0.55)`, borderRadius:'50%' }}/>
          <div style={{ position:'absolute', inset:0, pointerEvents:'none', borderRadius:'50%', border:'1px solid rgba(255,255,255,0.6)' }}/>
        </div>

        <div style={{ width:VIEW, marginTop:24, display:'flex', alignItems:'center', gap:12 }}>
          <span style={{ fontSize:11, color:'var(--text4)', fontWeight:700 }}>축소</span>
          <input
            type="range"
            min={1} max={4} step={0.01}
            value={zoom}
            onChange={e => onZoomChange(parseFloat(e.target.value))}
            style={{ flex:1, accentColor:'var(--acc)' }}
          />
          <span style={{ fontSize:11, color:'var(--text4)', fontWeight:700 }}>확대</span>
        </div>
        <div style={{ fontSize:11, color:'var(--text5)', marginTop:14, textAlign:'center' }}>드래그로 위치 조정 · 슬라이더로 확대/축소</div>
      </div>
    </div>
  );
}

        <button onClick={send} style={{ background:'none', border:'none', color: text.trim() ? 'var(--acc)' : 'var(--text5)', fontSize:15, fontWeight:700, cursor:'pointer', padding:0 }}>보내기</button>
      </div>

      <div style={{ padding:'16px' }}>
        <div style={{ fontSize:12, color:'var(--text4)', lineHeight:1.6, marginBottom:14 }}>
          개선 사항이나 버그를 알려주세요. 보내기를 누르면 메일 앱이 열려{' '}
          <span style={{ color:'var(--text2)', fontWeight:600 }}>{RECIPIENT}</span>{' '}
          으로 전송할 수 있습니다.
        </div>
        <div style={{ background:'var(--surface)', borderRadius:14, border:'0.5px solid var(--border)', padding:'12px 14px' }}>
          <textarea
            value={text}
            onChange={e => setText(e.target.value.slice(0, MAX))}
            placeholder="어떤 부분이 좋았거나 불편하셨나요?"
            style={{ width:'100%', minHeight:200, background:'transparent', border:'none', outline:'none', color:'var(--text)', fontSize:14, lineHeight:1.6, resize:'none', fontFamily:"'Noto Sans KR', sans-serif" }}
          />
        </div>
        <div style={{ fontSize:11, color:'var(--text5)', padding:'8px 4px', textAlign:'right' }}>{text.length}/{MAX}</div>
      </div>
    </div>
  );
}
