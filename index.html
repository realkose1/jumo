// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('jumo_tweaks')||'{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [tab, setTab] = React.useState(() => { const t = localStorage.getItem('jumo_tab'); return (t === 'notif' || !t) ? 'home' : t; });
  const [screen, setScreen] = React.useState('main');
  const [selectedMatch, setSelectedMatch] = React.useState(null);
  const [selectedPlayer, setSelectedPlayer] = React.useState(null);
  const [followed, setFollowed] = React.useState(() => new Set([1,2,3,6,7,8,9,17,18,15]));
  const toggleFollow = (id) => setFollowed(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const [darkMode, setDarkMode] = React.useState(true);
  const toggleDark = () => setDarkMode(d => !d);
  const [sportFeeds, setSportFeeds] = React.useState(() => {
    try {
      return { soccer:true, baseball:true, badminton:true, ...JSON.parse(localStorage.getItem('jumo_sport_feeds') || '{}') };
    } catch {
      return { soccer:true, baseball:true, badminton:true };
    }
  });
  const toggleSportFeed = (id) => {
    setSportFeeds(prev => {
      const next = { ...prev, [id]: !prev[id] };
      localStorage.setItem('jumo_sport_feeds', JSON.stringify(next));
      return next;
    });
  };
  const [liveMatches, setLiveMatches] = React.useState([]);
  const [apiLoading, setApiLoading] = React.useState(true); // Start with true for initial load
  const [isInitialLoad, setIsInitialLoad] = React.useState(true);
  const [notifications, setNotifications] = React.useState([]);
  const [playerStatsCache, setPlayerStatsCache] = React.useState({});

  React.useEffect(() => {
    const parseESPN = (data) => {
      const cats = data?.splits?.categories || [];
      if (!cats.length) return null;
      const allStats = cats.flatMap(c => c.stats || []);
      const get = (...names) => { for (const n of names) { const s = allStats.find(s => s.name === n); if (s) return parseFloat(s.value)||0; } return 0; };
      return { goals: get('totalGoals'), assists: get('goalAssists'), matches: get('appearances'), shotsTotal: get('totalShots'), shotsOn: get('shotsOnTarget'), keyPasses: get('shotAssists'), tackles: get('totalTackles'), interceptions: get('interceptions'), yellowCards: get('yellowCards'), redCards: get('redCards'), minutes: get('minutes'), starts: get('starts') };
    };
    const parseMLB = (data) => {
      const stat = data?.stats?.[0]?.splits?.[0]?.stat;
      if (!stat) return null;
      return { matches: stat.gamesPlayed, hits: stat.hits, homeRuns: stat.homeRuns, rbi: stat.rbi, avg: stat.avg, obp: stat.obp, ops: stat.ops };
    };
    const cache = {};
    Promise.all(ALL_PLAYERS.map(async p => {
      try {
        if (p.sport === '축구' && p.espnLeague && p.espnId) {
          const res = await fetch(`http://localhost:8002/espn-player-stats?league=${p.espnLeague}&id=${p.espnId}`);
          const data = await res.json();
          const stats = parseESPN(data);
          if (stats) cache[p.id] = stats;
        } else if (p.sport === '야구' && p.mlbId) {
          const res = await fetch(`http://localhost:8002/mlb-stats?id=${p.mlbId}`);
          const data = await res.json();
          const stats = parseMLB(data);
          if (stats) cache[p.id] = stats;
        }
      } catch(e) {}
    })).then(() => setPlayerStatsCache({...cache}));
  }, []);

  // Dynamic device dimensions based on viewport
  const [deviceDimensions, setDeviceDimensions] = React.useState(() => {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Use viewport width, capped at 430px max for larger screens
    const width = Math.min(vw, 430);
    // Maintain 16:9-ish aspect ratio, or use full viewport height
    const height = Math.min(vh, width * 2.17);

    return { width, height };
  });

  React.useEffect(() => {
    const handleResize = () => {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const width = Math.min(vw, 430);
      const height = Math.min(vh, width * 2.17);
      setDeviceDimensions({ width, height });
    };

    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  // Fetch live matches from ESPN API and update player stats
  React.useEffect(() => {
    const fetchLiveMatches = async () => {
      setApiLoading(true);
      try {
        const allMatches = [];

        // Build ±7 day date range string for ESPN API (YYYYMMDD-YYYYMMDD)
        const pad = n => String(n).padStart(2, '0');
        const fmtDate = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
        const today = new Date();
        const from = new Date(today); from.setDate(today.getDate() - 7);
        const to   = new Date(today); to.setDate(today.getDate() + 7);
        const dateRange = `${fmtDate(from)}-${fmtDate(to)}`;

        // Fetch soccer leagues with date range
        for (const [league, url] of Object.entries(ESPN_API.soccer)) {
          try {
            const res = await fetch(`${url}?dates=${dateRange}&limit=100`);
            const data = await res.json();
            if (data.events) {
              const matches = data.events.map(e => transformESPNEvent(e, 'soccer', league));
              allMatches.push(...matches);
            }
          } catch (err) {
            console.error(`❌ Failed to fetch ${league}:`, err);
          }
        }

        // Fetch MLB with date range
        const mlbRes = await fetch(`${ESPN_API.mlb}?dates=${dateRange}&limit=200`);
        const mlbData = await mlbRes.json();
        if (mlbData.events) {
          const matches = mlbData.events.map(e => transformESPNEvent(e, 'mlb'));
          allMatches.push(...matches);
        }

        // Filter for Korean players
        const koreanMatches = allMatches.filter(m => m.koreanPlayer);

        // Fetch ESPN summary for finished Korean soccer matches to get real player stats
        const LEAGUE_PATHS = { mls:'usa.1', epl:'eng.1', ger:'ger.1', fra:'fra.1', ita:'ita.1', sco:'sco.1', tur:'tur.1', den:'den.1', ned:'ned.1', bel:'bel.1' };
        const FINAL_ST = ['STATUS_FINAL','STATUS_FULL_TIME','STATUS_END_PERIOD','STATUS_FINAL_PEN','final'];
        const soccerFinished = koreanMatches.filter(m => m.leagueKey && LEAGUE_PATHS[m.leagueKey] && FINAL_ST.includes(m.status));

        const nameMatch = (espnName, nameEn) => {
          const a = espnName.toLowerCase().replace(/[-\s]/g,'');
          const b = nameEn.toLowerCase().replace(/[-\s]/g,'');
          return a.includes(b) || b.includes(a) || a === b;
        };

        if (soccerFinished.length > 0) {
          const summaries = await Promise.allSettled(
            soccerFinished.map(m =>
              fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${LEAGUE_PATHS[m.leagueKey]}/summary?event=${m.id}`)
                .then(r => r.json()).then(d => ({ id: m.id, data: d })).catch(() => null)
            )
          );

          summaries.forEach(result => {
            if (result.status !== 'fulfilled' || !result.value) return;
            const { id, data } = result.value;
            const idx = koreanMatches.findIndex(m => m.id === id);
            if (idx === -1) return;

            const m = koreanMatches[idx];
            const nameEn = m.koreanPlayer.nameEn;
            const keyEvents = data.keyEvents || [];

            let matchGoals = 0, matchAssists = 0, minutesIn = null, minutesOff = null, started = false;

            // Check starter status from rosters (ESPN uses roster.roster, not roster.entries)
            for (const roster of (data.rosters || [])) {
              for (const entry of (roster.roster || roster.entries || [])) {
                const n = entry.athlete?.displayName || '';
                if (nameMatch(n, nameEn)) { started = entry.starter === true; }
              }
            }

            // Parse key events
            for (const ke of keyEvents) {
              const type = ke.type?.type || '';
              const text = ke.text || '';
              const min = parseInt(ke.clock?.displayValue) || null;

              if (type.startsWith('goal')) {
                // Scorer: text after first period until next period or "with"
                const scorerMatch = text.match(/\.\s*([^(]+)\s*\(/);
                if (scorerMatch && nameMatch(scorerMatch[1].trim(), nameEn)) matchGoals++;
                // Assist: "Assisted by X"
                const assistMatch = text.match(/[Aa]ssisted by ([^.]+)/);
                if (assistMatch && nameMatch(assistMatch[1].trim(), nameEn)) matchAssists++;
              }

              if (type === 'substitution' && text.includes('replaces')) {
                const parts = text.split('replaces');
                const comesOn = (parts[0] || '').split('.').pop().trim();
                const goesOff = (parts[1] || '').trim().replace(/\.$/, '');
                if (nameMatch(goesOff, nameEn)) minutesOff = min;
                if (nameMatch(comesOn, nameEn)) minutesIn = min;
              }
            }

            const didPlay = started || minutesIn !== null || matchGoals > 0 || matchAssists > 0;
            let minutesPlayed = 0;
            if (started) minutesPlayed = minutesOff !== null ? minutesOff : 90;
            else if (minutesIn !== null) minutesPlayed = (minutesOff || 90) - minutesIn;

            const newEvent = !didPlay ? '미출전'
              : minutesPlayed >= 90 ? '풀타임'
              : minutesPlayed > 0 ? `${minutesPlayed}분 출전`
              : '출전 완료';

            const newEvents = [
              ...(m.events || []),
              ...Array.from({length: matchGoals}, () => ({ type:'goal', player: m.koreanPlayer.name })),
              ...Array.from({length: matchAssists}, () => ({ type:'assist', player: m.koreanPlayer.name })),
            ];

            koreanMatches[idx] = {
              ...m,
              events: newEvents,
              koreanPlayer: { ...m.koreanPlayer, event: newEvent, minutesPlayed, matchGoals, matchAssists },
            };
          });
        }

        setLiveMatches([...koreanMatches]);

        // Stabilize player metrics by aggregating per player:
        // - Counting stats use max (avoid dropping due to partial match payloads)
        // - Rating/AVG use the most recent match payload
        const playerMetrics = new Map();

        koreanMatches.forEach(match => {
          if (!match.koreanPlayer) return;

          const playerIndex = ALL_PLAYERS.findIndex(p =>
            p.nameEn === match.koreanPlayer.nameEn ||
            p.name === match.koreanPlayer.name
          );
          if (playerIndex === -1) return;

          const current = playerMetrics.get(playerIndex) || {
            goals: Number(ALL_PLAYERS[playerIndex].goals) || 0,
            assists: Number(ALL_PLAYERS[playerIndex].assists) || 0,
            hits: Number(ALL_PLAYERS[playerIndex].hits) || 0,
            homeRuns: Number(ALL_PLAYERS[playerIndex].homeRuns) || 0,
            rbi: Number(ALL_PLAYERS[playerIndex].rbi) || 0,
            rating: Number(ALL_PLAYERS[playerIndex].rating) || 0,
            avg: ALL_PLAYERS[playerIndex].avg,
            latestTs: 0,
          };

          const ts = match.fullDate ? new Date(match.fullDate).getTime() : 0;
          const kp = match.koreanPlayer;

          if (kp.goals !== undefined && kp.goals !== null) current.goals = Math.max(current.goals, Number(kp.goals) || 0);
          if (kp.assists !== undefined && kp.assists !== null) current.assists = Math.max(current.assists, Number(kp.assists) || 0);
          if (kp.hits !== undefined && kp.hits !== null) current.hits = Math.max(current.hits, Number(kp.hits) || 0);
          if (kp.homeRuns !== undefined && kp.homeRuns !== null) current.homeRuns = Math.max(current.homeRuns, Number(kp.homeRuns) || 0);
          if (kp.rbi !== undefined && kp.rbi !== null) current.rbi = Math.max(current.rbi, Number(kp.rbi) || 0);

          if (ts >= current.latestTs) {
            if (kp.rating !== undefined && kp.rating !== null && kp.rating !== '') {
              const parsedRating = parseFloat(kp.rating);
              if (!Number.isNaN(parsedRating)) current.rating = parsedRating;
            }
            if (kp.avg !== undefined && kp.avg !== null && kp.avg !== '') {
              current.avg = kp.avg;
            }
            current.latestTs = ts;
          }

          playerMetrics.set(playerIndex, current);
        });

        playerMetrics.forEach((metrics, playerIndex) => {
          ALL_PLAYERS[playerIndex].goals = metrics.goals;
          ALL_PLAYERS[playerIndex].assists = metrics.assists;
          ALL_PLAYERS[playerIndex].hits = metrics.hits;
          ALL_PLAYERS[playerIndex].homeRuns = metrics.homeRuns;
          ALL_PLAYERS[playerIndex].rbi = metrics.rbi;
          ALL_PLAYERS[playerIndex].rating = metrics.rating;
          if (metrics.avg !== undefined) ALL_PLAYERS[playerIndex].avg = metrics.avg;
        });

        console.log(`✅ ${new Date().toLocaleTimeString('ko-KR')} | 한국 선수 경기: ${koreanMatches.length}개`);
      } catch (error) {
        console.error('❌ Failed to fetch matches:', error);
      } finally {
        setApiLoading(false);
        setIsInitialLoad(false);
      }
    };

    fetchLiveMatches();
    // Refresh every 60 seconds for live matches, 5 minutes for upcoming
    const interval = setInterval(fetchLiveMatches, 60000);
    return () => clearInterval(interval);
  }, []);

  // Generate notifications from match data
  React.useEffect(() => {
    const newNotifs = [];
    const now = new Date();

    liveMatches.forEach(match => {
      if (!match.koreanPlayer) return;

      const matchTime = match.fullDate ? new Date(match.fullDate) : null;
      const timeDiff = matchTime ? now - matchTime : 0;

      // Calculate time ago
      const getTimeAgo = (ms) => {
        const minutes = Math.floor(ms / 60000);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        if (minutes < 1) return '방금';
        if (minutes < 60) return `${minutes}분 전`;
        if (hours < 24) return `${hours}시간 전`;
        return `${days}일 전`;
      };

      // 1. Lineup confirmed (1 hour before match)
      if (matchTime && !match.live && timeDiff < 0 && timeDiff > -3600000) {
        if (match.koreanPlayer.event === '선발 출전') {
          newNotifs.push({
            id: `lineup-${match.id}`,
            time: getTimeAgo(-timeDiff),
            icon: '📋',
            title: `${match.koreanPlayer.name} 선발 출전 확정`,
            body: `${match.home.name} vs ${match.away.name} · ${match.krTime || match.time}`,
            type: 'lineup',
            live: false,
            timestamp: matchTime.getTime() - 3600000
          });
        }
      }

      // 2. Live match events
      if (match.live && match.events) {
        match.events.forEach(ev => {
          const koreanPlayerName = match.koreanPlayer.name;

          // Goals
          if (ev.type === 'goal' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            newNotifs.push({
              id: `goal-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '⚽',
              title: `${koreanPlayerName} 골!`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: 'goal',
              live: true,
              timestamp: now.getTime()
            });
          }

          // Assists
          if (ev.type === 'assist' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            newNotifs.push({
              id: `assist-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '🅰️',
              title: `${koreanPlayerName} 어시스트`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: 'assist',
              live: true,
              timestamp: now.getTime()
            });
          }

          // Yellow card
          if (ev.type === 'yellow' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            newNotifs.push({
              id: `yellow-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '🟨',
              title: `${koreanPlayerName} 경고`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: 'yellow',
              live: true,
              timestamp: now.getTime()
            });
          }

          // Red card
          if (ev.type === 'red' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            newNotifs.push({
              id: `red-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '🟥',
              title: `${koreanPlayerName} 퇴장`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: 'red',
              live: true,
              timestamp: now.getTime()
            });
          }

          // Substitution
          if (ev.type === 'substitution' && (ev.text?.includes(koreanPlayerName) || ev.detail?.includes(koreanPlayerName))) {
            const isSubIn = ev.text?.includes('교체 투입') || ev.detail?.includes('투입');
            newNotifs.push({
              id: `sub-${match.id}-${ev.min}`,
              time: getTimeAgo(timeDiff),
              icon: '🔄',
              title: `${koreanPlayerName} ${isSubIn ? '교체 출전' : '교체 아웃'}`,
              body: `${match.home.name} ${match.home.score}–${match.away.score} ${match.away.name} · ${ev.min}'`,
              type: isSubIn ? 'sub_in' : 'sub_out',
              live: true,
              timestamp: now.getTime()
            });
          }
        });
      }
    });

    // Sort by timestamp (most recent first) and remove duplicates
    const uniqueNotifs = Array.from(new Map(newNotifs.map(n => [n.id, n])).values())
      .sort((a, b) => b.timestamp - a.timestamp)
      .slice(0, 50); // Keep last 50 notifications

    setNotifications(uniqueNotifs);
  }, [liveMatches]);

  const transformESPNEvent = (event, sport, league = '') => {
    const comp = event.competitions[0];
    const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
    const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];
    const status = event.status.type.name;
    // Check multiple live status codes
    const isLive = status === 'STATUS_IN_PROGRESS' ||
                   status === 'STATUS_FIRST_HALF' ||
                   status === 'STATUS_SECOND_HALF' ||
                   status === 'STATUS_HALFTIME' ||
                   status === 'STATUS_EXTRA_TIME' ||
                   status === 'STATUS_OVERTIME';

    // Check for Korean players
    let koreanPlayer = null;
    let lineupConfirmed = false;
    let events = [];
    const homeTeam = home.team.displayName;
    const awayTeam = away.team.displayName;
    const homeAbbr = home.team.abbreviation;
    const awayAbbr = away.team.abbreviation;

    // Try multiple variations to match Korean players
    const homeVariations = [homeTeam, homeAbbr, home.team.name, home.team.shortDisplayName].filter(Boolean);
    const awayVariations = [awayTeam, awayAbbr, away.team.name, away.team.shortDisplayName].filter(Boolean);


    for (const variation of homeVariations) {
      if (KOREAN_PLAYERS[variation]) {
        koreanPlayer = { ...KOREAN_PLAYERS[variation], team: homeAbbr };
        break;
      }
    }

    if (!koreanPlayer) {
      for (const variation of awayVariations) {
        if (KOREAN_PLAYERS[variation]) {
          koreanPlayer = { ...KOREAN_PLAYERS[variation], team: awayAbbr };
          break;
        }
      }
    }

    // Check lineup confirmation only 1 hour before match start
    const matchDate = new Date(event.date);
    const now = new Date();
    const oneHourBeforeMatch = new Date(matchDate.getTime() - 60 * 60 * 1000);

    // Only check lineup if within 1 hour of match start or match has started
    if (now >= oneHourBeforeMatch || isLive) {
      if (comp.situation?.lastPlay || comp.details || home.linescores) {
        lineupConfirmed = true;
      }
    }

    // Extract events (goals, cards, etc.) from the match
    if (comp.details) {
      const details = comp.details;
      if (details.redCards) {
        details.redCards.forEach(card => {
          events.push({ type: 'red', player: card.athlete?.displayName, min: card.clock?.displayValue, team: card.team?.abbreviation });
        });
      }
      if (details.yellowCards) {
        details.yellowCards.forEach(card => {
          events.push({ type: 'yellow', player: card.athlete?.displayName, min: card.clock?.displayValue, team: card.team?.abbreviation });
        });
      }
    }

    // Check for Korean player in match events (goals, assists)
    if (koreanPlayer && comp.situation?.lastPlay) {
      const lastPlay = comp.situation.lastPlay;
      if (lastPlay.text && lastPlay.text.includes(koreanPlayer.name)) {
        if (lastPlay.scoringPlay) {
          events.push({ type: 'goal', player: koreanPlayer.name, min: lastPlay.clock?.displayValue, team: koreanPlayer.team });
        }
      }
    }

    // Format time for Korean timezone
    let timeDisplay = '';
    if (!isLive && event.date) {
      const date = new Date(event.date);
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(11, 59, 59, 999);

      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');

      // Check if it's today or tomorrow morning
      timeDisplay = `${hours}:${minutes}`;
    } else if (isLive) {
      timeDisplay = 'LIVE';
    }

    // Determine Korean player event status and extract stats
    let playerEventText = '출전 예상';
    let playerStats = { goals: undefined, assists: undefined, rating: undefined, minutesPlayed: undefined };

    if (koreanPlayer) {
      // Try to find Korean player in rosters/statistics
      const homeRoster = home.athletes || home.roster || [];
      const awayRoster = away.athletes || away.roster || [];
      const allAthletes = [...homeRoster, ...awayRoster];

      const koreanAthlete = allAthletes.find(athlete => {
        const name = athlete.athlete?.displayName || athlete.displayName || '';
        return name.includes(koreanPlayer.name) || koreanPlayer.name.includes(name.split(' ').pop());
      });

      let didPlay = false;

      if (koreanAthlete) {
        const athleteStats = koreanAthlete.statistics || koreanAthlete.stats || [];

        // For soccer: Extract season stats from athlete.statistics
        if (sport === 'soccer') {
          const goals = athleteStats.find(s =>
            s.name === 'goals' ||
            s.abbreviation === 'G' ||
            s.displayName === 'Goals'
          );
          if (goals) playerStats.goals = parseInt(goals.displayValue || goals.value) || 0;

          const assists = athleteStats.find(s =>
            s.name === 'assists' ||
            s.abbreviation === 'A' ||
            s.displayName === 'Assists'
          );
          if (assists) playerStats.assists = parseInt(assists.displayValue || assists.value) || 0;

          const rating = athleteStats.find(s =>
            s.name === 'rating' ||
            s.name === 'playerRating' ||
            s.displayName === 'Rating'
          );
          if (rating) playerStats.rating = parseFloat(rating.displayValue || rating.value).toFixed(1);

          const minutes = athleteStats.find(s =>
            s.name === 'minutesPlayed' ||
            s.abbreviation === 'MIN' ||
            s.displayName === 'Minutes Played'
          );
          if (minutes) {
            playerStats.minutesPlayed = parseInt(minutes.displayValue || minutes.value) || 0;
            didPlay = playerStats.minutesPlayed > 0;
          }
        }

        // For MLB: Extract batting stats — presence of at-bat stats means player batted
        if (sport === 'mlb') {
          const atBats = athleteStats.find(s => s.abbreviation === 'AB' || s.name === 'atBats');
          const hits = athleteStats.find(s => s.abbreviation === 'H' || s.name === 'hits');
          if (hits !== undefined) {
            playerStats.hits = parseInt(hits?.displayValue || hits?.value) || 0;
            didPlay = true;
          }
          if (atBats !== undefined) didPlay = true;

          const avg = athleteStats.find(s => s.abbreviation === 'AVG' || s.name === 'avg');
          if (avg) playerStats.avg = parseFloat(avg.displayValue || avg.value).toFixed(3);

          const hr = athleteStats.find(s => s.abbreviation === 'HR' || s.name === 'homeRuns');
          if (hr) playerStats.homeRuns = parseInt(hr.displayValue || hr.value) || 0;

          const rbi = athleteStats.find(s => s.abbreviation === 'RBI' || s.name === 'RBIs');
          if (rbi) playerStats.rbi = parseInt(rbi.displayValue || rbi.value) || 0;
        }
      }

      // Set event text
      const isFinished = status === 'STATUS_FINAL' || status === 'STATUS_FULL_TIME' || status === 'STATUS_END_PERIOD' || status === 'STATUS_FINAL_PEN';
      if (isLive) {
        playerEventText = '출전 중';
      } else if (isFinished) {
        if (!koreanAthlete || !didPlay) {
          playerEventText = '미출전';
        } else if (playerStats.minutesPlayed > 0) {
          playerEventText = `${playerStats.minutesPlayed}분 출전`;
        } else {
          playerEventText = '출전 완료';
        }
        // 이벤트(골/도움)가 있으면 실제 출전 — '미출전' 덮어쓰기
        if (koreanPlayer) {
          const hasEvent = events.some(e => e.player === koreanPlayer.name);
          if (hasEvent && playerEventText === '미출전') {
            playerEventText = '출전 완료';
          }
        }
      } else if (lineupConfirmed) {
        playerEventText = '선발 출전';
      } else {
        playerEventText = '출전 예상';
      }
    }

    // Get current minute for live matches
    let minute = '';
    if (isLive && event.status?.displayClock) {
      minute = event.status.displayClock;
    }

    // Extract team logos from ESPN API
    const homeLogo = home.team?.logo || home.team?.logos?.[0]?.href || null;
    const awayLogo = away.team?.logo || away.team?.logos?.[0]?.href || null;

    return {
      id: event.id,
      live: isLive,
      minute,
      sport: sport === 'mlb' ? '⚾ MLB' : `⚽ ${league.toUpperCase()}`,
      leagueKey: league,
      home: { name: homeTeam, code: home.team.abbreviation, score: parseInt(home.score) || 0, logo: homeLogo },
      away: { name: awayTeam, code: away.team.abbreviation, score: parseInt(away.score) || 0, logo: awayLogo },
      koreanPlayer: koreanPlayer ? { ...koreanPlayer, event: playerEventText, ...playerStats } : null,
      competition: event.competitions[0].league?.name || '',
      competitionLogo: event.competitions[0].league?.logos?.[0]?.href || null,
      venue: event.competitions[0].venue?.fullName || '',
      time: timeDisplay,
      fullDate: event.date,
      krTime: formatKRTime(event.date),
      lineupConfirmed,
      events,
      stats: null,
      status: status,
    };
  };

  React.useEffect(() => {
    document.documentElement.classList.toggle('light-mode', !darkMode);
  }, [darkMode]);
  const [showTweaks, setShowTweaks] = React.useState(false);

  const updateTweaks = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    localStorage.setItem('jumo_tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  React.useEffect(() => {
    window.__jumoSetTweaks = setShowTweaks;
  }, [setShowTweaks]);

  const goMatch = (m) => { setSelectedMatch(m); setScreen('match'); };
  const goPlayer = (p) => { setSelectedPlayer(p); setScreen('player'); };
  const goAddPlayer = () => setScreen('addplayer');
  const goNotif = () => setScreen('notif');
  const goBack = () => setScreen('main');

  const handleTab = (t) => { setTab(t); setScreen('main'); localStorage.setItem('jumo_tab', t); };

  const HomeComponent = [HomeV1, HomeV2, HomeV3][tweaks.homeVariant] || HomeV1;

  const homeVariantNames = ['카드 스택', '에디토리얼', '컴팩트'];

  return (
    <div style={{ '--acc': tweaks.accentColor, fontFamily:"'Noto Sans KR', system-ui, sans-serif", WebkitFontSmoothing:'antialiased' }}>
      <IOSDevice dark={darkMode} width={deviceDimensions.width} height={deviceDimensions.height}>
        <div style={{ display:'flex', flexDirection:'column', height:'100%', background:'var(--bg)', paddingBottom:'70px' }}>
          {screen === 'main' && (
            <>
              {tab === 'home' && <HomeComponent onMatch={goMatch} onPlayer={goPlayer} onNotif={goNotif} tweaks={tweaks} liveApiMatches={liveMatches} isLoading={isInitialLoad && apiLoading}/>}
              {tab === 'schedule' && <ScheduleScreen onMatch={goMatch} liveApiMatches={liveMatches} isLoading={apiLoading}/>}
              {tab === 'players' && <PlayersScreen onPlayer={goPlayer} onAdd={goAddPlayer} followed={followed} statsCache={playerStatsCache}/>}
              {tab === 'news' && <NewsScreen sportFeeds={sportFeeds}/>}
              {tab === 'more' && <MoreScreen darkMode={darkMode} onToggleDark={toggleDark} sportFeeds={sportFeeds} onToggleSportFeed={toggleSportFeed}/>}
            </>
          )}
          {screen === 'match' && selectedMatch && (
            <LiveDetailScreen match={selectedMatch} onBack={goBack}/>
          )}
          {screen === 'player' && selectedPlayer && (
            <PlayerScreen player={selectedPlayer} onBack={goBack} onMatch={goMatch} liveApiMatches={liveMatches} statsCache={playerStatsCache}/>
          )}
          {screen === 'addplayer' && (
            <AddPlayerScreen followed={followed} onToggle={toggleFollow} onBack={goBack}/>
          )}
          {screen === 'notif' && (
            <div style={{ flex:1, overflow:'auto', background:'var(--bg)' }} className="scrollbar-hide">
              <div style={{ padding:'12px 20px 8px', display:'flex', alignItems:'center', gap:10 }}>
                <button onClick={goBack} style={{ ...LG.base, ...LG.circle, color:'rgba(255,255,255,0.85)' }}>
                  <svg width="10" height="17" viewBox="0 0 10 17" fill="none"><path d="M8.5 1.5L1.5 8.5l7 7" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
                <div style={{ fontSize:22, fontWeight:700, color:'var(--text)', letterSpacing:-0.5 }}>알림</div>
              </div>
              <NotifScreen notifications={notifications}/>
            </div>
          )}
          <TabBar active={tab} onTab={handleTab}/>
        </div>
      </IOSDevice>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{ position:'fixed', bottom:24, right:24, background:'var(--card)', border:'0.5px solid var(--btn-bg)', borderRadius:20, padding:'20px', width:260, boxShadow:'0 20px 60px rgba(0,0,0,0.6)', zIndex:9999, animation:'slideUp 0.2s ease' }}>
          <div style={{ fontSize:13, fontWeight:700, color:'var(--text2)', letterSpacing:1.5, textTransform:'uppercase', marginBottom:16 }}>Tweaks</div>

          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, color:'var(--text3)', marginBottom:8, fontWeight:600 }}>홈 스타일</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {homeVariantNames.map((name, i) => (
                <button key={i} onClick={() => updateTweaks('homeVariant', i)} style={{ background: tweaks.homeVariant===i ? 'var(--acc)' : 'var(--border)', border:'none', borderRadius:10, padding:'10px 14px', color: tweaks.homeVariant===i ? '#000' : 'var(--text-60)', fontSize:13, fontWeight:600, cursor:'pointer', textAlign:'left' }}>
                  {i===0 ? '1️⃣' : i===1 ? '2️⃣' : '3️⃣'} {name}
                </button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, color:'var(--text3)', marginBottom:8, fontWeight:600 }}>강조 색상</div>
            <div style={{ display:'flex', gap:8 }}>
              {['#e03030','#0071e3','#2cc96b','#f5a623','#9b59b6'].map(c => (
                <button key={c} onClick={() => updateTweaks('accentColor', c)} style={{ width:32, height:32, borderRadius:'50%', background:c, border: tweaks.accentColor===c ? '2.5px solid #fff' : '2.5px solid transparent', cursor:'pointer' }}/>
              ))}
            </div>
          </div>

          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
            <span style={{ fontSize:13, color:'var(--text-60)', fontWeight:600 }}>선수 사진 플레이스홀더</span>
            <button onClick={() => updateTweaks('showPlayerPhoto', !tweaks.showPlayerPhoto)} style={{ width:40, height:24, borderRadius:12, background: tweaks.showPlayerPhoto ? 'var(--acc)' : 'var(--text6)', border:'none', cursor:'pointer', position:'relative', transition:'background 0.2s' }}>
              <div style={{ position:'absolute', top:2, left: tweaks.showPlayerPhoto ? 18 : 2, width:20, height:20, borderRadius:'50%', background:'#fff', transition:'left 0.2s' }}/>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="color:red;padding:20px;font-family:monospace;font-size:12px;white-space:pre-wrap">렌더링 에러:\n' + e.message + '\n\n' + e.stack + '</div>';
}
</script>
<div id="root"></div>
</body>
</html>
