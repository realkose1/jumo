// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('jumo_tweaks')||'{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [tab, setTab] = React.useState('home');
  const [nativeTabBar, setNativeTabBar] = React.useState(false); // native iOS glass tab bar present → hide CSS one
  const [screen, setScreen] = React.useState('main');
  const [selectedMatch, setSelectedMatch] = React.useState(null);
  const [selectedPlayer, setSelectedPlayer] = React.useState(null);
  // More-tab sub-view (알림설정/종목별피드/프로필/피드백) lifted to App so the
  // native glass back overlay can drive it like other 2-depth detail screens.
  const [moreSub, setMoreSub] = React.useState(null);
  // Device ID for cross-refresh persistence
  const deviceId = React.useMemo(() => {
    let id = localStorage.getItem('jumo_device_id');
    if (!id) {
      id = (crypto.randomUUID ? crypto.randomUUID() : 'dev-' + Math.random().toString(36).slice(2) + Date.now().toString(36));
      localStorage.setItem('jumo_device_id', id);
    }
    return id;
  }, []);

  const [followed, setFollowed] = React.useState(() => {
    try {
      const v = localStorage.getItem('jumo_followed');
      if (v) return new Set(JSON.parse(v));
    } catch {}
    return new Set([1,2,3,6,7,8,9,17,18,15]);
  });

  // ── App push notifications (APNs via @capacitor/push-notifications) ──────
  // Register once for remote push and persist the device's APNs token + which
  // players it follows to Supabase. A backend cron (api/push-cron) reads this
  // table to deliver match/goal/result pushes even when the app is closed.
  const [pushToken, setPushToken] = React.useState(null);
  React.useEffect(() => {
    const Cap = window.Capacitor;
    const Push = Cap?.Plugins?.PushNotifications;
    if (!Cap?.isNativePlatform?.() || !Push) return; // real device only
    const handles = [];
    (async () => {
      try {
        let perm = await Push.checkPermissions();
        if (perm.receive !== 'granted' && perm.receive !== 'denied') perm = await Push.requestPermissions();
        if (perm.receive !== 'granted') return;
        handles.push(await Push.addListener('registration', t => setPushToken(t?.value || null)));
        handles.push(await Push.addListener('registrationError', e => console.warn('push reg error', e?.error || e)));
        handles.push(await Push.addListener('pushNotificationActionPerformed', a => {
          const d = a?.notification?.data || {};
          try { window.__jumoPushTap && window.__jumoPushTap(d); } catch {}
        }));
        await Push.register();
      } catch (e) { console.warn('push init failed', e); }
    })();
    return () => { handles.forEach(h => { try { h.remove(); } catch {} }); };
  }, []);
  // Keep the token row in sync (token + followed players) for targeting.
  React.useEffect(() => {
    if (!pushToken) return;
    try {
      SB.from('device_tokens').upsert({
        device_id: deviceId, token: pushToken, platform: 'ios',
        player_ids: [...followed], updated_at: new Date().toISOString(),
      }, { onConflict: 'device_id' }).then(() => {}, () => {});
    } catch {}
  }, [pushToken, followed, deviceId]);

  // Hydrate from Supabase on mount (overrides localStorage if newer)
  React.useEffect(() => {
    let cancelled = false;
    SB.from('user_follows').select('player_ids').eq('device_id', deviceId).maybeSingle()
      .then(({ data }) => {
        if (cancelled || !data?.player_ids) return;
        const ids = Array.isArray(data.player_ids) ? data.player_ids : [];
        setFollowed(new Set(ids));
        localStorage.setItem('jumo_followed', JSON.stringify(ids));
      })
      .catch(() => {});
    return () => { cancelled = true; };
  }, [deviceId]);

  const toggleFollow = (id) => setFollowed(prev => {
    const n = new Set(prev);
    const wasFollowed = n.has(id);
    wasFollowed ? n.delete(id) : n.add(id);
    const ids = [...n];
    try { localStorage.setItem('jumo_followed', JSON.stringify(ids)); } catch {}
    SB.from('user_follows').upsert({ device_id: deviceId, player_ids: ids, updated_at: new Date().toISOString() }).then(() => {});
    const player = ALL_PLAYERS.find(p => p.id === id);
    const name = player?.name || '선수';
    showToast(wasFollowed ? `${name} 팔로우 해제` : `${name} 팔로우 추가`);
    return n;
  });
  const [toast, setToast] = React.useState(null);
  const toastTimerRef = React.useRef(null);
  const showToast = React.useCallback((message) => {
    setToast({ id: Date.now() + Math.random(), message });
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToast(null), 2000);
  }, []);

  const [sportFeeds, setSportFeeds] = React.useState(() => {
    try {
      return { soccer:true, baseball:true, ...JSON.parse(localStorage.getItem('jumo_sport_feeds') || '{}') };
    } catch {
      return { soccer:true, baseball:true };
    }
  });
  const SPORT_LABELS = { soccer:'축구', baseball:'야구', badminton:'배드민턴' };
  const toggleSportFeed = (id) => {
    setSportFeeds(prev => {
      const next = { ...prev, [id]: !prev[id] };
      localStorage.setItem('jumo_sport_feeds', JSON.stringify(next));
      showToast(`${SPORT_LABELS[id] || id} 피드 ${next[id] ? '켜짐' : '꺼짐'}`);
      return next;
    });
  };
  const [liveMatches, setLiveMatches] = React.useState([]);
  const [worldCupMatches, setWorldCupMatches] = React.useState([]);
  const [apiLoading, setApiLoading] = React.useState(true); // Start with true for initial load
  const [isInitialLoad, setIsInitialLoad] = React.useState(true);
  const [notifications, setNotifications] = React.useState([]);
  const [playerStatsCache, setPlayerStatsCache] = React.useState({});
  const [profile, setProfile] = React.useState(() => {
    try {
      return { nickname:'한국 스포츠 팬', image:null, ...JSON.parse(localStorage.getItem('jumo_profile') || '{}') };
    } catch {
      return { nickname:'한국 스포츠 팬', image:null };
    }
  });
  React.useEffect(() => {
    SB.from('profiles').select('nickname,image').eq('device_id', deviceId).maybeSingle()
      .then(({ data }) => {
        if (data) {
          const next = { nickname: data.nickname || '한국 스포츠 팬', image: data.image || null };
          setProfile(next);
          try { localStorage.setItem('jumo_profile', JSON.stringify(next)); } catch {}
        }
      });
  }, [deviceId]);
  const updateProfile = (next) => {
    setProfile(next);
    try { localStorage.setItem('jumo_profile', JSON.stringify(next)); } catch {}
    SB.from('profiles').upsert({
      device_id: deviceId,
      nickname: next.nickname,
      image: next.image,
      updated_at: new Date().toISOString(),
    }).then(({ error }) => {
      if (error) { console.warn('profile sync failed', error); showToast('저장 중 오류'); }
      else showToast('프로필이 저장되었습니다');
    });
  };

  React.useEffect(() => {
    const parseESPN = (data) => {
      const cats = data?.splits?.categories || [];
      if (!cats.length) return null;
      const allStats = cats.flatMap(c => c.stats || []);
      const get = (...names) => { for (const n of names) { const s = allStats.find(s => s.name === n); if (s) return parseFloat(s.value)||0; } return 0; };
      return { goals: get('totalGoals'), assists: get('goalAssists'), matches: get('appearances'), shotsTotal: get('totalShots'), shotsOn: get('shotsOnTarget'), keyPasses: get('shotAssists'), tackles: get('totalTackles'), interceptions: get('interceptions'), yellowCards: get('yellowCards'), redCards: get('redCards'), minutes: get('minutes'), starts: get('starts') };
    };
    const parseMLB = (data) => {
      const stat = data?.stats?.[0]?.splits?.[0]?.stat;
      if (!stat) return null;
      return { matches: stat.gamesPlayed, hits: stat.hits, homeRuns: stat.homeRuns, rbi: stat.rbi, avg: stat.avg, obp: stat.obp, ops: stat.ops };
    };
    const cache = {};
    Promise.all(ALL_PLAYERS.map(async p => {
      try {
        if (p.sport === '축구' && p.espnLeague && p.espnId) {
          const res = await fetch(`${API_BASE}/api/espn-player-stats?league=${p.espnLeague}&id=${p.espnId}`);
          const data = await res.json();
          const stats = parseESPN(data);
          if (stats) cache[p.id] = stats;
        } else if (p.sport === '야구' && p.mlbId) {
          const res = await fetch(`${API_BASE}/api/mlb-stats?id=${p.mlbId}`);
          const data = await res.json();
          const stats = parseMLB(data);
          if (stats) cache[p.id] = stats;
        }
      } catch(e) {}
    })).then(() => setPlayerStatsCache({...cache}));
  }, []);

  // Dynamic device dimensions based on viewport
  const getSafeAreaInsets = () => {
    const style = getComputedStyle(document.documentElement);
    const top = parseFloat(style.getPropertyValue('padding-top')) || 0;
    const bottom = parseFloat(style.getPropertyValue('padding-bottom')) || 0;
    return { top, bottom };
  };

  const [deviceDimensions, setDeviceDimensions] = React.useState(() => {
    const vw = window.innerWidth;
    const insets = getSafeAreaInsets();
    const vh = window.innerHeight - insets.top - insets.bottom;
    const width = Math.min(vw, 430);
    const height = Math.min(vh, width * 2.17);
    return { width, height };
  });

  React.useEffect(() => {
    const handleResize = () => {
      const vw = window.innerWidth;
      const insets = getSafeAreaInsets();
      const vh = window.innerHeight - insets.top - insets.bottom;
      const width = Math.min(vw, 430);
      const height = Math.min(vh, width * 2.17);
      setDeviceDimensions({ width, height });
    };

    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  // Per-fixture details cache (lineups + events + players).
  // FINISHED matches: cached indefinitely (data never changes).
  // LIVE matches: cached 20s (fresh-ish).
  // UPCOMING matches in lineup window: cached 30s.
  // Keyed by fixture id. Persists across polling cycles within a session.
  const afDetailsCacheRef = React.useRef({});

  // Fetch live matches from ESPN API and update player stats
  const fetchLiveMatches = React.useCallback(async () => {
      setApiLoading(true);
      // Safety: even if a network call hangs indefinitely, never lock the UI.
      const safetyTimer = setTimeout(() => {
        console.warn('⏱️ fetchLiveMatches safety timeout — clearing loading state');
        setApiLoading(false);
        setIsInitialLoad(false);
      }, 8000);
      try {
        const allMatches = [];

        const pad = n => String(n).padStart(2, '0');
        const today = new Date();

        // ── API-Football: fixtures by date, cache-first via Supabase ────────
        // Range covers the schedule-tab date strip (±7 days). Tiered TTL keeps
        // calls within the Pro 7,500/day budget — today refreshes often,
        // far-future dates rarely change.
        const AF_BASE = `${API_BASE}/api/apifootball`;
        const dateOffsets = [-2,-1,0,1,2,3,4,5,6,7];
        const afDates = dateOffsets.map(offset => {
          const d = new Date(today); d.setDate(today.getDate() + offset);
          return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        });
        const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
        const ttlForDate = (dateStr) => {
          if (dateStr === todayStr) return 2 * 60 * 1000; // 오늘: 2분
          const dt = new Date(dateStr).getTime();
          const diff = Math.abs(dt - today.getTime()) / (24 * 3600 * 1000);
          if (diff <= 1.5) return 10 * 60 * 1000;   // ±1일: 10분
          return 30 * 60 * 1000;                     // 그 외: 30분
        };

        // Load cached rows from Supabase (sf_cache table is reused for API-Football fixtures)
        let cachedRows = [];
        try {
          const result = await SB.from('sf_cache').select('date,events,updated_at').in('date', afDates);
          cachedRows = result?.data || [];
        } catch (e) {
          console.warn('Supabase sf_cache unavailable, falling back to direct fetch:', e?.message || e);
        }
        const cacheMap = {};
        cachedRows.forEach(row => { cacheMap[row.date] = row; });

        await Promise.all(afDates.map(async date => {
          const cached = cacheMap[date];
          const ttlMs = ttlForDate(date);
          const cachedHasFixtures = Array.isArray(cached?.events) && cached.events.length > 0;
          const isFresh = cachedHasFixtures && (Date.now() - new Date(cached.updated_at).getTime()) < ttlMs;

          let fixtures = isFresh ? cached.events : null;

          if (!fixtures) {
            const data = await fetch(`${AF_BASE}?path=fixtures&date=${date}`)
              .then(r => r.ok ? r.json() : null).catch(() => null);
            const fetched = data?.response;
            if (Array.isArray(fetched) && fetched.length > 0) {
              fixtures = fetched;
              SB.from('sf_cache').upsert({ date, events: fixtures, updated_at: new Date().toISOString() }).then(() => {});
            } else {
              fixtures = cached?.events || [];
              if (fixtures.length === 0) {
                console.warn(`API-Football fetch failed for ${date} and no cached fallback`);
              }
            }
          }

          fixtures.forEach(fx => {
            const m = transformApiFootballFixture(fx);
            if (m) allMatches.push(m);
          });
        }));

        // ── ESPN: MLB only ─────────────────────────────────────────────────
        const espnFmt = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
        const from = new Date(today); from.setDate(today.getDate() - 7);
        const to   = new Date(today); to.setDate(today.getDate() + 7);
        const mlbRes = await fetch(`${ESPN_API.mlb}?dates=${espnFmt(from)}-${espnFmt(to)}&limit=200`);
        const mlbData = await mlbRes.json();
        if (mlbData.events) {
          const matches = mlbData.events.map(e => transformESPNEvent(e, 'mlb'));
          allMatches.push(...matches);
        }

        // ── ESPN: UEFA club competitions (Champions/Europa/Conference) ──────
        // Keyless fallback so Korean players' European nights (e.g. the Champions
        // League final) always appear, even when the API-Football proxy is down.
        // Only Korean-player matches are kept; if API-Football also has the same
        // game it wins later (it carries lineup data), so no duplicates.
        try {
          const uefaUrls = [ESPN_API.soccer.ucl, ESPN_API.soccer.uel, ESPN_API.soccer.uecl];
          const uefaResults = await Promise.allSettled(
            uefaUrls.map(u => fetch(`${u}?dates=${espnFmt(from)}-${espnFmt(to)}&limit=200`).then(r => r.ok ? r.json() : null))
          );
          uefaResults.forEach(r => {
            if (r.status !== 'fulfilled' || !r.value?.events) return;
            r.value.events.forEach(e => {
              const leagueName = e.competitions?.[0]?.league?.name || 'UEFA';
              const m = transformESPNEvent(e, 'soccer', leagueName);
              if (m.koreanPlayer) { m.source = 'espn'; allMatches.push(m); }
            });
          });
        } catch (e) { console.warn('ESPN UEFA fetch failed:', e?.message || e); }

        // Deduplicate by id (same match can appear in multiple Sofascore date responses)
        const seenIds = new Set();
        const uniqueMatches = allMatches.filter(m => {
          if (seenIds.has(m.id)) return false;
          seenIds.add(m.id);
          return true;
        });

        // For soccer: drop ESPN matches that Sofascore already covers (same teams + same date).
        // Sofascore has lineup data; ESPN scoreboard does not.
        const sfSoccerKeys = new Set(
          uniqueMatches
            .filter(m => m.source === 'sofascore')
            .map(m => {
              const d = m.fullDate ? new Date(m.fullDate).toDateString() : '';
              return `${m.home.name}|${m.away.name}|${d}`;
            })
        );
        // ESPN UEFA matches are a fallback: if API-Football already has the same
        // Korean player's game that day, prefer it (it carries lineup data).
        const afKoreanKeys = new Set(
          uniqueMatches
            .filter(m => m.source === 'apifootball' && m.koreanPlayer)
            .map(m => `${m.koreanPlayer.name}|${m.fullDate ? new Date(m.fullDate).toDateString() : ''}`)
        );
        const dedupedMatches = uniqueMatches.filter(m => {
          if (m.source === 'espn' && m.koreanPlayer) {
            const k = `${m.koreanPlayer.name}|${m.fullDate ? new Date(m.fullDate).toDateString() : ''}`;
            if (afKoreanKeys.has(k)) return false; // API-Football already covers it
            return true;
          }
          if (m.source === 'sofascore') return true;
          if ((m.sport || '').includes('MLB')) return true; // keep MLB from ESPN
          const d = m.fullDate ? new Date(m.fullDate).toDateString() : '';
          const key = `${m.home.name}|${m.away.name}|${d}`;
          return !sfSoccerKeys.has(key); // drop ESPN soccer if Sofascore covers it
        });

        // Filter for Korean players
        const koreanMatches = dedupedMatches.filter(m => m.koreanPlayer);

        // ── nameMatch helper ───────────────────────────────────────────────
        const nameMatch = (sfName, nameEn) => {
          const a = sfName.toLowerCase().replace(/[-\s]/g,'');
          const b = nameEn.toLowerCase().replace(/[-\s]/g,'');
          if (a.includes(b) || b.includes(a) || a === b) return true;
          // Sofascore may use Western name order (e.g. "Hee-chan Hwang" vs "Hwang Hee-chan")
          const words = nameEn.toLowerCase().split(/[\s-]+/).filter(Boolean);
          if (words.length >= 2) {
            const reversed = words.slice(1).join('') + words[0];
            return a.includes(reversed) || reversed.includes(a) || a === reversed;
          }
          return false;
        };

        // ── API-Football: fetch lineups + events for live/finished/imminent soccer ──
        // Window: -10min..+90min from kickoff, plus all live/finished.
        const afKorean = koreanMatches.filter(m => {
          if (m.source !== 'apifootball') return false;
          if (m.live || m.status === 'STATUS_FINAL') return true;
          if (!m.fullDate) return false;
          const tilStart = new Date(m.fullDate).getTime() - Date.now();
          return tilStart > -10 * 60 * 1000 && tilStart <= 90 * 60 * 1000;
        });

        if (afKorean.length > 0) {
          const detailsCache = afDetailsCacheRef.current;
          const afDetails = await Promise.allSettled(
            afKorean.map(async (m) => {
              const needPlayers = m.live || m.status === 'STATUS_FINAL';
              const isFinalMatch = m.status === 'STATUS_FINAL';
              const cached = detailsCache[m.id];
              // Cache TTL: finished match = forever, live = 20s, upcoming = 30s
              if (cached) {
                const age = Date.now() - cached.fetchedAt;
                const ttl = cached.status === 'STATUS_FINAL' ? Infinity : (cached.live ? 20000 : 30000);
                if (age < ttl) {
                  return { id: m.id, lineups: cached.lineups, events: cached.events, players: cached.players, isLive: m.live };
                }
              }
              const [lineups, events, players] = await Promise.all([
                fetch(`${AF_BASE}?path=fixtures/lineups&fixture=${m.id}`).then(r => r.ok ? r.json() : null).catch(() => null),
                fetch(`${AF_BASE}?path=fixtures/events&fixture=${m.id}`).then(r => r.ok ? r.json() : null).catch(() => null),
                needPlayers
                  ? fetch(`${AF_BASE}?path=fixtures/players&fixture=${m.id}`).then(r => r.ok ? r.json() : null).catch(() => null)
                  : Promise.resolve(null),
              ]);
              const detail = {
                lineups: lineups?.response || [],
                events: events?.response || [],
                players: players?.response || [],
                fetchedAt: Date.now(),
                status: m.status,
                live: m.live,
              };
              // Only cache successful (non-empty) responses; failed fetches shouldn't poison.
              if (detail.lineups.length > 0 || detail.events.length > 0 || isFinalMatch) {
                detailsCache[m.id] = detail;
              }
              return { id: m.id, lineups: detail.lineups, events: detail.events, players: detail.players, isLive: m.live };
            })
          );

          afDetails.forEach(result => {
            if (result.status !== 'fulfilled' || !result.value) return;
            const { id, lineups, events: incidents, players: playerStats, isLive } = result.value;
            const idx = koreanMatches.findIndex(m => m.id === id);
            if (idx === -1) return;

            const m = koreanMatches[idx];
            // Flatten startXI + substitutes from both teams into a single roster list,
            // tagging each with whether they were in the starting XI.
            const linePlayers = [];
            (lineups || []).forEach(team => {
              (team.startXI || []).forEach(e => linePlayers.push({ player: e.player, substitute: false }));
              (team.substitutes || []).forEach(e => linePlayers.push({ player: e.player, substitute: true }));
            });
            const allKoreans = m.koreanPlayers || [m.koreanPlayer];
            const isFinishedMatch = m.status === 'STATUS_FINAL';
            const isUpcoming = !isLive && !isFinishedMatch;
            // API-Football confirms by populating startXI; if startXI is empty
            // it means lineup hasn't been published yet.
            const lineupConfirmed = (lineups || []).some(t => (t.startXI || []).length > 0);

            const computeFor = (kp) => {
              const nameEn = kp.nameEn;
              let started = false, foundInRoster = false, sfRating = null;
              for (const entry of linePlayers) {
                const n = entry.player?.name || '';
                if (nameMatch(n, nameEn)) {
                  foundInRoster = true;
                  if (entry.substitute === false) started = true;
                }
              }
              // Pull rating from /fixtures/players (only fetched for live/finished).
              for (const team of (playerStats || [])) {
                for (const entry of (team.players || [])) {
                  if (nameMatch(entry.player?.name || '', nameEn)) {
                    const r = (entry.statistics || [{}])[0]?.games?.rating;
                    if (r != null) sfRating = parseFloat(r).toFixed(1);
                  }
                }
              }
              let minutesIn = null, minutesOff = null, matchGoals = 0, matchAssists = 0;
              for (const inc of (incidents || [])) {
                const min = inc.time?.elapsed;
                if (inc.type === 'subst') {
                  // API-Football: inc.player = the one coming OFF (sub OUT),
                  // inc.assist = the one coming ON (sub IN).
                  if (nameMatch(inc.player?.name || '', nameEn)) minutesOff = min;
                  if (nameMatch(inc.assist?.name || '', nameEn)) minutesIn = min;
                }
                if (inc.type === 'Goal' && inc.detail !== 'Missed Penalty') {
                  if (nameMatch(inc.player?.name || '', nameEn)) {
                    if (inc.detail === 'Own Goal') { /* skip — not their goal */ }
                    else matchGoals++;
                  }
                  if (inc.assist?.name && nameMatch(inc.assist.name, nameEn)) matchAssists++;
                }
              }
              const didPlay = started || minutesIn !== null || matchGoals > 0 || matchAssists > 0;
              let newEvent, minutesPlayed = 0;
              if (isUpcoming) {
                // Lineup announced for upcoming match
                if (lineupConfirmed) {
                  if (started) newEvent = '선발 출전';
                  else if (foundInRoster) newEvent = '벤치 대기';
                  else newEvent = '미출전';
                } else {
                  newEvent = '출전 예상';
                }
              } else if (isLive) {
                const lineupAvailable = linePlayers.length > 0;
                const onPitch = (started && minutesOff === null) || (minutesIn !== null && minutesOff === null);
                if (!foundInRoster && lineupAvailable) newEvent = '미출전';
                else if (!foundInRoster) newEvent = '출전 예상';
                else if (onPitch) newEvent = minutesIn !== null ? '교체 출전 중' : '출전 중';
                else if (started && minutesOff !== null) newEvent = '교체 아웃';
                else newEvent = '벤치';
              } else {
                if (started) minutesPlayed = minutesOff ?? 90;
                else if (minutesIn !== null) minutesPlayed = (minutesOff ?? 90) - minutesIn;
                newEvent = !didPlay ? '미출전'
                  : minutesPlayed >= 90 ? '풀타임'
                  : minutesPlayed > 0 ? `${minutesPlayed}분 출전`
                  : '출전 완료';
              }
              return { ...kp, event: newEvent, minutesPlayed, matchGoals, matchAssists, sfRating, lineupConfirmed };
            };

            const updatedKoreans = allKoreans.map(computeFor);
            const newEvents = [...(m.events || [])];
            updatedKoreans.forEach(kp => {
              for (let i = 0; i < kp.matchGoals; i++) newEvents.push({ type:'goal', player: kp.name });
              for (let i = 0; i < kp.matchAssists; i++) newEvents.push({ type:'assist', player: kp.name });
            });

            koreanMatches[idx] = {
              ...m,
              events: newEvents,
              koreanPlayer: updatedKoreans[0],
              koreanPlayers: updatedKoreans,
            };
          });
        }

        // ── MLB Stats API: fetch gameLog per Korean baseball player ──
        const mlbPlayers = ALL_PLAYERS.filter(p => p.sport === '야구' && p.mlbId);
        const mlbKorean = koreanMatches.filter(m => (m.sport || '').includes('MLB'));
        if (mlbKorean.length > 0 && mlbPlayers.length > 0) {
          const season = new Date().getFullYear();
          const logResults = await Promise.allSettled(
            mlbPlayers.map(p =>
              fetch(`https://statsapi.mlb.com/api/v1/people/${p.mlbId}/stats?stats=gameLog&season=${season}&group=hitting&sportId=1`)
                .then(r => r.ok ? r.json() : null)
                .then(data => ({ playerName: p.name, splits: data?.stats?.[0]?.splits || [] }))
                .catch(() => ({ playerName: p.name, splits: [] }))
            )
          );
          // Build map: 'playerName|YYYY-MM-DD' -> stat
          const statByKey = {};
          logResults.forEach(r => {
            if (r.status !== 'fulfilled') return;
            const { playerName, splits } = r.value;
            for (const s of splits) {
              const date = s.date; // e.g., '2026-05-04'
              if (!date) continue;
              statByKey[`${playerName}|${date}`] = s.stat || {};
            }
          });
          // Game might span midnight UTC vs local; try both date and the day before in case of TZ shift
          const ymd = (date) => `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
          const gameLogStat = (kp, fullDate) => {
            const d = new Date(fullDate);
            for (const c of [ymd(d), ymd(new Date(d.getTime() - 86400000))]) {
              if (statByKey[`${kp.name}|${c}`]) return statByKey[`${kp.name}|${c}`];
            }
            return null;
          };

          // The season gameLog lags 1-3 days behind, so it can't answer "is he in the
          // lineup right now / did he play in the latest game?". For those we read the
          // ESPN boxscore (live lineup + final stats) directly. Only fetch where the
          // gameLog can't answer, to keep the request count small.
          const needsBox = mlbKorean.filter(m =>
            m.koreanPlayer && (m.live || (m.status === 'STATUS_FINAL' && !gameLogStat(m.koreanPlayer, m.fullDate)))
          );
          const boxResults = await Promise.allSettled(
            needsBox.map(m =>
              fetch(`https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/summary?event=${m.id}`)
                .then(r => r.ok ? r.json() : null)
                .then(data => ({ id: m.id, players: data?.boxscore?.players || [] }))
                .catch(() => ({ id: m.id, players: [] }))
            )
          );
          const boxById = {};
          boxResults.forEach(r => { if (r.status === 'fulfilled') boxById[r.value.id] = r.value.players; });

          // Locate a Korean batter inside an ESPN boxscore by English name (same matching
          // as the lineup tab: handles "Hyeseong Kim" vs "Kim Hyeseong" ordering).
          const norm = s => (s||'').toLowerCase().replace(/[-\s.']/g,'');
          const findInBox = (players, nameEn) => {
            const variants = [norm(nameEn)];
            const parts = (nameEn||'').toLowerCase().split(/[\s-]+/).filter(Boolean);
            if (parts.length >= 2) {
              variants.push(norm(parts.slice(1).join('') + parts[0]));
              variants.push(norm([parts[parts.length-1], ...parts.slice(0,-1)].join('')));
            }
            const isMatch = n => { const x = norm(n); return x && variants.some(t => t && (x === t || x.includes(t) || t.includes(x))); };
            let lineupPosted = false;
            for (const t of (players || [])) {
              const bat = (t.statistics || []).find(s => s.type === 'batting');
              const aths = bat?.athletes || [];
              if (aths.length) lineupPosted = true;
              const keys = bat?.keys || [];
              const val = (a, k) => { const i = keys.indexOf(k); return i >= 0 ? (parseInt(a.stats?.[i]) || 0) : 0; };
              for (const a of aths) {
                if (isMatch(a.athlete?.displayName || '')) {
                  return {
                    found: true, lineupPosted, starter: !!a.starter,
                    atBats: val(a, 'atBats'), hits: val(a, 'hits'), homeRuns: val(a, 'homeRuns'),
                    rbi: val(a, 'RBIs'), runs: val(a, 'runs'), baseOnBalls: val(a, 'walks'),
                  };
                }
              }
            }
            return { found: false, lineupPosted };
          };

          // Apply to matches
          mlbKorean.forEach(m => {
            const idx = koreanMatches.findIndex(mm => mm.id === m.id);
            if (idx === -1) return;
            const cur = koreanMatches[idx];
            const kp = cur.koreanPlayer;
            if (!kp || !cur.fullDate) return;
            const isFinished = cur.status === 'STATUS_FINAL';
            const isLive = cur.live;
            const gl = gameLogStat(kp, cur.fullDate);
            const box = boxById[cur.id] ? findInBox(boxById[cur.id], kp.nameEn) : null;

            let newEvent, atBats = 0, hits = 0, homeRuns = 0, rbi = 0, runs = 0, stolenBases = 0, baseOnBalls = 0;
            const statLine = () => {
              const parts = [`${atBats}타수 ${hits}안타`];
              if (homeRuns) parts.push(`${homeRuns}홈런`);
              if (rbi) parts.push(`${rbi}타점`);
              if (stolenBases) parts.push(`${stolenBases}도루`);
              return parts.join(' ');
            };

            if (box && box.found) {
              // In the lineup — take live/final numbers straight from the boxscore.
              atBats = box.atBats; hits = box.hits; homeRuns = box.homeRuns;
              rbi = box.rbi; runs = box.runs; baseOnBalls = box.baseOnBalls;
              stolenBases = parseInt(gl?.stolenBases ?? 0) || 0; // SB absent from ESPN batting box
              const active = atBats > 0 || baseOnBalls > 0 || runs > 0;
              if (isFinished) {
                newEvent = (!active && !box.starter) ? '대기 명단' : statLine();
              } else {
                newEvent = box.starter ? '출전 중' : (active ? '교체 출전 중' : '벤치');
              }
            } else if (box && box.lineupPosted) {
              // Lineup is out and he is not in it → say WHY using the synced roster status.
              const k = ALL_PLAYERS.find(pl => pl.name === kp.name)?.injury?.kind;
              newEvent = isFinished ? '미출전'
                : k === 'minors' ? '마이너'
                : (k === 'il' || k === 'injured') ? '부상'
                : '벤치';
            } else if (gl) {
              // No boxscore needed/available — fall back to the season gameLog.
              atBats = parseInt(gl.atBats ?? 0) || 0; hits = parseInt(gl.hits ?? 0) || 0;
              homeRuns = parseInt(gl.homeRuns ?? 0) || 0; rbi = parseInt(gl.rbi ?? 0) || 0;
              runs = parseInt(gl.runs ?? 0) || 0; stolenBases = parseInt(gl.stolenBases ?? 0) || 0;
              baseOnBalls = parseInt(gl.baseOnBalls ?? 0) || 0;
              const didPlay = atBats > 0 || (parseInt(gl.plateAppearances ?? 0) || 0) > 0;
              if (isLive) newEvent = didPlay ? '출전 중' : '벤치';
              else if (isFinished) newEvent = !didPlay ? '대기 명단' : statLine();
              else newEvent = '출전 예상';
            } else {
              // Nothing resolved from boxscore/gameLog: use roster status; only a
              // not-yet-started game with an active player stays "예상".
              const k = ALL_PLAYERS.find(pl => pl.name === kp.name)?.injury?.kind;
              newEvent = isFinished ? '미출전'
                : k === 'minors' ? '마이너'
                : (k === 'il' || k === 'injured') ? '부상'
                : (isLive ? '벤치' : '출전 예상');
            }

            koreanMatches[idx] = {
              ...cur,
              koreanPlayer: { ...kp, event: newEvent, atBats, hits, homeRuns, rbi, runs, stolenBases, baseOnBalls },
              koreanPlayers: (cur.koreanPlayers || [kp]).map(p => p.name === kp.name ? { ...p, event: newEvent, atBats, hits, homeRuns, rbi, runs, stolenBases, baseOnBalls } : p),
            };
          });
        }

        setLiveMatches([...koreanMatches]);

        // Save manual baseline once (first run) so we can rebuild totals each refresh
        // by adding contributions from finished matches in the live cache.
        if (!ALL_PLAYERS[0]._baselineSnapshot) {
          ALL_PLAYERS.forEach(p => {
            p._baselineSnapshot = {
              goals: Number(p.goals) || 0,
              assists: Number(p.assists) || 0,
              matches: Number(p.matches) || 0,
              hits: Number(p.hits) || 0,
              homeRuns: Number(p.homeRuns) || 0,
              rbi: Number(p.rbi) || 0,
              rating: Number(p.rating) || 0,
              avg: p.avg,
            };
          });
        }

        // For each player: take baseline + add per-match deltas from finished matches
        const FINAL_STATUSES = ['STATUS_FINAL','STATUS_FULL_TIME','final','STATUS_END_PERIOD','STATUS_FINAL_PEN'];
        const seenMatchByPlayer = new Map(); // playerIdx -> Set of match IDs already counted
        ALL_PLAYERS.forEach((p, idx) => seenMatchByPlayer.set(idx, new Set()));

        // Reset to baseline first
        ALL_PLAYERS.forEach(p => {
          const b = p._baselineSnapshot;
          if (!b) return;
          p.goals = b.goals;
          p.assists = b.assists;
          p.matches = b.matches;
          p.hits = b.hits;
          p.homeRuns = b.homeRuns;
          p.rbi = b.rbi;
          p.rating = b.rating;
          p.avg = b.avg;
        });

        // Track latest rating/avg per player
        const latestPerPlayer = new Map(); // idx -> { ts, rating, avg }

        koreanMatches.forEach(match => {
          if (!FINAL_STATUSES.includes(match.status)) return;
          const allKp = match.koreanPlayers || [match.koreanPlayer];
          allKp.forEach(kp => {
            if (!kp) return;
            const idx = ALL_PLAYERS.findIndex(p => p.nameEn === kp.nameEn || p.name === kp.name);
            if (idx === -1) return;
            const seen = seenMatchByPlayer.get(idx);
            if (seen.has(match.id)) return;
            seen.add(match.id);
            const player = ALL_PLAYERS[idx];

            // Per-match contributions (additive)
            if (player.sport === '축구') {
              const mg = Number(kp.matchGoals) || 0;
              const ma = Number(kp.matchAssists) || 0;
              if (mg > 0) player.goals += mg;
              if (ma > 0) player.assists += ma;
              // Count appearance if event indicates play
              const ev = kp.event || '';
              const played = (kp.minutesPlayed || 0) > 0
                || ev === '풀타임' || ev === '교체 아웃' || ev.includes('분 출전')
                || mg > 0 || ma > 0;
              if (played) player.matches += 1;
            } else if (player.sport === '야구') {
              const h = Number(kp.hits) || 0;
              const hr = Number(kp.homeRuns) || 0;
              const rbi = Number(kp.rbi) || 0;
              if (h > 0) player.hits += h;
              if (hr > 0) player.homeRuns += hr;
              if (rbi > 0) player.rbi += rbi;
              const didPlay = (kp.atBats || 0) > 0 || h > 0;
              if (didPlay) player.matches += 1;
            }

            // Track latest rating/avg
            const ts = match.fullDate ? new Date(match.fullDate).getTime() : 0;
            const cur = latestPerPlayer.get(idx) || { ts: 0 };
            if (ts >= cur.ts) {
              const upd = { ts };
              if (kp.sfRating != null && kp.sfRating !== '') {
                const r = parseFloat(kp.sfRating);
                if (!Number.isNaN(r)) upd.rating = r;
              }
              if (kp.avg != null && kp.avg !== '') upd.avg = kp.avg;
              latestPerPlayer.set(idx, { ...cur, ...upd });
            }
          });
        });

        // Apply latest rating/avg
        latestPerPlayer.forEach((info, idx) => {
          if (info.rating !== undefined) ALL_PLAYERS[idx].rating = info.rating;
          if (info.avg !== undefined) ALL_PLAYERS[idx].avg = info.avg;
        });

        console.log(`✅ ${new Date().toLocaleTimeString('ko-KR')} | 한국 선수 경기: ${koreanMatches.length}개`);
      } catch (error) {
        console.error('❌ Failed to fetch matches:', error);
      } finally {
        clearTimeout(safetyTimer);
        setApiLoading(false);
        setIsInitialLoad(false);
      }
  }, []);

  // Fetch each Korean soccer player's 2025-26 season totals from API-Football
  // once at app load. Updates ALL_PLAYERS baseline + per-competition breakdown
  // (club competitions only — friendlies/international matches are excluded).
  React.useEffect(() => {
    let cancelled = false;
    // API-Football "season" is the start year. European leagues (Aug→May)
    // use 2025 for the 2025-26 season. MLS (Feb→Dec) uses calendar year,
    // so the current season is 2026.
    const seasonFor = (p) => (p.league === 'MLS' ? 2026 : 2025);
    // Map league name → display name + icon for the player stats tab.
    const LEAGUE_DISPLAY = {
      'Major League Soccer': { name: 'MLS', icon: '🇺🇸' },
      'Premier League': { name: '프리미어리그', icon: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
      'Bundesliga': { name: '분데스리가', icon: '🇩🇪' },
      'Ligue 1': { name: '리그앙', icon: '🇫🇷' },
      'Serie A': { name: '세리에A', icon: '🇮🇹' },
      'La Liga': { name: '라리가', icon: '🇪🇸' },
      'Eredivisie': { name: '에레디비시', icon: '🇳🇱' },
      'Süper Lig': { name: '쉬페르리그', icon: '🇹🇷' },
      'Championship': { name: '챔피언십', icon: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
      'Premiership': { name: '스코티시 PL', icon: '🏴󠁧󠁢󠁳󠁣󠁴󠁿' },
      'Superliga': { name: '덴마크 SL', icon: '🇩🇰' },
      'Super Liga': { name: '세르비아 SL', icon: '🇷🇸' },
      'Jupiler Pro League': { name: '벨기에 1부', icon: '🇧🇪' },
      'UEFA Champions League': { name: '챔피언스리그', icon: '🏆' },
      'UEFA Europa League': { name: '유로파리그', icon: '🏆' },
      'UEFA Conference League': { name: '컨퍼런스리그', icon: '🏆' },
      'UEFA Super Cup': { name: 'UEFA 슈퍼컵', icon: '🏆' },
      'FA Cup': { name: 'FA컵', icon: '🏆' },
      'EFL Cup': { name: 'EFL컵', icon: '🏆' },
      'League Cup': { name: '리그컵', icon: '🏆' },
      'DFB Pokal': { name: 'DFB-포칼', icon: '🏆' },
      'DFB-Pokal': { name: 'DFB-포칼', icon: '🏆' },

      'Türkiye Kupası': { name: '터키 컵', icon: '🏆' },
      'FIFA Club World Cup': { name: 'FIFA 클럽 월드컵', icon: '🏆' },
      'FIFA Intercontinental Cup': { name: 'FIFA 인터컨티넨탈컵', icon: '🏆' },
      'CONCACAF Champions League': { name: 'CONCACAF 챔피언스컵', icon: '🏆' },
      'US Open Cup': { name: 'US 오픈컵', icon: '🏆' },
      'Leagues Cup': { name: '리그스컵', icon: '🏆' },
      'Friendlies': { name: '국가대표 친선', icon: '🇰🇷' },
      'Friendlies Clubs': { name: '클럽 친선', icon: '🤝' },
      'World Cup - Qualification Asia': { name: '월드컵 예선 (아시아)', icon: '🌏' },
      'AFC Asian Cup': { name: 'AFC 아시안컵', icon: '🌏' },
      'Nations League': { name: 'UEFA 네이션스리그', icon: '🌍' },
    };
    const labelLeague = (name, country) => {
      if (LEAGUE_DISPLAY[name]) return LEAGUE_DISPLAY[name];
      const isCup = /Cup|Coppa|Coupe|Pokal|Beker|Kupası|Kupa|Trophy/i.test(name);
      return { name: name || '대회', icon: isCup ? '🏆' : '⚽' };
    };
    const soccerPlayers = ALL_PLAYERS.filter(p => p.sport === '축구' && p.apiFootballId);
    (async () => {
      await Promise.all(soccerPlayers.map(async p => {
        try {
          const r = await fetch(`${API_BASE}/api/apifootball?path=players&id=${p.apiFootballId}&season=${seasonFor(p)}`);
          if (!r.ok) return;
          const j = await r.json();
          // Club competitions only. API-Football uses `team.name` = national team
          // (e.g., 'South Korea') for national team appearances and the club name
          // (e.g., 'Paris Saint Germain') for club competitions including UEFA
          // Champions League, Super Cup, FIFA Intercontinental Cup, domestic
          // cups, etc. So a simple team-name check is the most accurate filter.
          const stats = j?.response?.[0]?.statistics || [];
          const NATIONAL_TEAM_NAMES = new Set(['south korea', 'korea republic', 'korea']);
          const clubStats = stats.filter(s => {
            const teamName = (s.team?.name || '').toLowerCase();
            return !NATIONAL_TEAM_NAMES.has(teamName);
          });
          if (clubStats.length === 0) return;
          let g = 0, a = 0, m = 0;
          const ratings = [];
          const compStats = [];
          for (const s of clubStats) {
            const sg = s.goals?.total || 0;
            const sa = s.goals?.assists || 0;
            const sm = s.games?.appearences || 0;
            g += sg; a += sa; m += sm;
            const r2 = s.games?.rating, w = sm;
            if (r2 && w > 0) ratings.push([parseFloat(r2), w]);
            // Only include competitions where the player actually played
            if (sm > 0 || sg > 0 || sa > 0) {
              const lbl = labelLeague(s.league?.name, s.league?.country);
              compStats.push({ name: lbl.name, icon: lbl.icon, goals: sg, assists: sa, matches: sm });
            }
          }
          const totalW = ratings.reduce((acc, [, w]) => acc + w, 0);
          const avgR = totalW > 0 ? ratings.reduce((acc, [r2, w]) => acc + r2 * w, 0) / totalW : 0;
          if (cancelled) return;
          p.goals = g; p.assists = a; p.matches = m;
          if (avgR > 0) p.rating = parseFloat(avgR.toFixed(2));
          // Sort: leagues first by matches desc, then cups
          p.compStats = compStats.sort((x, y) => y.matches - x.matches);
          delete p._baselineSnapshot; // force baseline rebuild in next poll
        } catch (e) {
          console.warn(`Season stats fetch failed for ${p.name}:`, e?.message || e);
        }
      }));
      if (!cancelled) setLiveMatches(prev => [...prev]); // trigger re-render
    })();
    return () => { cancelled = true; };
  }, []);

  // ── Daily player availability sync (IL / minors / injury) ──────────────
  // Hardcoded injury fields go stale (trades, IL stints, demotions). Once a day
  // we refresh every player's real status: MLB from statsapi (current team +
  // 40-man roster status code), soccer from API-Football injuries via the proxy.
  // Result is cached in localStorage for 24h and written onto ALL_PLAYERS so the
  // status badges and live "not in lineup" labels stay accurate.
  React.useEffect(() => {
    let cancelled = false;
    const KEY = 'jumoPlayerStatus_v2'; // bumped: ESPN-based soccer status source
    const DAY = 24 * 60 * 60 * 1000;
    // Apply a name→status map onto ALL_PLAYERS. A present key with null clears any
    // (now stale) injury; an absent key leaves the existing value untouched.
    const apply = (map) => {
      if (!map) return;
      ALL_PLAYERS.forEach(p => {
        if (Object.prototype.hasOwnProperty.call(map, p.name)) p.injury = map[p.name] || null;
      });
    };
    const REASON_KO = {
      'knee injury':'무릎 부상', 'ankle injury':'발목 부상', 'hamstring':'햄스트링 부상',
      'muscle injury':'근육 부상', 'thigh injury':'허벅지 부상', 'calf injury':'종아리 부상',
      'groin injury':'사타구니 부상', 'back injury':'허리 부상', 'shoulder injury':'어깨 부상',
      'foot injury':'발 부상', 'illness':'질병', 'knock':'타박상', 'fitness':'컨디션 난조',
      'suspended':'출전 정지', 'red card':'퇴장 누적', 'coach decision':'감독 결정',
    };
    const koReason = (reason) => REASON_KO[(reason || '').toLowerCase().trim()] || reason || '부상';

    (async () => {
      // Serve from cache when fresh enough.
      try {
        const cached = JSON.parse(localStorage.getItem(KEY) || 'null');
        if (cached && cached.ts && (Date.now() - cached.ts) < DAY && cached.map) {
          apply(cached.map);
          if (!cancelled) setLiveMatches(prev => [...prev]);
          return;
        }
      } catch {}

      const map = {};

      // ── MLB: statsapi roster status ──
      try {
        const mlb = ALL_PLAYERS.filter(p => p.sport === '야구' && p.mlbId);
        if (mlb.length) {
          const ids = mlb.map(p => p.mlbId).join(',');
          const [pplRes, teamsRes] = await Promise.all([
            fetch(`https://statsapi.mlb.com/api/v1/people?personIds=${ids}&hydrate=currentTeam`).then(r => r.json()),
            fetch('https://statsapi.mlb.com/api/v1/teams?sportId=1').then(r => r.json()),
          ]);
          const mlbTeamIds = new Set((teamsRes.teams || []).map(t => t.id));
          const personById = {};
          (pplRes.people || []).forEach(p => { personById[p.id] = p; });
          // Fetch each relevant MLB club's 40-man roster once (status codes live there).
          const needTeams = new Set();
          mlb.forEach(p => { const ct = personById[p.mlbId]?.currentTeam; if (ct && mlbTeamIds.has(ct.id)) needTeams.add(ct.id); });
          const rosterByTeam = {};
          await Promise.all([...needTeams].map(tid =>
            fetch(`https://statsapi.mlb.com/api/v1/teams/${tid}/roster?rosterType=40Man`)
              .then(r => r.ok ? r.json() : null)
              .then(d => { rosterByTeam[tid] = d?.roster || []; })
              .catch(() => { rosterByTeam[tid] = []; })
          ));
          mlb.forEach(p => {
            const ct = personById[p.mlbId]?.currentTeam;
            if (!ct) return; // unknown → leave existing value
            if (!mlbTeamIds.has(ct.id)) { map[p.name] = { label:'마이너', severity:'medium', kind:'minors', note: ct.name }; return; }
            const entry = (rosterByTeam[ct.id] || []).find(r => r.person?.id === p.mlbId);
            const code = entry?.status?.code || 'A';
            const desc = entry?.status?.description || '';
            if (/^D\d/.test(code) || code === 'DL') map[p.name] = { label:'부상자 명단 (IL)', severity:'high', kind:'il', note: desc };
            else if (code === 'RM' || code === 'OPT' || code === 'DES' || code === 'OUT') map[p.name] = { label:'마이너', severity:'medium', kind:'minors', note: desc };
            else map[p.name] = null; // active → clear any stale injury
          });
        }
      } catch (e) { console.warn('MLB status sync failed:', e?.message || e); }

      // ── Soccer: ESPN athlete status (CORS-open, no proxy/key) ──
      // Primary, reliable source — clears stale injuries for active players and
      // flags ones ESPN reports as injured. Runs before API-Football so that when
      // the proxy is unavailable, ESPN's verdict still stands.
      try {
        const soccerEspn = ALL_PLAYERS.filter(p => p.sport === '축구' && p.espnId && p.espnLeague);
        await Promise.all(soccerEspn.map(async p => {
          try {
            const r = await fetch(`https://site.web.api.espn.com/apis/common/v3/sports/soccer/${p.espnLeague}/athletes/${p.espnId}`);
            if (!r.ok) return; // keep existing
            const a = (await r.json())?.athlete;
            if (!a) return;
            const inj = Array.isArray(a.injuries) ? a.injuries : [];
            if (inj.length > 0) {
              const it = inj[0] || {};
              const detail = it?.type?.description || it?.details?.type || it?.status || it?.shortComment || '부상';
              const susp = /suspen|red card/i.test(JSON.stringify(it));
              map[p.name] = { label: koReason(detail), severity: susp ? 'medium' : 'high', kind: susp ? 'suspended' : 'injured', note: detail };
            } else {
              map[p.name] = null; // ESPN reports active / no injuries → available
            }
          } catch {}
        }));
      } catch (e) { console.warn('Soccer ESPN status sync failed:', e?.message || e); }

      // ── Soccer: API-Football injuries via proxy (enriches when available) ──
      try {
        const soccer = ALL_PLAYERS.filter(p => p.sport === '축구' && p.apiFootballId);
        await Promise.all(soccer.map(async p => {
          const season = p.league === 'MLS' ? 2026 : 2025;
          try {
            const r = await fetch(`${API_BASE}/api/apifootball?path=injuries&player=${p.apiFootballId}&season=${season}`);
            if (!r.ok) return; // proxy/key unavailable → keep existing value
            const rows = (await r.json())?.response || [];
            if (!rows.length) { map[p.name] = null; return; } // no injuries this season → available
            rows.sort((a, b) => new Date(b.fixture?.date || 0) - new Date(a.fixture?.date || 0));
            const latest = rows[0];
            const dt = new Date(latest.fixture?.date || 0).getTime();
            // Only treat as currently unavailable if the latest entry is recent (~12 days).
            if (dt && (Date.now() - dt) < 12 * DAY) {
              const reason = latest.player?.reason || '';
              const low = reason.toLowerCase();
              const kind = (low.includes('suspend') || low.includes('red card')) ? 'suspended'
                : (latest.player?.type || '').toLowerCase().includes('quest') ? 'doubtful' : 'injured';
              map[p.name] = { label: koReason(reason), severity: kind === 'injured' ? 'high' : 'medium', kind, note: reason };
            } else {
              map[p.name] = null; // recovered
            }
          } catch {}
        }));
      } catch (e) { console.warn('Soccer injury sync failed:', e?.message || e); }

      if (cancelled) return;
      apply(map);
      try { localStorage.setItem(KEY, JSON.stringify({ ts: Date.now(), map })); } catch {}
      setLiveMatches(prev => [...prev]);
    })();
    return () => { cancelled = true; };
  }, []);

  // ── 2026 World Cup: South Korea national-team fixtures ──────────────────
  // Kept in a dedicated state (NOT merged into the player-centric match
  // pipeline) so it renders only in its own home section. ESPN's fifa.world
  // feed is keyless/CORS-open, like the MLB feed. Refreshed every 60s so live
  // scores update during a match.
  React.useEffect(() => {
    let cancelled = false;
    const KO_NAME = {
      'South Korea': '대한민국', 'Korea Republic': '대한민국',
      'Czechia': '체코', 'Czech Republic': '체코', 'Mexico': '멕시코', 'South Africa': '남아공',
    };
    const fetchWC = async () => {
      try {
        const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719');
        const data = await res.json();
        const rows = (data.events || [])
          .filter(e => /korea republic|south korea/i.test(e?.name || ''))
          .map(e => {
            const comp = e.competitions?.[0] || {};
            const cs = comp.competitors || [];
            const home = cs.find(c => c.homeAway === 'home') || cs[0] || {};
            const away = cs.find(c => c.homeAway === 'away') || cs[1] || {};
            const st = e.status?.type || {};
            const logo = (c) => c?.team?.logos?.[0]?.href || (c?.team?.id ? `https://a.espncdn.com/i/teamlogos/soccer/500/${c.team.id}.png` : null);
            const side = (c) => ({
              name: c?.team?.displayName || '', koName: KO_NAME[c?.team?.displayName] || c?.team?.displayName || '',
              code: c?.team?.abbreviation || '', score: parseInt(c?.score) || 0, logo: logo(c),
            });
            const koreaIsHome = /korea/i.test(home?.team?.displayName || '');
            const koreaCode = (koreaIsHome ? home : away)?.team?.abbreviation || 'KOR';
            return {
              id: e.id,

              state: st.state,                       // 'pre' | 'in' | 'post'
